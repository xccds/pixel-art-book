<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .signal-title { font-size: 11.5px; fill: #E74C3C; font-weight: bold; text-anchor: middle; }
    .signal-text { font-size: 9.5px; fill: #555; text-anchor: middle; }
    .signal-cta { font-size: 10px; fill: #E74C3C; text-anchor: middle; font-weight: bold; }
    .signal-box { fill: #FDEDEC; stroke: #E74C3C; stroke-width: 1; }
    .start-box { fill: #333; }
    .start-text { font-size: 12px; fill: #fff; text-anchor: middle; font-weight: bold; }
    .free-box { fill: #27AE60; }
    .paid-box { fill: #E74C3C; }
    .result-text { font-size: 11px; fill: #fff; text-anchor: middle; font-weight: bold; }
    .arrow { stroke: #999; stroke-width: 1.2; fill: none; marker-end: url(#arrowhead); }
    .note { font-size: 9.5px; fill: #666; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>

  <text x="400" y="28" class="title" text-anchor="middle">图 制作01.2 免费→付费判断拐点——四个瓶颈信号</text>

  <!-- Start -->
  <rect x="320" y="48" width="160" height="36" rx="18" class="start-box"/>
  <text x="400" y="71" class="start-text">你目前用免费 / $20 工具</text>
  <line x1="400" y1="84" x2="400" y2="108" class="arrow"/>

  <!-- Four signals 2x2 grid -->
  <g transform="translate(60, 116)">
    <rect x="0" y="0" width="320" height="92" class="signal-box" rx="6"/>
    <text x="160" y="22" class="signal-title">信号 1 · 性能瓶颈</text>
    <text x="160" y="42" class="signal-text">大文件卡顿 / 笔刷延迟 &gt; 200ms / 崩溃</text>
    <text x="160" y="60" class="signal-text">工具的工程性能撑不住你的工作量</text>
    <text x="160" y="80" class="signal-cta">→ 切付费</text>
  </g>

  <g transform="translate(420, 116)">
    <rect x="0" y="0" width="320" height="92" class="signal-box" rx="6"/>
    <text x="160" y="22" class="signal-title">信号 2 · 缺关键功能</text>
    <text x="160" y="42" class="signal-text">工作流必需的功能免费工具没有</text>
    <text x="160" y="60" class="signal-text">（CMYK 输出 / 16-bit 色深 / 团队协作）</text>
    <text x="160" y="80" class="signal-cta">→ 切付费</text>
  </g>

  <g transform="translate(60, 226)">
    <rect x="0" y="0" width="320" height="92" class="signal-box" rx="6"/>
    <text x="160" y="22" class="signal-title">信号 3 · 机械操作 &gt; 30%</text>
    <text x="160" y="42" class="signal-text">超 1/3 时间在做批量重命名 / 手动导出</text>
    <text x="160" y="60" class="signal-text">工具让你干机器的活——该换能自动化的</text>
    <text x="160" y="80" class="signal-cta">→ 切付费</text>
  </g>

  <g transform="translate(420, 226)">
    <rect x="0" y="0" width="320" height="92" class="signal-box" rx="6"/>
    <text x="160" y="22" class="signal-title">信号 4 · 团队协作需要</text>
    <text x="160" y="42" class="signal-text">多人共享图层 / 版本管理 / 统一格式</text>
    <text x="160" y="60" class="signal-text">单人开发不触发；团队 1→3 人立刻触发</text>
    <text x="160" y="80" class="signal-cta">→ 切付费</text>
  </g>

  <!-- arrow down to decision -->
  <line x1="400" y1="318" x2="400" y2="348" class="arrow"/>

  <!-- Two outcomes -->
  <rect x="100" y="358" width="260" height="42" rx="21" class="paid-box"/>
  <text x="230" y="384" class="result-text">任一信号触发 → 切付费</text>

  <rect x="440" y="358" width="260" height="42" rx="21" class="free-box"/>
  <text x="570" y="384" class="result-text">四个全否 → 免费继续</text>

  <text x="400" y="425" class="note">判断公式：切付费省下的时间 &gt; 学新工具花的时间，才是切换时刻。</text>
  <text x="400" y="445" class="note">对本书读者：Aseprite $20 + Godot 免费 = 已是像素栈最优解，除非触发信号 1/3，否则无需升级。</text>
  <text x="400" y="475" class="note">切付费的代价不是钱——是重学一套工具的入门成本（肌肉记忆报废）。</text>
</svg>
