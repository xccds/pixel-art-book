<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .phase-label { font-size: 11px; fill: #3498DB; text-anchor: middle; font-weight: bold; }
    .step-num { font-size: 10px; fill: #E74C3C; text-anchor: middle; font-weight: bold; }
    .step-label { font-size: 11px; fill: #333; text-anchor: middle; font-weight: bold; }
    .step-desc { font-size: 9px; fill: #666; text-anchor: middle; }
    .step-time { font-size: 8px; fill: #999; text-anchor: middle; }
    .step-box { fill: #FAFAFA; stroke: #ccc; stroke-width: 0.8; rx: 5; }
    .step-box-active { fill: #E8F4FD; stroke: #3498DB; stroke-width: 1.2; rx: 5; }
    .arrow-line { stroke: #999; stroke-width: 1; }
  </style>

  <text x="400" y="24" class="title" text-anchor="middle">像素角色 10 步操作流程</text>

  <!-- Row 1 phase -->
  <text x="400" y="50" class="phase-label">阶段一：结构（Step 1–5）</text>

  <!-- Row 1: Steps 1-5, box 140px wide, 10px gap -->
  <!-- Step 1 -->
  <g transform="translate(30, 62)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 1</text>
    <text x="70" y="30" class="step-label">新建画布</text>
    <rect x="50" y="40" width="40" height="40" fill="#f5f5f5" stroke="#ddd" stroke-width="0.3"/>
    <text x="56" y="56" style="font-size:9px;fill:#bbb;text-anchor:middle;">16×16</text>
    <text x="70" y="100" class="step-desc">Ctrl+N · 设定尺寸</text>
    <text x="70" y="112" class="step-time">~30s</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(180, 62)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 2</text>
    <text x="70" y="30" class="step-label">锁定色板</text>
    <rect x="40" y="42" width="60" height="16" fill="#FFE0B2" rx="1"/>
    <rect x="40" y="42" width="15" height="16" fill="#E74C3C"/>
    <rect x="55" y="42" width="15" height="16" fill="#3498DB"/>
    <rect x="70" y="42" width="15" height="16" fill="#FFD700"/>
    <rect x="85" y="42" width="15" height="16" fill="#888"/>
    <text x="70" y="76" class="step-desc">Lospec 导入</text>
    <text x="70" y="90" class="step-desc">锁定 4-8 色</text>
    <text x="70" y="112" class="step-time">~1min</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(330, 62)">
    <rect x="0" y="0" width="140" height="115" class="step-box-active"/>
    <text x="70" y="16" class="step-num">Step 3</text>
    <text x="70" y="30" class="step-label">画剪影</text>
    <rect x="45" y="40" width="50" height="50" fill="#333"/>
    <rect x="52" y="55" width="8" height="14" fill="#FAFAFA"/>
    <rect x="65" y="60" width="20" height="20" fill="#FAFAFA"/>
    <text x="70" y="105" class="step-desc">全黑轮廓 · 辨识度测试</text>
    <text x="70" y="117" class="step-time">~3min</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(480, 62)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 4</text>
    <text x="70" y="30" class="step-label">内部结构</text>
    <rect x="45" y="40" width="50" height="50" fill="#333"/>
    <line x1="58" y1="52" x2="58" y2="65" stroke="#666" stroke-width="1.2"/>
    <line x1="82" y1="52" x2="82" y2="65" stroke="#666" stroke-width="1.2"/>
    <rect x="60" y="46" width="6" height="6" fill="#555"/>
    <rect x="74" y="46" width="6" height="6" fill="#555"/>
    <text x="70" y="105" class="step-desc">眼/嘴/衣纹 · 2-3色</text>
    <text x="70" y="117" class="step-time">~5min</text>
  </g>

  <!-- Step 5 -->
  <g transform="translate(630, 62)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 5</text>
    <text x="70" y="30" class="step-label">加细节</text>
    <rect x="45" y="40" width="50" height="50" fill="#444"/>
    <rect x="55" y="46" width="8" height="8" fill="#3498DB"/>
    <rect x="77" y="46" width="8" height="8" fill="#3498DB"/>
    <rect x="62" y="56" width="16" height="3" fill="#666"/>
    <line x1="50" y1="68" x2="90" y2="68" stroke="#888" stroke-width="0.8"/>
    <text x="70" y="105" class="step-desc">饰物/纽扣/光泽点</text>
    <text x="70" y="117" class="step-time">~5min</text>
  </g>

  <!-- Arrows row 1 (between steps 1-2, 2-3, 3-4, 4-5) -->
  <g stroke="#999" stroke-width="1.2">
    <line x1="170" y1="119" x2="180" y2="119"/>
    <line x1="320" y1="119" x2="330" y2="119"/>
    <line x1="470" y1="119" x2="480" y2="119"/>
    <line x1="620" y1="119" x2="630" y2="119"/>
  </g>

  <!-- Row 2 phase -->
  <text x="400" y="205" class="phase-label">阶段二：着色 + 导出与验证（Step 6–10）</text>

  <!-- Step 6 -->
  <g transform="translate(30, 217)">
    <rect x="0" y="0" width="140" height="115" class="step-box-active"/>
    <text x="70" y="16" class="step-num">Step 6</text>
    <text x="70" y="30" class="step-label">着色</text>
    <rect x="45" y="40" width="50" height="50" fill="#FFE0B2"/>
    <rect x="52" y="44" width="36" height="12" fill="#E74C3C"/>
    <rect x="52" y="56" width="36" height="30" fill="#3498DB"/>
    <rect x="58" y="62" width="24" height="3" fill="#FFD700"/>
    <text x="70" y="105" class="step-desc">色板内填色 · 3-4色</text>
    <text x="70" y="117" class="step-time">~3min</text>
  </g>

  <!-- Step 7 -->
  <g transform="translate(180, 217)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 7</text>
    <text x="70" y="30" class="step-label">加阴影</text>
    <rect x="45" y="40" width="50" height="50" fill="#FFE0B2"/>
    <rect x="52" y="44" width="36" height="12" fill="#E74C3C"/>
    <rect x="52" y="56" width="36" height="3" fill="#C0392B"/>
    <rect x="52" y="59" width="36" height="28" fill="#3498DB"/>
    <rect x="52" y="59" width="36" height="4" fill="#2471A3"/>
    <rect x="48" y="88" width="54" height="3" fill="#bbb"/>
    <text x="70" y="105" class="step-desc">高光/环境光/投影</text>
    <text x="70" y="117" class="step-time">~5min</text>
  </g>

  <!-- Step 8 -->
  <g transform="translate(330, 217)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 8</text>
    <text x="70" y="30" class="step-label">做变体</text>
    <rect x="36" y="44" width="30" height="36" fill="#FFE0B2" stroke="#ddd" stroke-width="0.5" rx="2"/>
    <rect x="74" y="44" width="30" height="36" fill="#E8F5E9" stroke="#ddd" stroke-width="0.5" rx="2"/>
    <text x="51" y="62" class="step-desc" font-size="8">基础</text>
    <text x="89" y="62" class="step-desc" font-size="8">换色</text>
    <text x="70" y="90" class="step-desc">不同朝向/配色</text>
    <text x="70" y="103" class="step-desc">多帧变体备用</text>
    <text x="70" y="117" class="step-time">~10min</text>
  </g>

  <!-- Step 9 -->
  <g transform="translate(480, 217)">
    <rect x="0" y="0" width="140" height="115" class="step-box"/>
    <text x="70" y="16" class="step-num">Step 9</text>
    <text x="70" y="30" class="step-label">导出PNG</text>
    <rect x="50" y="42" width="40" height="30" fill="#ddd" rx="3"/>
    <text x="70" y="60" style="font-size:9px;fill:#333;text-anchor:middle;">.png</text>
    <text x="70" y="90" class="step-desc">Nearest Neighbor</text>
    <text x="70" y="103" class="step-desc">整数倍缩放</text>
    <text x="70" y="117" class="step-time">~30s</text>
  </g>

  <!-- Step 10 -->
  <g transform="translate(630, 217)">
    <rect x="0" y="0" width="140" height="115" class="step-box-active"/>
    <text x="70" y="16" class="step-num">Step 10</text>
    <text x="70" y="30" class="step-label">引擎验证</text>
    <rect x="45" y="42" width="50" height="45" fill="#333" rx="3"/>
    <rect x="50" y="46" width="18" height="18" fill="#3498DB"/>
    <rect x="50" y="46" width="18" height="5" fill="#F4D03F"/>
    <text x="59" y="58" style="font-size:7px;fill:#fff;text-anchor:middle;">Run</text>
    <text x="70" y="100" class="step-desc">引擎中跑一遍</text>
    <text x="70" y="113" class="step-desc">检查缩放/帧序</text>
    <text x="70" y="125" class="step-time">~3min</text>
  </g>

  <!-- Arrows row 2 -->
  <g stroke="#999" stroke-width="1.2">
    <line x1="170" y1="274" x2="180" y2="274"/>
    <line x1="320" y1="274" x2="330" y2="274"/>
    <line x1="470" y1="274" x2="480" y2="274"/>
    <line x1="620" y1="274" x2="630" y2="274"/>
  </g>

  <!-- Bottom summary bar -->
  <rect x="30" y="380" width="740" height="44" rx="4" fill="#E8F4FD"/>
  <text x="400" y="398" style="font-size:10px;fill:#3498DB;text-anchor:middle;font-weight:bold;">总耗时约 30-40 分钟 / 角色</text>
  <text x="400" y="416" style="font-size:8px;fill:#666;text-anchor:middle;">新手×3 = 真实耗时 | 熟练后可压缩到 15-20 分钟 | 批量做 4 个角色效率更高（色板复用）</text>
</svg>
