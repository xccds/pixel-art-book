<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 455" width="800" height="455">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .step-num { font-size: 10px; fill: #E74C3C; text-anchor: middle; font-weight: bold; }
    .step-label { font-size: 8.5px; fill: #333; text-anchor: middle; font-weight: bold; }
    .step-desc { font-size: 7.5px; fill: #666; text-anchor: middle; }
    .step-time { font-size: 7px; fill: #999; text-anchor: middle; }
    .step-box { fill: #FAFAFA; stroke: #ccc; stroke-width: 0.8; rx: 4; }
    .step-box-active { fill: #E8F4FD; stroke: #3498DB; stroke-width: 1; rx: 4; }
    .arrow { stroke: #999; stroke-width: 1; }
    .arrowhead { fill: #999; }
    .phase-label { font-size: 7px; fill: #3498DB; text-anchor: middle; font-weight: bold; }
    .phase-bar { stroke: #3498DB; stroke-width: 2; stroke-dasharray: 4,3; }
    .sprite-cell { fill: #F5F5F5; stroke: #ddd; stroke-width: 0.3; }
    .sprite-fill { fill: #333; }
    .sprite-outline { fill: none; stroke: #333; stroke-width: 1; }
    .sprite-detail { fill: #666; }
    .sprite-color { fill: #E74C3C; }
    .sprite-shadow { fill: #999; }
    .sprite-accent { fill: #3498DB; }
  </style>

  <!-- Title -->
  <text x="400" y="26" class="title" text-anchor="middle">图 制作02.1  像素角色 10 步操作流程——从空白画布到引擎验证完成</text>

  <!-- Phase labels -->
  <text x="135" y="50" class="phase-label">阶段一：结构（Step 1–4）</text>
  <text x="400" y="50" class="phase-label">阶段二：着色（Step 5–7）</text>
  <text x="665" y="50" class="phase-label">阶段三：导出与验证（Step 8–10）</text>

  <!-- Phase bars -->
  <line x1="5" y1="55" x2="265" y2="55" class="phase-bar"/>
  <line x1="270" y1="55" x2="530" y2="55" class="phase-bar"/>
  <line x1="535" y1="55" x2="795" y2="55" class="phase-bar"/>

  <!-- Step 1: 新建画布 -->
  <g transform="translate(5, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 1</text>
    <text x="36" y="27" class="step-label">新建画布</text>
    <rect x="16" y="36" width="40" height="455" rx="0" class="sprite-cell"/>
    <text x="22" y="49" style="font-size:8px; fill:#ccc; text-anchor:center;">16</text>
    <text x="22" y="60" style="font-size:8px; fill:#ccc; text-anchor:center;">× 16</text>
    <text x="36" y="88" class="step-desc">Ctrl+N</text>
    <text x="36" y="99" class="step-desc">16×16px</text>
    <text x="36" y="114" class="step-time">~30s</text>
  </g>

  <!-- Arrow 1→2 -->
  <polygon points="82,115 88,115 85,110" class="arrowhead"/>
  <polygon points="82,115 88,115 85,120" class="arrowhead"/>

  <!-- Step 2: 锁定色板 -->
  <g transform="translate(91, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 2</text>
    <text x="36" y="27" class="step-label">锁定色板</text>
    <rect x="12" y="35" width="48" height="455" fill="#FFE0B2"/>
    <rect x="12" y="35" width="12" height="455" fill="#E74C3C"/>
    <rect x="24" y="35" width="12" height="455" fill="#3498DB"/>
    <rect x="36" y="35" width="12" height="455" fill="#FFD700"/>
    <rect x="48" y="35" width="12" height="455" fill="#888"/>
    <text x="36" y="71" class="step-desc">Lospec 导入</text>
    <text x="36" y="83" class="step-desc">4-8色上限</text>
    <text x="36" y="114" class="step-time">~1min</text>
  </g>

  <polygon points="168,115 174,115 171,110" class="arrowhead"/>
  <polygon points="168,115 174,115 171,120" class="arrowhead"/>

  <!-- Step 3: 画剪影 -->
  <g transform="translate(177, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box-active"/>
    <text x="36" y="14" class="step-num">Step 3</text>
    <text x="36" y="27" class="step-label">画剪影</text>
    <rect x="16" y="35" width="40" height="455" fill="#333"/>
    <rect x="22" y="50" width="4" height="455" fill="#FAFAFA"/>
    <rect x="34" y="58" width="16" height="455" fill="#FAFAFA"/>
    <text x="36" y="88" class="step-desc">全黑轮廓</text>
    <text x="36" y="99" class="step-desc">辨识度测试</text>
    <text x="36" y="114" class="step-time">~3min</text>
  </g>

  <polygon points="254,115 260,115 257,110" class="arrowhead"/>
  <polygon points="254,115 260,115 257,120" class="arrowhead"/>

  <!-- Step 4: 加内部结构 -->
  <g transform="translate(263, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 4</text>
    <text x="36" y="27" class="step-label">内部结构</text>
    <rect x="16" y="35" width="40" height="455" fill="#333"/>
    <line x1="28" y1="48" x2="28" y2="60" stroke="#666" stroke-width="1"/>
    <line x1="44" y1="48" x2="44" y2="60" stroke="#666" stroke-width="1"/>
    <rect x="30" y="42" width="4" height="455" fill="#555"/>
    <rect x="38" y="42" width="4" height="455" fill="#555"/>
    <text x="36" y="88" class="step-desc">眼/嘴/衣纹</text>
    <text x="36" y="99" class="step-desc">用2-3色区分</text>
    <text x="36" y="114" class="step-time">~5min</text>
  </g>

  <polygon points="340,115 346,115 343,110" class="arrowhead"/>
  <polygon points="340,115 346,115 343,120" class="arrowhead"/>

  <!-- Step 5: 加细节 -->
  <g transform="translate(349, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 5</text>
    <text x="36" y="27" class="step-label">加细节</text>
    <rect x="16" y="35" width="40" height="455" fill="#444"/>
    <rect x="24" y="42" width="6" height="455" fill="#3498DB"/>
    <rect x="42" y="42" width="6" height="455" fill="#3498DB"/>
    <rect x="30" y="50" width="12" height="455" fill="#555"/>
    <line x1="20" y1="60" x2="52" y2="60" stroke="#666" stroke-width="1"/>
    <text x="36" y="88" class="step-desc">饰物/纽扣</text>
    <text x="36" y="99" class="step-desc">笔触/光泽点</text>
    <text x="36" y="114" class="step-time">~5min</text>
  </g>

  <polygon points="426,115 432,115 429,110" class="arrowhead"/>
  <polygon points="426,115 432,115 429,120" class="arrowhead"/>

  <!-- Step 6: 着色 -->
  <g transform="translate(435, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box-active"/>
    <text x="36" y="14" class="step-num">Step 6</text>
    <text x="36" y="27" class="step-label">着色</text>
    <rect x="16" y="35" width="40" height="455" fill="#FFE0B2"/>
    <rect x="24" y="38" width="24" height="455" fill="#E74C3C"/>
    <rect x="24" y="50" width="24" height="455" fill="#3498DB"/>
    <rect x="28" y="55" width="16" height="455" fill="#FFD700"/>
    <text x="36" y="88" class="step-desc">色板内填色</text>
    <text x="36" y="99" class="step-desc">3-4色即可</text>
    <text x="36" y="114" class="step-time">~3min</text>
  </g>

  <polygon points="512,115 518,115 515,110" class="arrowhead"/>
  <polygon points="512,115 518,115 515,120" class="arrowhead"/>

  <!-- Step 7: 加阴影 -->
  <g transform="translate(521, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 7</text>
    <text x="36" y="27" class="step-label">加阴影</text>
    <rect x="16" y="35" width="40" height="455" fill="#FFE0B2"/>
    <rect x="24" y="38" width="24" height="455" fill="#E74C3C"/>
    <rect x="24" y="46" width="24" height="455" fill="#C0392B"/>
    <rect x="24" y="50" width="24" height="455" fill="#3498DB"/>
    <rect x="24" y="50" width="24" height="455" fill="#2471A3"/>
    <rect x="20" y="72" width="40" height="455" fill="#bbb"/>
    <text x="36" y="88" class="step-desc">高光/环境光</text>
    <text x="36" y="99" class="step-desc">地面投影</text>
    <text x="36" y="114" class="step-time">~5min</text>
  </g>

  <polygon points="598,115 604,115 601,110" class="arrowhead"/>
  <polygon points="598,115 604,115 601,120" class="arrowhead"/>

  <!-- Step 8: 做变体 -->
  <g transform="translate(607, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 8</text>
    <text x="36" y="27" class="step-label">做变体</text>
    <rect x="10" y="35" width="25" height="455" fill="#FFE0B2" stroke="#ddd" stroke-width="0.5"/>
    <rect x="37" y="35" width="25" height="455" fill="#E8F5E9" stroke="#ddd" stroke-width="0.5"/>
    <text x="22" y="49" class="step-desc" style="font-size:6px;">基础</text>
    <text x="49" y="49" class="step-desc" style="font-size:6px;">换色</text>
    <text x="36" y="76" class="step-desc">换帧/换色</text>
    <text x="36" y="87" class="step-desc">多朝向备用</text>
    <text x="36" y="114" class="step-time">~10min</text>
  </g>

  <polygon points="684,115 690,115 687,110" class="arrowhead"/>
  <polygon points="684,115 690,115 687,120" class="arrowhead"/>

  <!-- Step 9: 导出PNG -->
  <g transform="translate(693, 62)">
    <rect x="0" y="0" width="72" height="455" class="step-box"/>
    <text x="36" y="14" class="step-num">Step 9</text>
    <text x="36" y="27" class="step-label">导出PNG</text>
    <rect x="20" y="38" width="32" height="455" fill="#ddd" rx="2"/>
    <text x="36" y="53" style="font-size:7px;fill:#333;text-anchor:middle;">.png</text>
    <text x="36" y="76" class="step-desc">Nearest</text>
    <text x="36" y="87" class="step-desc">Neighbor</text>
    <text x="36" y="114" class="step-time">~30s</text>
  </g>

  <polygon points="770,115 776,115 773,110" class="arrowhead"/>
  <polygon points="770,115 776,115 773,120" class="arrowhead"/>

  <!-- Step 10: 引擎验证 -->
  <g transform="translate(725, 62)" visibility="hidden">
    <!-- placeholder for arrow only -->
  </g>

  <!-- Row 2: Step 10 + time summary -->
  <!-- Step 10: 引擎验证 -->
  <g transform="translate(693, 180)">
    <rect x="0" y="0" width="90" height="455" class="step-box-active"/>
    <text x="45" y="14" class="step-num">Step 10</text>
    <text x="45" y="27" class="step-label">引擎验证</text>
    <rect x="20" y="36" width="50" height="455" fill="#333" rx="2"/>
    <rect x="24" y="40" width="18" height="455" fill="#3498DB"/>
    <rect x="24" y="40" width="18" height="455" fill="#F4D03F"/>
    <text x="33" y="52" style="font-size:6px;fill:#fff;text-anchor:middle;">Run</text>
    <text x="45" y="89" class="step-desc">引擎中跑一遍</text>
    <text x="45" y="100" class="step-desc">检查缩放/帧序</text>
    <text x="45" y="114" class="step-time">~3min</text>
  </g>

  <!-- Arrow 9→10 -->
  <line x1="729" y1="167" x2="738" y2="180" stroke="#999" stroke-width="1"/>
  <polygon points="735,178 740,182 738,175" fill="#999"/>

  <!-- Time summary bar at bottom -->
  <g transform="translate(5, 190)">
    <rect x="0" y="0" width="780" height="455" rx="4" fill="#E8F4FD"/>
    <text x="390" y="16" style="font-size:9px; fill:#3498DB; text-anchor:middle; font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;">总耗时约 30-40 分钟 / 角色    阶段一（结构 9min）→ 阶段二（着色 13min）→ 阶段三（导出与验证 13min）</text>
    <text x="390" y="30" style="font-size:8px; fill:#666; text-anchor:middle; font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;">新手×3 = 真实耗时 | 熟练后可压缩到 15-20 分钟 | 批量做 4 个角色效率更高（色板复用）</text>
  </g>

  <!-- Final connector note -->
  <text x="400" y="245" style="font-size:8px; fill:#999; text-anchor:middle; font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;">每步输出明确、可验证——不是”画得更好看“而是”完成这步即及格“</text>
</svg>
