<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 11px; fill: #666; }
    .floor-title { font-size: 12px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .floor-sub { font-size: 9px; fill: #fff; text-anchor: middle; opacity: 0.85; }
    .check-title { font-size: 10px; font-weight: bold; fill: #333; }
    .check-item { font-size: 9px; fill: #555; }
    .check-note { font-size: 8px; fill: #999; }
    .character-label { font-size: 9px; fill: #666; text-anchor: middle; }
    .step-number { font-size: 20px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .arrow-text { font-size: 8px; fill: #E74C3C; font-weight: bold; }
  </style>

  <text x="400" y="28" class="title" text-anchor="middle">图 制作02.2  四层楼角色设计法——每层可独立验证，不过关不上楼</text>

  <!-- Floor 1: Silhouette -->
  <g transform="translate(20, 47)">
    <rect x="0" y="0" width="180" height="390" fill="#1A1A2E" stroke="#333" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="180" height="36" fill="#1B263B" rx="6"/>
    <rect x="0" y="18" width="180" height="18" fill="#1B263B"/>

    <!-- Step circle -->
    <circle cx="30" cy="18" r="14" fill="#E74C3C"/>
    <text x="30" y="24" class="step-number" font-size="14">1</text>

    <text x="100" y="16" class="floor-title" font-size="11">第一层·剪影</text>
    <text x="100" y="30" class="floor-sub">Silhouette</text>

    <!-- Three silhouettes (black shape figures) -->
    <g transform="translate(15, 48)">
      <!-- Character sil -->
      <rect x="0" y="0" width="150" height="110" fill="#16213E" rx="4"/>
      <!-- Simple adventurer silhouette -->
      <ellipse cx="75" cy="22" rx="18" ry="18" fill="#080808"/>
      <rect x="58" y="40" width="34" height="42" fill="#080808" rx="3"/>
      <rect x="52" y="80" width="20" height="18" fill="#080808" rx="2"/>
      <rect x="78" y="80" width="20" height="18" fill="#080808" rx="2"/>
      <!-- Sword -->
      <rect x="92" y="48" width="4" height="38" fill="#080808" rx="1"/>
      <rect x="90" y="42" width="8" height="8" fill="#080808" rx="1"/>
      <text x="75" y="122" class="character-label" fill="#fff" opacity="0.5">主角剪影</text>
    </g>

    <!-- Enemy silhouette (reduced) -->
    <g transform="translate(15, 178)">
      <rect x="0" y="0" width="150" height="80" fill="#16213E" rx="4"/>
      <ellipse cx="75" cy="15" rx="12" ry="14" fill="#080808"/>
      <rect x="65" y="28" width="20" height="24" fill="#080808" rx="2"/>
      <rect x="58" y="50" width="15" height="15" fill="#080808" rx="3"/>
      <rect x="77" y="50" width="15" height="15" fill="#080808" rx="3"/>
      <!-- Horns -->
      <polygon points="62,15 56,4 66,12" fill="#080808"/>
      <polygon points="88,15 94,4 84,12" fill="#080808"/>
      <text x="75" y="88" class="character-label" fill="#fff" opacity="0.5">敌人剪影</text>
    </g>

    <!-- NPC silhouette -->
    <g transform="translate(15, 278)">
      <rect x="0" y="0" width="150" height="80" fill="#16213E" rx="4"/>
      <circle cx="75" cy="18" r="16" fill="#080808"/>
      <rect x="62" y="34" width="26" height="30" fill="#080808" rx="2"/>
      <rect x="57" y="62" width="16" height="16" fill="#080808" rx="2"/>
      <rect x="77" y="62" width="16" height="16" fill="#080808" rx="2"/>
      <text x="75" y="88" class="character-label" fill="#fff" opacity="0.5">NPC 剪影</text>
    </g>
  </g>

  <!-- Arrow up -->
  <g transform="translate(208, 242)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#E74C3C" stroke-width="1.5"/>
    <polygon points="16,-5 24,0 16,5" fill="#E74C3C"/>
    <text x="12" y="-8" class="arrow-text" text-anchor="middle">▲</text>
    <text x="50" y="6" class="arrow-text" text-anchor="middle">不过关</text>
    <text x="50" y="18" class="arrow-text" text-anchor="middle" font-size="7" fill="#999">不上楼</text>
  </g>

  <!-- Floor 2: Internal Structure -->
  <g transform="translate(220, 47)">
    <rect x="0" y="0" width="150" height="390" fill="#2C3E6B" stroke="#333" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="150" height="36" fill="#2C3E50" rx="6"/>
    <rect x="0" y="18" width="150" height="18" fill="#2C3E50"/>
    <circle cx="25" cy="18" r="12" fill="#E74C3C"/>
    <text x="25" y="23" class="step-number" font-size="12">2</text>
    <text x="85" y="16" class="floor-title" font-size="10">第二层·内部结构</text>
    <text x="85" y="30" class="floor-sub">Internal Structure</text>

    <!-- Structure with lines -->
    <g transform="translate(10, 48)">
      <rect x="0" y="0" width="130" height="110" fill="#2C3E50" rx="4"/>
      <!-- Same character but with structural lines -->
      <ellipse cx="65" cy="22" rx="18" ry="18" fill="none" stroke="#A8D8F0" stroke-width="1"/>
      <line x1="65" y1="4" x2="65" y2="40" stroke="#A8D8F0" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="47" y1="22" x2="83" y2="22" stroke="#A8D8F0" stroke-width="0.5" stroke-dasharray="3,3"/>
      <!-- Torso -->
      <rect x="55" y="40" width="20" height="42" fill="none" stroke="#A8D8F0" stroke-width="1"/>
      <!-- Limbs -->
      <line x1="55" y1="50" x2="42" y2="42" stroke="#A8D8F0" stroke-width="1.5"/>
      <line x1="75" y1="50" x2="88" y2="42" stroke="#A8D8F0" stroke-width="1.5"/>
      <line x1="55" y1="80" x2="48" y2="98" stroke="#A8D8F0" stroke-width="1.5"/>
      <line x1="75" y1="80" x2="82" y2="98" stroke="#A8D8F0" stroke-width="1.5"/>
      <!-- Sword line -->
      <line x1="88" y1="48" x2="92" y2="86" stroke="#A8D8F0" stroke-width="2"/>
      <text x="65" y="122" class="character-label" fill="#A8D8F0" opacity="0.8">加内部结构线</text>
    </g>
  </g>

  <!-- Arrow up -->
  <g transform="translate(378, 242)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#E74C3C" stroke-width="1.5"/>
    <polygon points="16,-5 24,0 16,5" fill="#E74C3C"/>
    <text x="12" y="-8" class="arrow-text" text-anchor="middle">▲</text>
    <text x="50" y="6" class="arrow-text" text-anchor="middle">不过关</text>
    <text x="50" y="18" class="arrow-text" text-anchor="middle" font-size="7" fill="#999">不上楼</text>
  </g>

  <!-- Floor 3: Details -->
  <g transform="translate(390, 47)">
    <rect x="0" y="0" width="150" height="390" fill="#5B6CAE" stroke="#333" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="150" height="36" fill="#4A5DA8" rx="6"/>
    <rect x="0" y="18" width="150" height="18" fill="#4A5DA8"/>
    <circle cx="25" cy="18" r="12" fill="#E74C3C"/>
    <text x="25" y="23" class="step-number" font-size="12">3</text>
    <text x="85" y="16" class="floor-title" font-size="10">第三层·细节</text>
    <text x="85" y="30" class="floor-sub">Details</text>

    <g transform="translate(10, 48)">
      <rect x="0" y="0" width="130" height="110" fill="#4A5DA8" opacity="0.4" rx="4"/>
      <!-- Same but with detailed shape -->
      <ellipse cx="65" cy="22" rx="18" ry="18" fill="#D4A574"/>
      <!-- Eyes -->
      <circle cx="59" cy="20" r="2" fill="#333"/>
      <circle cx="71" cy="20" r="2" fill="#333"/>
      <!-- Mouth -->
      <path d="M 62,27 Q 65,31 68,27" stroke="#333" stroke-width="0.8" fill="none"/>
      <!-- Hair outline -->
      <path d="M 47,16 Q 55,4 65,4 Q 75,4 83,16" fill="#6E2C00" stroke="none"/>
      <!-- Torso with armor -->
      <rect x="55" y="40" width="20" height="42" fill="#5D6D7E" rx="2"/>
      <line x1="55" y1="52" x2="75" y2="52" stroke="#85929E" stroke-width="0.5"/>
      <line x1="55" y1="64" x2="75" y2="64" stroke="#85929E" stroke-width="0.5"/>
      <!-- Belt -->
      <rect x="55" y="75" width="20" height="5" fill="#6E2C00"/>
      <rect x="63" y="75" width="4" height="5" fill="#F1C40F"/>
      <!-- Arms -->
      <rect x="42" y="44" width="13" height="6" fill="#D4A574" rx="2"/>
      <rect x="75" y="44" width="13" height="6" fill="#D4A574" rx="2"/>
      <!-- Glove right -->
      <circle cx="88" cy="42" r="4" fill="#6E2C00"/>
      <!-- Legs -->
      <rect x="55" y="80" width="9" height="18" fill="#2E4053" rx="2"/>
      <rect x="66" y="80" width="9" height="18" fill="#2E4053" rx="2"/>
      <!-- Boots -->
      <rect x="52" y="95" width="12" height="6" fill="#6E2C00" rx="1"/>
      <rect x="66" y="95" width="12" height="6" fill="#6E2C00" rx="1"/>
      <!-- Sword -->
      <rect x="92" y="48" width="3" height="38" fill="#BDC3C7" rx="1"/>
      <rect x="90" y="42" width="7" height="7" fill="#6E2C00" rx="1"/>
      <text x="65" y="122" class="character-label" fill="#BDC3C7" opacity="0.9">加纹理和装饰</text>
    </g>
  </g>

  <!-- Arrow up -->
  <g transform="translate(548, 242)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#E74C3C" stroke-width="1.5"/>
    <polygon points="16,-5 24,0 16,5" fill="#E74C3C"/>
    <text x="12" y="-8" class="arrow-text" text-anchor="middle">▲</text>
    <text x="50" y="6" class="arrow-text" text-anchor="middle">不过关</text>
    <text x="50" y="18" class="arrow-text" text-anchor="middle" font-size="7" fill="#999">不上楼</text>
  </g>

  <!-- Floor 4: Color -->
  <g transform="translate(560, 47)">
    <rect x="0" y="0" width="220" height="390" fill="#8E44AD" stroke="#333" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="220" height="36" fill="#7D3C98" rx="6"/>
    <rect x="0" y="18" width="220" height="18" fill="#7D3C98"/>
    <circle cx="25" cy="18" r="12" fill="#E74C3C"/>
    <text x="25" y="23" class="step-number" font-size="12">4</text>
    <text x="120" y="16" class="floor-title" font-size="10">第四层·色彩</text>
    <text x="120" y="30" class="floor-sub">Color</text>

    <!-- Painted character -->
    <g transform="translate(25, 48)">
      <rect x="0" y="0" width="160" height="130" fill="#7D3C98" opacity="0.3" rx="4"/>
      <!-- Same character fully colored -->
      <ellipse cx="80" cy="24" rx="20" ry="20" fill="#D4A574"/>
      <circle cx="73" cy="22" r="2.5" fill="#333"/>
      <circle cx="87" cy="22" r="2.5" fill="#333"/>
      <circle cx="80" cy="24" r="1.5" fill="#1A1A1A"/>
      <path d="M 75,30 Q 80,34 85,30" stroke="#333" stroke-width="1" fill="none"/>
      <path d="M 60,18 Q 68,4 80,4 Q 92,4 100,18" fill="#6E2C00"/>
      <!-- Hair highlight -->
      <path d="M 68,10 Q 80,6 92,10" stroke="#A0522D" stroke-width="1" fill="none"/>
      <!-- Armor -->
      <rect x="62" y="44" width="36" height="48" fill="#5D6D7E" rx="3"/>
      <rect x="62" y="52" width="36" height="2" fill="#85929E"/>
      <rect x="62" y="64" width="36" height="2" fill="#85929E"/>
      <rect x="62" y="76" width="36" height="2" fill="#85929E"/>
      <!-- Belt -->
      <rect x="62" y="84" width="36" height="6" fill="#6E2C00"/>
      <rect x="78" y="84" width="5" height="6" fill="#F1C40F"/>
      <!-- Arms -->
      <rect x="46" y="48" width="16" height="8" fill="#D4A574" rx="3"/>
      <rect x="98" y="48" width="16" height="8" fill="#D4A574" rx="3"/>
      <!-- Gloves -->
      <rect x="42" y="44" width="12" height="12" fill="#6E2C00" rx="4"/>
      <rect x="106" y="44" width="12" height="12" fill="#6E2C00" rx="4"/>
      <!-- Legs -->
      <rect x="64" y="90" width="14" height="20" fill="#2E4053" rx="3"/>
      <rect x="82" y="90" width="14" height="20" fill="#2E4053" rx="3"/>
      <!-- Boots -->
      <rect x="60" y="106" width="18" height="8" fill="#6E2C00" rx="2"/>
      <rect x="82" y="106" width="18" height="8" fill="#6E2C00" rx="2"/>
      <!-- Cape -->
      <path d="M 60,44 L 40,70 L 48,80 L 58,60" fill="#E74C3C" opacity="0.8"/>
      <!-- Sword -->
      <rect x="116" y="52" width="4" height="42" fill="#BDC3C7" rx="1"/>
      <line x1="118" y1="54" x2="118" y2="90" stroke="#fff" stroke-width="0.8"/>
      <rect x="114" y="46" width="8" height="8" fill="#6E2C00" rx="1"/>
      <!-- Pommel -->
      <circle cx="118" cy="94" r="3" fill="#F1C40F"/>
      <text x="80" y="140" class="character-label" fill="#E8DAEF" opacity="0.9">加颜色——完成</text>
    </g>

    <!-- Color palette legend -->
    <g transform="translate(15, 200)">
      <text x="0" y="0" style="font-size:9px; font-weight:bold; fill:#fff;">色板（8 色）：</text>
      <circle cx="10" cy="14" r="5" fill="#D4A574"/>
      <circle cx="35" cy="14" r="5" fill="#5D6D7E"/>
      <circle cx="60" cy="14" r="5" fill="#6E2C00"/>
      <circle cx="85" cy="14" r="5" fill="#2E4053"/>
      <circle cx="110" cy="14" r="5" fill="#E74C3C"/>
      <circle cx="135" cy="14" r="5" fill="#BDC3C7"/>
      <circle cx="160" cy="14" r="5" fill="#F1C40F"/>
      <circle cx="185" cy="14" r="5" fill="#333"/>
    </g>

    <!-- Check standards -->
    <g transform="translate(15, 240)">
      <rect x="0" y="0" width="190" height="140" fill="rgba(255,255,255,0.1)" rx="4"/>
      <text x="10" y="16" style="font-size:10px; font-weight:bold; fill:#F1C40F;">此层检验标准：</text>
      <text x="10" y="36" class="check-item" fill="#E8DAEF">· 配色在 8 色板内 ✓</text>
      <text x="10" y="54" class="check-item" fill="#E8DAEF">· 与其他角色色板不冲突 ✓</text>
      <text x="10" y="72" class="check-item" fill="#E8DAEF">· 不同背景下剪影仍可辨 ✓</text>
      <text x="10" y="90" class="check-item" fill="#E8DAEF">· 强调色不超过 2 个（红+金）✓</text>
      <text x="10" y="108" class="check-item" fill="#E8DAEF">· 明度层次：亮/中/暗齐全 ✓</text>
      <text x="10" y="126" class="check-item" fill="#E8DAEF">· 与 Gold Standard 对照一致 ✓</text>
    </g>
  </g>

  <!-- Right side: Check standards for each floor -->
  <g transform="translate(20, 450)">
    <rect x="0" y="0" width="760" height="38" fill="#E8F4FD" stroke="#A8D8F0" stroke-width="1" rx="6"/>
    <text x="20" y="18" style="font-size:9px; fill:#333; font-weight:bold;">各层检验标准：</text>
    <text x="135" y="18" style="font-size:8px; fill:#555;">剪影层→辨识度（3米远仍可辨谁是主角/敌人/NPC）</text>
    <text x="20" y="33" style="font-size:8px; fill:#666;">结构层→解剖合理（关节在正确位置，头身比正确，空间关系正确）｜细节层→密度一致（所有角色在这个层的细节量相当，不会一个"画完了"一个"还是草稿"）</text>
  </g>
</svg>
