<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 11px; fill: #666; }
    .col-header { font-size: 14px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .col-sub { font-size: 10px; fill: #fff; text-anchor: middle; opacity: 0.85; }
    .section-title { font-size: 11px; font-weight: bold; fill: #333; text-anchor: middle; }
    .section-sub { font-size: 8px; fill: #999; text-anchor: middle; }
    .item-label { font-size: 8.5px; fill: #555; }
    .item-accent { font-size: 8.5px; fill: #E74C3C; font-weight: bold; }
    .swatch-label { font-size: 7px; fill: #666; text-anchor: middle; }
  </style>

  <text x="400" y="28" class="title" text-anchor="middle">图 制作02.4  主角/NPC/敌人的三层区分——从剪影到细节的三个维度的差异化策略</text>

  <!-- Column 1: Hero -->
  <g transform="translate(15, 50)">
    <rect x="0" y="0" width="250" height="435" fill="#fff" stroke="#27AE60" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="250" height="40" fill="#27AE60" rx="8"/>
    <rect x="0" y="20" width="250" height="20" fill="#27AE60"/>
    <text x="125" y="17" class="col-header">主角</text>
    <text x="125" y="33" class="col-sub">Hero / Protagonist</text>

    <!-- Silhouette section -->
    <g transform="translate(12, 52)">
      <text x="0" y="0" class="section-title">剪影层（3米可辨原则）</text>
      <rect x="0" y="8" width="226" height="85" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <!-- Hero silhouette drawing -->
      <g transform="translate(15, 15)">
        <ellipse cx="30" cy="10" rx="18" ry="16" fill="#1A1A1A"/>
        <rect x="16" y="26" width="28" height="34" fill="#1A1A1A" rx="2"/>
        <rect x="6" y="32" width="12" height="6" fill="#1A1A1A" rx="2"/>
        <rect x="52" y="28" width="4" height="36" fill="#1A1A1A" rx="1"/>
        <rect x="14" y="60" width="12" height="16" fill="#1A1A1A" rx="2"/>
        <rect x="34" y="60" width="12" height="16" fill="#1A1A1A" rx="2"/>
        <path d="M 18,22 L 4,16 L 16,10 Z" fill="#1A1A1A"/>
      </g>
      <g transform="translate(130, 15)">
        <text x="0" y="12" class="item-label">✓ 复杂轮廓</text>
        <text x="0" y="28" class="item-label">✓ 武器/披风→外轮廓特征</text>
        <text x="0" y="44" class="item-label">✓ 不对称→天然辨识度</text>
        <text x="0" y="60" class="item-label">✓ 外轮廓有"破"（剑/角/翼）</text>
        <text x="0" y="76" class="item-accent">关键：闭眼只看剪影→知道是主角</text>
      </g>
    </g>

    <!-- Color palette section -->
    <g transform="translate(12, 152)">
      <text x="0" y="0" class="section-title">色板层（主角专用色系）</text>
      <rect x="0" y="8" width="226" height="65" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <g transform="translate(15, 20)">
        <circle cx="10" cy="10" r="7" fill="#E74C3C"/>
        <circle cx="35" cy="10" r="7" fill="#F1C40F"/>
        <circle cx="60" cy="10" r="7" fill="#3498DB"/>
        <circle cx="85" cy="10" r="7" fill="#D4A574"/>
        <circle cx="110" cy="10" r="7" fill="#6E2C00"/>
        <circle cx="135" cy="10" r="7" fill="#27AE60"/>
        <circle cx="160" cy="10" r="7" fill="#2E4053"/>
        <circle cx="185" cy="10" r="7" fill="#333"/>
      </g>
      <text x="20" y="48" class="item-label">鲜艳色系 · 8-12色 · 高辨识度</text>
      <text x="20" y="62" class="item-accent">色板中必须有 2 个"从背景中跳出来"的强调色</text>
    </g>

    <!-- Detail section -->
    <g transform="translate(12, 228)">
      <text x="0" y="0" class="section-title">细节密度层</text>
      <rect x="0" y="8" width="226" height="45" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <text x="10" y="24" class="item-label">高细节 · 装备花纹/盔甲纹路可见</text>
      <text x="10" y="40" class="item-accent">细节密度最高——玩家注视最久</text>
    </g>

    <!-- Summary box -->
    <g transform="translate(12, 288)">
      <rect x="0" y="0" width="226" height="110" fill="#E8F8F0" stroke="#27AE60" stroke-width="0.5" rx="4"/>
      <text x="10" y="16" style="font-size:10px; font-weight:bold; fill:#27AE60;">主角策略总结：</text>
      <text x="10" y="34" class="item-label">"视觉复杂度 = 视觉重要性"</text>
      <text x="10" y="52" class="item-label">· 最高剪影复杂度——最"破"的轮廓</text>
      <text x="10" y="68" class="item-label">· 最多颜色——最强色板</text>
      <text x="10" y="84" class="item-label">· 最高细节密度——装饰/纹理/渐变</text>
      <text x="10" y="100" class="item-label">· 换色方案最多（装备/等级/皮肤）</text>
    </g>
  </g>

  <!-- Column 2: NPC -->
  <g transform="translate(275, 50)">
    <rect x="0" y="0" width="250" height="435" fill="#fff" stroke="#7F8C8D" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="250" height="40" fill="#7F8C8D" rx="8"/>
    <rect x="0" y="20" width="250" height="20" fill="#7F8C8D"/>
    <text x="125" y="17" class="col-header">NPC</text>
    <text x="125" y="33" class="col-sub">Non-Player Character</text>

    <g transform="translate(12, 52)">
      <text x="0" y="0" class="section-title">剪影层</text>
      <rect x="0" y="8" width="226" height="85" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <g transform="translate(15, 15)">
        <circle cx="30" cy="12" r="14" fill="#1A1A1A"/>
        <rect x="20" y="26" width="20" height="26" fill="#1A1A1A" rx="2"/>
        <rect x="12" y="50" width="14" height="14" fill="#1A1A1A" rx="2"/>
        <rect x="34" y="50" width="14" height="14" fill="#1A1A1A" rx="2"/>
      </g>
      <g transform="translate(130, 15)">
        <text x="0" y="12" class="item-label">○ 简单圆形/人形</text>
        <text x="0" y="28" class="item-label">○ 无武器</text>
        <text x="0" y="44" class="item-label">○ 对称轮廓</text>
        <text x="0" y="60" class="item-label">○ 外轮廓光滑——少"破"</text>
        <text x="0" y="76" class="item-accent">关键：闭眼→知"是人，但不是主角"</text>
      </g>
    </g>

    <g transform="translate(12, 152)">
      <text x="0" y="0" class="section-title">色板层（与主角拉开距离）</text>
      <rect x="0" y="8" width="226" height="65" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <g transform="translate(15, 20)">
        <circle cx="10" cy="10" r="7" fill="#BDC3C7"/>
        <circle cx="35" cy="10" r="7" fill="#95A5A6"/>
        <circle cx="60" cy="10" r="7" fill="#AAB7B8"/>
        <circle cx="85" cy="10" r="7" fill="#D5DBDB"/>
        <circle cx="110" cy="10" r="7" fill="#E5E7E9"/>
      </g>
      <text x="20" y="48" class="item-label">中性色系 · 5-7色 · 低饱和度</text>
      <text x="20" y="62" class="item-accent">绝对不能抢主角的强调色</text>
    </g>

    <g transform="translate(12, 228)">
      <text x="0" y="0" class="section-title">细节密度层</text>
      <rect x="0" y="8" width="226" height="45" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <text x="10" y="24" class="item-label">中低细节 · 纯色块面 · 无纹理</text>
      <text x="10" y="40" class="item-accent">"背景的一部分"——不抢视觉焦点</text>
    </g>

    <g transform="translate(12, 288)">
      <rect x="0" y="0" width="226" height="110" fill="#F2F3F4" stroke="#7F8C8D" stroke-width="0.5" rx="4"/>
      <text x="10" y="16" style="font-size:10px; font-weight:bold; fill:#7F8C8D;">NPC策略总结：</text>
      <text x="10" y="34" class="item-label">"少即是够——不给不必要的信息"</text>
      <text x="10" y="52" class="item-label">· 最简剪影——光滑、对称、无武器</text>
      <text x="10" y="68" class="item-label">· 最少颜色——中性色衬托主角</text>
      <text x="10" y="84" class="item-label">· 最低细节——纯色块面</text>
      <text x="10" y="100" class="item-label">· 换色方案最简——仅 2 套区分 NPC 类别</text>
    </g>
  </g>

  <!-- Column 3: Enemy -->
  <g transform="translate(535, 50)">
    <rect x="0" y="0" width="250" height="435" fill="#fff" stroke="#E74C3C" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="250" height="40" fill="#E74C3C" rx="8"/>
    <rect x="0" y="20" width="250" height="20" fill="#E74C3C"/>
    <text x="125" y="17" class="col-header">敌人</text>
    <text x="125" y="33" class="col-sub">Enemy / Boss</text>

    <g transform="translate(12, 52)">
      <text x="0" y="0" class="section-title">剪影层</text>
      <rect x="0" y="8" width="226" height="85" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <g transform="translate(15, 15)">
        <ellipse cx="30" cy="10" rx="12" ry="14" fill="#1A1A1A"/>
        <polygon points="16,10 12,2 20,6" fill="#1A1A1A"/>
        <polygon points="44,10 48,2 40,6" fill="#1A1A1A"/>
        <rect x="18" y="24" width="24" height="26" fill="#1A1A1A" rx="3"/>
        <rect x="10" y="48" width="14" height="10" fill="#1A1A1A" rx="2"/>
        <rect x="36" y="48" width="14" height="10" fill="#1A1A1A" rx="2"/>
        <rect x="48" y="30" width="6" height="28" fill="#1A1A1A" rx="1"/>
      </g>
      <g transform="translate(130, 15)">
        <text x="0" y="12" class="item-label">✓ 尖锐轮廓·不对称</text>
        <text x="0" y="28" class="item-label">✓ 角/刺/大武器→进攻性外轮廓</text>
        <text x="0" y="44" class="item-label">✓ 外轮廓"破"——多尖刺</text>
        <text x="0" y="60" class="item-label">✓ Boss比主角大 1.5-2.5×</text>
        <text x="0" y="76" class="item-accent">关键：闭眼→知"这是威胁"</text>
      </g>
    </g>

    <g transform="translate(12, 152)">
      <text x="0" y="0" class="section-title">色板层（危险信号色系）</text>
      <rect x="0" y="8" width="226" height="65" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <g transform="translate(15, 20)">
        <circle cx="10" cy="10" r="7" fill="#E74C3C"/>
        <circle cx="35" cy="10" r="7" fill="#C0392B"/>
        <circle cx="60" cy="10" r="7" fill="#8E44AD"/>
        <circle cx="85" cy="10" r="7" fill="#2C3E50"/>
        <circle cx="110" cy="10" r="7" fill="#F39C12"/>
        <circle cx="135" cy="10" r="7" fill="#1A1A1A"/>
      </g>
      <text x="20" y="48" class="item-label">危险色系 · 6-10色 · 集中在武器·眼睛</text>
      <text x="20" y="62" class="item-accent">红色/紫色/黑色→本能威胁信号</text>
    </g>

    <g transform="translate(12, 228)">
      <text x="0" y="0" class="section-title">细节密度层</text>
      <rect x="0" y="8" width="226" height="45" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5" rx="4"/>
      <text x="10" y="24" class="item-label">中高细节 · 集中在武器/眼睛/爪牙</text>
      <text x="10" y="40" class="item-accent">"威胁区高密度，非威胁区低密度"——引导玩家注意力</text>
    </g>

    <g transform="translate(12, 288)">
      <rect x="0" y="0" width="226" height="110" fill="#FDEDEC" stroke="#E74C3C" stroke-width="0.5" rx="4"/>
      <text x="10" y="16" style="font-size:10px; font-weight:bold; fill:#E74C3C;">敌人策略总结：</text>
      <text x="10" y="34" class="item-label">"威胁必须被看见——但不是被欣赏"</text>
      <text x="10" y="52" class="item-label">· 尖锐剪影——角/刺/武器外轮廓</text>
      <text x="10" y="68" class="item-label">· 危险色系——红/紫/黑信号色</text>
      <text x="10" y="84" class="item-label">· 细节集中在威胁区——眼睛亮/武器闪</text>
      <text x="10" y="100" class="item-label">· 换色方案区分等级——绿(小怪)→蓝(精英)→红(Boss)</text>
    </g>
  </g>
</svg>
