<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .col-header { font-size: 13px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .col-sub { font-size: 9px; fill: #fff; text-anchor: middle; opacity: 0.85; }
    .step-label { font-size: 9.5px; fill: #333; text-anchor: middle; font-weight: bold; }
    .step-desc { font-size: 8px; fill: #666; text-anchor: middle; }
    .arrow-label { font-size: 8.5px; fill: #E74C3C; font-weight: bold; text-anchor: middle; }
    .analogy-title { font-size: 9px; font-weight: bold; fill: #E74C3C; }
    .analogy-text { font-size: 8px; fill: #555; }
    .panel { fill: #FAFAFA; stroke: #ccc; stroke-width: 0.8; }
    .sketch { fill: none; stroke: #888; stroke-width: 1.5; }
    .pixel-fill { fill: #555; }
    .pixel-fill-2 { fill: #888; }
    .pixel-fill-3 { fill: #aaa; }
    .grid-line { stroke: #ddd; stroke-width: 0.3; }
    .layer-line { stroke: #3498DB; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Title -->
  <text x="400" y="26" class="title" text-anchor="middle">图 制作02.5  草图→像素的两种转换法——两条入口都从 Step 4 接回管线</text>

  <!-- Vertical divider -->
  <line x1="400" y1="40" x2="400" y2="475" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============ LEFT: 方法一 最近邻缩放 ============ -->
  <g transform="translate(20, 44)">
    <!-- Header bar -->
    <rect x="0" y="0" width="370" height="34" fill="#3498DB" rx="6"/>
    <rect x="0" y="17" width="370" height="17" fill="#3498DB"/>
    <text x="185" y="15" class="col-header">方法一：最近邻缩放</text>
    <text x="185" y="29" class="col-sub">Nearest Neighbor Scaling</text>

    <!-- Step 1: high-res smooth sketch -->
    <g transform="translate(35, 48)">
      <text x="60" y="10" class="step-label">① 高分辨率草图</text>
      <rect x="0" y="16" width="120" height="78" class="panel" rx="4"/>
      <g transform="translate(0,4)">
        <ellipse cx="60" cy="40" rx="17" ry="15" class="sketch"/>
        <path d="M 44,54 Q 60,50 76,54 L 76,80 Q 60,84 44,80 Z" class="sketch"/>
        <line x1="44" y1="60" x2="36" y2="72" class="sketch"/>
        <line x1="76" y1="60" x2="84" y2="72" class="sketch"/>
        <circle cx="54" cy="39" r="1.4" fill="#888"/>
        <circle cx="66" cy="39" r="1.4" fill="#888"/>
      </g>
      <text x="60" y="108" class="step-desc">连续笔触 · 高清 · 几十万像素</text>
    </g>

    <!-- Arrow down with method label -->
    <g transform="translate(95, 152)">
      <text x="0" y="0" class="arrow-label">Nearest Neighbor</text>
      <text x="0" y="11" class="arrow-label">缩放到 32×32</text>
      <line x1="0" y1="16" x2="0" y2="32" stroke="#E74C3C" stroke-width="1.5"/>
      <polygon points="-4,30 4,30 0,36" fill="#E74C3C"/>
    </g>

    <!-- Step 2: downsampled blocky result -->
    <g transform="translate(35, 196)">
      <text x="60" y="10" class="step-label">② 降采样结果（待手修）</text>
      <rect x="0" y="16" width="120" height="78" class="panel" rx="4"/>
      <g transform="translate(36,22)">
        <!-- blocky 8x8-ish character from NN downsampling -->
        <rect x="14" y="2" width="10" height="9" class="pixel-fill"/>
        <rect x="18" y="11" width="2" height="2" class="pixel-fill-3"/>
        <rect x="14" y="13" width="12" height="18" class="pixel-fill"/>
        <rect x="10" y="18" width="4" height="9" class="pixel-fill-2"/>
        <rect x="26" y="18" width="4" height="9" class="pixel-fill-2"/>
        <rect x="14" y="31" width="5" height="13" class="pixel-fill"/>
        <rect x="21" y="31" width="5" height="13" class="pixel-fill"/>
        <!-- light grid overlay suggesting pixels -->
        <g class="grid-line">
          <line x1="0" y1="0" x2="44" y2="0"/>
          <line x1="0" y1="11" x2="44" y2="11"/>
          <line x1="0" y1="22" x2="44" y2="22"/>
          <line x1="0" y1="33" x2="44" y2="33"/>
          <line x1="0" y1="44" x2="44" y2="44"/>
          <line x1="0" y1="0" x2="0" y2="44"/>
          <line x1="11" y1="0" x2="11" y2="44"/>
          <line x1="22" y1="0" x2="22" y2="44"/>
          <line x1="33" y1="0" x2="33" y2="44"/>
          <line x1="44" y1="0" x2="44" y2="44"/>
        </g>
      </g>
      <text x="60" y="108" class="step-desc">硬边 · 有噪点 · 清理才是真活</text>
    </g>

    <!-- Analogy box -->
    <g transform="translate(15, 320)">
      <rect x="0" y="0" width="340" height="66" fill="#E8F4FD" stroke="#A8D8F0" stroke-width="0.8" rx="4"/>
      <text x="10" y="16" class="analogy-title">程序员类比：</text>
      <text x="10" y="32" class="analogy-text">= image resize 选 INTER_NEAREST。每个输出像素</text>
      <text x="10" y="44" class="analogy-text">取最近源像素颜色——不混合、不平均。必然丢信息</text>
      <text x="10" y="56" class="analogy-text">（32×32 只 1024 像素）。绝不用 Bilinear/Bicubic。</text>
    </g>
  </g>

  <!-- ============ RIGHT: 方法二 图层描摹 ============ -->
  <g transform="translate(410, 44)">
    <!-- Header bar -->
    <rect x="0" y="0" width="370" height="34" fill="#27AE60" rx="6"/>
    <rect x="0" y="17" width="370" height="17" fill="#27AE60"/>
    <text x="185" y="15" class="col-header">方法二：图层描摹</text>
    <text x="185" y="29" class="col-sub">Layer Tracing</text>

    <!-- Step 1: sketch on bottom layer + tracing on top -->
    <g transform="translate(35, 48)">
      <text x="60" y="10" class="step-label">① 草图底层 + 上层描线</text>
      <rect x="0" y="16" width="120" height="78" class="panel" rx="4"/>
      <g transform="translate(0,4)">
        <!-- faded sketch (bottom layer) -->
        <g opacity="0.35">
          <ellipse cx="60" cy="40" rx="17" ry="15" class="sketch"/>
          <path d="M 44,54 Q 60,50 76,54 L 76,80 Q 60,84 44,80 Z" class="sketch"/>
          <line x1="44" y1="60" x2="36" y2="72" class="sketch"/>
          <line x1="76" y1="60" x2="84" y2="72" class="sketch"/>
        </g>
        <!-- tracing on top layer (blue, pixel-aligned rects/lines) -->
        <rect x="44" y="26" width="14" height="11" fill="none" class="layer-line"/>
        <line x1="44" y1="37" x2="44" y2="52" class="layer-line"/>
        <line x1="58" y1="37" x2="58" y2="52" class="layer-line"/>
        <line x1="44" y1="52" x2="58" y2="52" class="layer-line"/>
        <rect x="52" y="38" width="2" height="2" fill="#3498DB"/>
        <rect x="56" y="38" width="2" height="2" fill="#3498DB"/>
        <line x1="44" y1="42" x2="38" y2="52" class="layer-line"/>
        <line x1="58" y1="42" x2="64" y2="52" class="layer-line"/>
        <!-- pencil icon doing the tracing -->
        <text x="92" y="34" style="font-size:7px; fill:#3498DB; font-weight:bold;">描</text>
        <text x="92" y="44" style="font-size:7px; fill:#3498DB; font-weight:bold;">摹</text>
        <text x="92" y="54" style="font-size:7px; fill:#3498DB; font-weight:bold;">层</text>
      </g>
      <text x="60" y="108" class="step-desc">草图半透明 · 逐格落像素</text>
    </g>

    <!-- Arrow down with method label -->
    <g transform="translate(95, 152)">
      <text x="0" y="0" class="arrow-label">隐藏草图层</text>
      <text x="0" y="11" class="arrow-label">保留描摹像素</text>
      <line x1="0" y1="16" x2="0" y2="32" stroke="#E74C3C" stroke-width="1.5"/>
      <polygon points="-4,30 4,30 0,36" fill="#E74C3C"/>
    </g>

    <!-- Step 2: clean pixel result -->
    <g transform="translate(35, 196)">
      <text x="60" y="10" class="step-label">② 干净像素结果</text>
      <rect x="0" y="16" width="120" height="78" class="panel" rx="4"/>
      <g transform="translate(36,22)">
        <rect x="14" y="2" width="10" height="9" class="pixel-fill"/>
        <rect x="18" y="11" width="2" height="2" class="pixel-fill-3"/>
        <rect x="14" y="13" width="12" height="18" class="pixel-fill"/>
        <rect x="10" y="18" width="4" height="9" class="pixel-fill-2"/>
        <rect x="26" y="18" width="4" height="9" class="pixel-fill-2"/>
        <rect x="14" y="31" width="5" height="13" class="pixel-fill"/>
        <rect x="21" y="31" width="5" height="13" class="pixel-fill"/>
        <g class="grid-line">
          <line x1="0" y1="0" x2="44" y2="0"/>
          <line x1="0" y1="11" x2="44" y2="11"/>
          <line x1="0" y1="22" x2="44" y2="22"/>
          <line x1="0" y1="33" x2="44" y2="33"/>
          <line x1="0" y1="44" x2="44" y2="44"/>
          <line x1="0" y1="0" x2="0" y2="44"/>
          <line x1="11" y1="0" x2="11" y2="44"/>
          <line x1="22" y1="0" x2="22" y2="44"/>
          <line x1="33" y1="0" x2="33" y2="44"/>
          <line x1="44" y1="0" x2="44" y2="44"/>
        </g>
      </g>
      <text x="60" y="108" class="step-desc">每像素都是你的决策 · 无噪点</text>
    </g>

    <!-- Analogy box -->
    <g transform="translate(15, 320)">
      <rect x="0" y="0" width="340" height="66" fill="#E8F8F0" stroke="#A8D8F0" stroke-width="0.8" rx="4"/>
      <text x="10" y="16" class="analogy-title">程序员类比：</text>
      <text x="10" y="32" class="analogy-text">= vector trace（位图转矢量）的手动版。保留草图的</text>
      <text x="10" y="44" class="analogy-text">"路径数据"（构图/比例/姿态），换掉"渲染分辨率"——</text>
      <text x="10" y="56" class="analogy-text">从连续笔触重采样成离散像素。慢但保留像素决策权。</text>
    </g>
  </g>

  <!-- Bottom note: both converge to Step 4 -->
  <g transform="translate(20, 432)">
    <rect x="0" y="0" width="760" height="38" fill="#F9E79F" stroke="#F1C40F" stroke-width="0.8" rx="4"/>
    <text x="380" y="16" style="font-size:9px; fill:#7D6608; text-anchor:middle; font-weight:bold;">两条入口都最终汇入同一条 10 步生产线——转完后回到 Step 4 加内部结构</text>
    <text x="380" y="30" style="font-size:8px; fill:#7D6608; text-anchor:middle;">草图细节多想保留构图 → 描摹法 ｜ 草图只是粗略示意想快速起型 → 缩放法</text>
  </g>
</svg>
