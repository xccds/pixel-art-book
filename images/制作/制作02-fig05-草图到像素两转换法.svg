<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .col-header { font-size: 13px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .col-sub { font-size: 9px; fill: #fff; text-anchor: middle; opacity: 0.85; }
    .step-label { font-size: 9.5px; fill: #333; text-anchor: middle; font-weight: bold; }
    .step-desc { font-size: 8px; fill: #666; text-anchor: middle; }
    .arrow-label { font-size: 8.5px; fill: #E74C3C; font-weight: bold; text-anchor: middle; }
    .analogy-title { font-size: 9px; font-weight: bold; fill: #E74C3C; }
    .analogy-text { font-size: 8px; fill: #555; }
    .panel { fill: #FAFAFA; stroke: #ccc; stroke-width: 0.8; }
    .sketch { fill: none; stroke: #888; stroke-width: 1.5; }
    .pixel-fill { fill: #555; }
    .pixel-fill-2 { fill: #888; }
    .pixel-fill-3 { fill: #aaa; }
    .grid-line { stroke: #ddd; stroke-width: 0.3; }
    .layer-line { stroke: #3498DB; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Title -->
  <text x="400" y="26" class="title" text-anchor="middle">图 制作02.5  草图→像素的两种转换法——两条入口都从 Step 4 接回管线</text>

  <!-- Vertical divider -->
  <line x1="400" y1="40" x2="400" y2="475" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============ LEFT: 方法一 最近邻缩放 ============ -->

  <!-- ============ RIGHT: 方法二 图层描摹 ============ -->

  <!-- Bottom note: both converge to Step 4 -->
  <g transform="translate(20, 432)">
    <rect x="0" y="0" width="760" height="38" fill="#F9E79F" stroke="#F1C40F" stroke-width="0.8" rx="4"/>
    <text x="380" y="16" style="font-size:9px; fill:#7D6608; text-anchor:middle; font-weight:bold;">两条入口都最终汇入同一条 10 步生产线——转完后回到 Step 4 加内部结构</text>
    <text x="380" y="30" style="font-size:8px; fill:#7D6608; text-anchor:middle;">草图细节多想保留构图 → 描摹法 ｜ 草图只是粗略示意想快速起型 → 缩放法</text>
  </g>
</svg>
