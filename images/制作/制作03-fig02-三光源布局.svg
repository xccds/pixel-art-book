<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 10px; fill: #888; }
    .light-name { font-size: 12px; font-weight: bold; }
    .light-desc { font-size: 9px; fill: #555; }
  </style>

  <text x="400" y="22" class="title" text-anchor="middle">三光源布局——Key / Fill / Ambient</text>
  <text x="400" y="37" class="subtitle" text-anchor="middle">三光源不是三个灯，是三个不同功能的光线角色</text>

  <!-- Scene floor -->
  <rect x="80" y="230" width="640" height="110" fill="#E8E0D5" rx="2"/>

  <!-- Ambient glow (subtle overall) -->
  <rect x="80" y="60" width="640" height="170" fill="#D4E0F0" opacity="0.15"/>

  <!-- Character silhouette in center -->
  <g transform="translate(400, 160)">
    <!-- Shadow on ground from Key light -->
    <ellipse cx="35" cy="72" rx="30" ry="8" fill="#C0B090" opacity="0.6"/>

    <!-- Body -->
    <rect x="-12" y="10" width="24" height="35" fill="#5D6D7E" rx="3"/>
    <!-- Head -->
    <ellipse cx="0" cy="2" rx="14" ry="16" fill="#D4A574"/>
    <!-- Eyes -->
    <circle cx="-5" cy="0" r="2" fill="#2C3E50"/>
    <circle cx="6" cy="0" r="2" fill="#2C3E50"/>
    <!-- Legs -->
    <rect x="-10" y="45" width="8" height="22" fill="#2E4053" rx="2"/>
    <rect x="2" y="45" width="8" height="22" fill="#2E4053" rx="2"/>
    <!-- Arms -->
    <rect x="-20" y="14" width="8" height="20" fill="#5D6D7E" rx="2"/>
    <rect x="12" y="14" width="8" height="20" fill="#5D6D7E" rx="2"/>
  </g>

  <!-- ===== Key Light (top-right, warm) ===== -->
  <!-- Arrow from light source to character -->
  <g>
    <line x1="650" y1="55" x2="435" y2="155" stroke="#F1C40F" stroke-width="2" stroke-dasharray="8,4" opacity="0.8"/>
    <polygon points="435,155 443,147 437,153 431,151" fill="#F1C40F" opacity="0.8"/>

    <!-- Light source icon -->
    <g transform="translate(670, 45)">
      <circle cx="0" cy="0" r="16" fill="#F1C40F" opacity="0.3"/>
      <circle cx="0" cy="0" r="10" fill="#F1C40F" opacity="0.7"/>
      <circle cx="0" cy="0" r="5" fill="#FFF9C4"/>
      <line x1="-18" y1="-18" x2="-12" y2="-12" stroke="#F1C40F" stroke-width="2"/>
      <line x1="-22" y1="-8" x2="-14" y2="-2" stroke="#F1C40F" stroke-width="2"/>
      <line x1="-10" y1="-20" x2="-4" y2="-12" stroke="#F1C40F" stroke-width="2"/>
    </g>

    <!-- Label -->
    <text x="680" y="78" class="light-name" fill="#F39C12">Key 主光源</text>
    <text x="680" y="92" class="light-desc">右上 30-45°</text>
    <text x="680" y="104" class="light-desc">暖色 · 产生阴影</text>
    <text x="680" y="116" class="light-desc">定义形体与方向</text>
  </g>

  <!-- ===== Fill Light (bottom-left, cool) ===== -->
  <g>
    <line x1="180" y1="310" x2="340" y2="210" stroke="#85C1E9" stroke-width="2" stroke-dasharray="8,4" opacity="0.8"/>
    <polygon points="340,210 332,218 338,214 344,216" fill="#85C1E9" opacity="0.8"/>

    <g transform="translate(160, 320)">
      <circle cx="0" cy="0" r="14" fill="#85C1E9" opacity="0.3"/>
      <circle cx="0" cy="0" r="8" fill="#85C1E9" opacity="0.7"/>
      <circle cx="0" cy="0" r="4" fill="#D6EAF8"/>
      <line x1="16" y1="16" x2="10" y2="10" stroke="#85C1E9" stroke-width="2"/>
      <line x1="20" y1="6" x2="12" y2="0" stroke="#85C1E9" stroke-width="2"/>
      <line x1="8" y1="18" x2="2" y2="12" stroke="#85C1E9" stroke-width="2"/>
    </g>

    <text x="148" y="350" class="light-name" fill="#2980B9" text-anchor="end">Fill 补光</text>
    <text x="148" y="364" class="light-desc" text-anchor="end">主光对面（左下）</text>
    <text x="148" y="376" class="light-desc" text-anchor="end">冷色 · 强度 0.3-0.5</text>
    <text x="148" y="388" class="light-desc" text-anchor="end">照亮暗面不消明暗</text>
  </g>

  <!-- ===== Ambient Light (subtle, center) ===== -->
  <g>
    <!-- Dotted circle indicating global ambient -->
    <ellipse cx="400" cy="180" rx="280" ry="120" fill="none" stroke="#95A5A6" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>

    <text x="400" y="55" class="light-name" fill="#7F8C8D" text-anchor="middle">Ambient 环境光</text>
    <text x="400" y="69" class="light-desc" text-anchor="middle">全局均匀 · 无方向 · 强度 0.1-0.2</text>
    <text x="400" y="81" class="light-desc" text-anchor="middle">消除死黑 · 给画面最低亮度</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(80, 295)">
    <rect x="0" y="0" width="640" height="30" rx="3" fill="#F9E79F" stroke="#F1C40F" stroke-width="0.5"/>
    <text x="200" y="13" style="font-size:8px;fill:#7D6608;text-anchor:middle;font-weight:bold;">Key 定义方向 + Fill 消除死黑 + Ambient 设定最低亮度</text>
    <text x="480" y="21" style="font-size:8px;fill:#7D6608;text-anchor:middle;">三者独立调节 = 场景光照的三个"参数旋钮"</text>
  </g>
</svg>
