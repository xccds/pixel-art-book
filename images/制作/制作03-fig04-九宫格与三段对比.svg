<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 10px; fill: #666; }
    .col-header { font-size: 13px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .col-sub { font-size: 9px; fill: #fff; text-anchor: middle; opacity: 0.85; }
    .cell-label { font-size: 9px; fill: #333; text-anchor: middle; font-weight: bold; }
    .cell-sub { font-size: 7.5px; fill: #666; text-anchor: middle; }
    .seg-label { font-size: 9px; fill: #333; text-anchor: middle; font-weight: bold; }
    .seg-sub { font-size: 7.5px; fill: #666; text-anchor: middle; }
    .analogy-title { font-size: 9px; font-weight: bold; fill: #E74C3C; }
    .analogy-text { font-size: 8px; fill: #555; }
    .pros-label { font-size: 8.5px; fill: #27AE60; font-weight: bold; }
    .cons-label { font-size: 8.5px; fill: #E74C3C; font-weight: bold; }
    .meta-text { font-size: 8px; fill: #555; }
  </style>

  <!-- Title -->
  <text x="400" y="26" class="title" text-anchor="middle">图 制作03.4  9-Slice vs 3-Tile——两种地形过渡方法的工程量与效果对比</text>
  <text x="400" y="42" class="subtitle" text-anchor="middle">左：9-Slice 切九宫格适配任意尺寸 2D 地形 · 右：3-Tile 切三段适合 1D 重复边界</text>

  <!-- Vertical divider -->
  <line x1="400" y1="52" x2="400" y2="475" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============ LEFT: 9-Slice ============ -->
  <g transform="translate(20, 56)">
    <!-- Header bar -->
    <rect x="0" y="0" width="370" height="34" fill="#3498DB" rx="6"/>
    <rect x="0" y="17" width="370" height="17" fill="#3498DB"/>
    <text x="185" y="15" class="col-header">9-Slice（九宫格切片）</text>
    <text x="185" y="29" class="col-sub">8-12 个过渡 tile · 任意形状 2D 地形</text>

    <!-- 3x3 grid -->
    <g transform="translate(60, 48)">
      <text x="125" y="10" class="seg-label">3×3 九宫格切分</text>
      <!-- 9 cells, each 70x50, total 210x150 -->
      <!-- Corners (fixed) - solid darker -->
      <rect x="0" y="16" width="70" height="50" fill="#2E86C1" stroke="#1B4F72" stroke-width="1"/>
      <rect x="140" y="16" width="70" height="50" fill="#2E86C1" stroke="#1B4F72" stroke-width="1"/>
      <rect x="0" y="116" width="70" height="50" fill="#2E86C1" stroke="#1B4F72" stroke-width="1"/>
      <rect x="140" y="116" width="70" height="50" fill="#2E86C1" stroke="#1B4F72" stroke-width="1"/>
      <!-- Edges (stretch) - medium with arrows -->
      <rect x="70" y="16" width="70" height="50" fill="#AED6F1" stroke="#1B4F72" stroke-width="1"/>
      <rect x="70" y="116" width="70" height="50" fill="#AED6F1" stroke="#1B4F72" stroke-width="1"/>
      <rect x="0" y="66" width="70" height="50" fill="#AED6F1" stroke="#1B4F72" stroke-width="1"/>
      <rect x="140" y="66" width="70" height="50" fill="#AED6F1" stroke="#1B4F72" stroke-width="1"/>
      <!-- Center (fill) - light -->
      <rect x="70" y="66" width="70" height="50" fill="#EAF2F8" stroke="#1B4F72" stroke-width="1"/>

      <!-- Cell labels -->
      <text x="35" y="44" class="cell-label" fill="#fff">角</text>
      <text x="35" y="56" class="cell-sub" fill="#fff">固定</text>
      <text x="175" y="44" class="cell-label" fill="#fff">角</text>
      <text x="175" y="56" class="cell-sub" fill="#fff">固定</text>
      <text x="35" y="144" class="cell-label" fill="#fff">角</text>
      <text x="35" y="156" class="cell-sub" fill="#fff">固定</text>
      <text x="175" y="144" class="cell-label" fill="#fff">角</text>
      <text x="175" y="156" class="cell-sub" fill="#fff">固定</text>

      <text x="105" y="44" class="cell-label">边</text>
      <text x="105" y="56" class="cell-sub">拉伸</text>
      <text x="105" y="144" class="cell-label">边</text>
      <text x="105" y="156" class="cell-sub">拉伸</text>
      <text x="35" y="94" class="cell-label">边</text>
      <text x="35" y="106" class="cell-sub">拉伸</text>
      <text x="175" y="94" class="cell-label">边</text>
      <text x="175" y="106" class="cell-sub">拉伸</text>

      <text x="105" y="94" class="cell-label">中心</text>
      <text x="105" y="106" class="cell-sub">填充</text>

      <!-- Stretch arrows on edges -->
      <line x1="105" y1="22" x2="105" y2="62" stroke="#E74C3C" stroke-width="1" marker-end="url(#arrUp)" marker-start="url(#arrDown)" opacity="0.6"/>
      <line x1="105" y1="122" x2="105" y2="162" stroke="#E74C3C" stroke-width="1" marker-end="url(#arrUp)" marker-start="url(#arrDown)" opacity="0.6"/>
    </g>

    <!-- Arrow markers -->
    <defs>
      <marker id="arrUp" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
        <path d="M 0 5 L 10 0 L 10 10 z" fill="#E74C3C" opacity="0.6"/>
      </marker>
      <marker id="arrDown" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
        <path d="M 10 5 L 0 0 L 0 10 z" fill="#E74C3C" opacity="0.6"/>
      </marker>
    </defs>

    <!-- Pros/Cons -->
    <g transform="translate(15, 240)">
      <text x="0" y="0" class="pros-label">优点：</text>
      <text x="0" y="14" class="meta-text">· 任意形状地形区域（俯视角草地/水池）</text>
      <text x="0" y="26" class="meta-text">· 保留光源方向一致性</text>
      <text x="0" y="38" class="meta-text">· 视觉效果最自然</text>
      <text x="0" y="56" class="cons-label">缺点：</text>
      <text x="0" y="70" class="meta-text">· 需制作 8-12 个过渡 tile</text>
      <text x="0" y="82" class="meta-text">· 拼接要注意光源方向</text>
    </g>

    <!-- Analogy box -->
    <g transform="translate(15, 340)">
      <rect x="0" y="0" width="340" height="72" fill="#E8F4FD" stroke="#A8D8F0" stroke-width="0.8" rx="4"/>
      <text x="10" y="16" class="analogy-title">程序员类比：</text>
      <text x="10" y="32" class="analogy-text">9-Slice = CSS border-image——九宫格切片，四角</text>
      <text x="10" y="44" class="analogy-text">固定、四边拉伸、中心填充。border-image: url()</text>
      <text x="10" y="56" class="analogy-text">30 fill; 一张过渡 tile 适配任意尺寸地形块。</text>
      <text x="10" y="68" class="analogy-text">Unity Sprite Editor 9-Slice / Godot NinePatchRect</text>
    </g>
  </g>

  <!-- ============ RIGHT: 3-Tile ============ -->
  <g transform="translate(410, 56)">
    <!-- Header bar -->
    <rect x="0" y="0" width="370" height="34" fill="#27AE60" rx="6"/>
    <rect x="0" y="17" width="370" height="17" fill="#27AE60"/>
    <text x="185" y="15" class="col-header">3-Tile（三段切片）</text>
    <text x="185" y="29" class="col-sub">3 个过渡 tile · 1D 重复边界（围墙/平台）</text>

    <!-- 3 segments horizontal -->
    <g transform="translate(35, 48)">
      <text x="150" y="10" class="seg-label">左 / 中重复 / 右 三段</text>
      <!-- Left cap -->
      <rect x="0" y="16" width="70" height="60" fill="#27AE60" stroke="#1E8449" stroke-width="1"/>
      <!-- Mid repeat (3 copies shown) -->
      <rect x="70" y="16" width="60" height="60" fill="#A9DFBF" stroke="#1E8449" stroke-width="1"/>
      <rect x="130" y="16" width="60" height="60" fill="#A9DFBF" stroke="#1E8449" stroke-width="1"/>
      <rect x="190" y="16" width="60" height="60" fill="#A9DFBF" stroke="#1E8449" stroke-width="1"/>
      <!-- Right cap -->
      <rect x="250" y="16" width="70" height="60" fill="#27AE60" stroke="#1E8449" stroke-width="1"/>

      <!-- Segment labels -->
      <text x="35" y="44" class="cell-label" fill="#fff">左端</text>
      <text x="35" y="56" class="cell-sub" fill="#fff">cap</text>
      <text x="160" y="44" class="cell-label">中间</text>
      <text x="160" y="56" class="cell-sub">repeat-x</text>
      <text x="285" y="44" class="cell-label" fill="#fff">右端</text>
      <text x="285" y="56" class="cell-sub" fill="#fff">cap</text>

      <!-- repeat arrows under mid -->
      <g transform="translate(70, 82)">
        <line x1="0" y1="0" x2="180" y2="0" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
        <polygon points="180,-3 186,0 180,3" fill="#E74C3C"/>
        <text x="90" y="14" class="cell-sub" fill="#E74C3C">可任意长度</text>
      </g>

      <!-- Diagonal cut detail (how the transition tile is made) -->
      <g transform="translate(0, 110)">
        <text x="160" y="0" class="seg-label">过渡 tile 制作：对角线切割 + 翻转</text>
        <!-- Tile 1: diagonal -->
        <g transform="translate(30, 8)">
          <rect x="0" y="0" width="44" height="44" fill="#A9DFBF" stroke="#1E8449" stroke-width="1"/>
          <polygon points="0,0 44,0 44,44" fill="#27AE60"/>
          <line x1="0" y1="44" x2="44" y2="0" stroke="#1E8449" stroke-width="1.2"/>
          <text x="22" y="56" class="cell-sub">① 对角线</text>
        </g>
        <!-- Tile 2: flipped -->
        <g transform="translate(130, 8)">
          <rect x="0" y="0" width="44" height="44" fill="#A9DFBF" stroke="#1E8449" stroke-width="1"/>
          <polygon points="0,0 44,0 0,44" fill="#27AE60"/>
          <line x1="0" y1="44" x2="44" y2="0" stroke="#1E8449" stroke-width="1.2"/>
          <text x="22" y="56" class="cell-sub">② 水平翻转</text>
        </g>
        <!-- Tile 3: corner -->
        <g transform="translate(230, 8)">
          <rect x="0" y="0" width="44" height="44" fill="#27AE60" stroke="#1E8449" stroke-width="1"/>
          <path d="M 0 0 L 44 0 L 44 22 Q 22 22 22 44 L 0 44 Z" fill="#A9DFBF"/>
          <text x="22" y="56" class="cell-sub">③ 逆方向角</text>
        </g>
      </g>
    </g>

    <!-- Pros/Cons -->
    <g transform="translate(15, 240)">
      <text x="0" y="0" class="pros-label">优点：</text>
      <text x="0" y="14" class="meta-text">· 工作量 1/3（3 tile vs 9-Slice 8-12）</text>
      <text x="0" y="26" class="meta-text">· 适合 1D 重复（围墙/平台边缘）</text>
      <text x="0" y="38" class="meta-text">· 独立开发者快速起型</text>
      <text x="0" y="56" class="cons-label">缺点：</text>
      <text x="0" y="70" class="meta-text">· 翻转 tile 光源方向反转（穿帮）</text>
      <text x="0" y="82" class="meta-text">· 只适合 1D，不适合 2D 任意形状</text>
    </g>

    <!-- Analogy box -->
    <g transform="translate(15, 340)">
      <rect x="0" y="0" width="340" height="72" fill="#E8F8F0" stroke="#A8D8F0" stroke-width="0.8" rx="4"/>
      <text x="10" y="16" class="analogy-title">程序员类比：</text>
      <text x="10" y="32" class="analogy-text">3-Tile = 简化版 9-Slice，只切左/中/右三段——</text>
      <text x="10" y="44" class="analogy-text">适合 1D 重复（围墙/平台），像 CSS 的 repeat-x。</text>
      <text x="10" y="56" class="analogy-text">按钮只切左圆角/中间拉伸/右圆角三段，不需要</text>
      <text x="10" y="68" class="analogy-text">九宫格四个角都独立。3-Tile 是 9-Slice 的 1D 降级版。</text>
    </g>
  </g>

  <!-- Bottom note: how to choose -->
  <g transform="translate(20, 432)">
    <rect x="0" y="0" width="760" height="38" fill="#F9E79F" stroke="#F1C40F" stroke-width="0.8" rx="4"/>
    <text x="380" y="16" style="font-size:9px; fill:#7D6608; text-anchor:middle; font-weight:bold;">怎么选？2D 任意形状地形 → 9-Slice ｜ 1D 重复边界 → 3-Tile ｜ 预算紧先 3-Tile 跑起来</text>
    <text x="380" y="30" style="font-size:8px; fill:#7D6608; text-anchor:middle;">3-Tile 翻转 tile 的光源穿帮要么补非翻转版、要么手动修光影——这是它牺牲精度换工作量的代价</text>
  </g>
</svg>
