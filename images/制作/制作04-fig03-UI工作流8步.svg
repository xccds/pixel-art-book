<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .step-num { font-size: 13px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .step-name { font-size: 11px; font-weight: bold; fill: #333; }
    .step-desc { font-size: 9px; fill: #555; }
    .arrow { stroke: #ccc; stroke-width: 1.5; fill: none; }
  </style>

  <text x="400" y="22" class="title" text-anchor="middle">8 步 UI 工作顺序——从布局到真人测试</text>

  <!-- ===== LEFT column: Steps 1-4 ===== -->
  <!-- Step 1 -->
  <g transform="translate(25, 42)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#E74C3C"/>
    <rect x="4" y="0" width="4" height="52" fill="#E74C3C"/>
    <text x="22" y="18" class="step-name">布局层次 Layout</text>
    <text x="22" y="34" class="step-desc">决定信息层级——核心信息（血/魔）固定四角，次要信息中央偏下，临时信息顶部弹出</text>
  </g>

  <line x1="207" y1="94" x2="207" y2="102" class="arrow"/>
  <polygon points="207,108 202,100 212,100" fill="#ccc"/>

  <!-- Step 2 -->
  <g transform="translate(25, 112)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#E67E22"/>
    <rect x="4" y="0" width="4" height="52" fill="#E67E22"/>
    <text x="22" y="18" class="step-name">安全区 Safe Zone</text>
    <text x="22" y="34" class="step-desc">16:9 安全区≈90%屏幕面积 / 手机≈85%（避开刘海圆角手势条）</text>
  </g>

  <line x1="207" y1="164" x2="207" y2="172" class="arrow"/>
  <polygon points="207,178 202,170 212,170" fill="#ccc"/>

  <!-- Step 3 -->
  <g transform="translate(25, 182)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#27AE60"/>
    <rect x="4" y="0" width="4" height="52" fill="#27AE60"/>
    <text x="22" y="18" class="step-name">先建 HUD First</text>
    <text x="22" y="34" class="step-desc">引擎中先放矩形色块占位让数据流出来，再替换为美术——先功能后视觉</text>
  </g>

  <line x1="207" y1="234" x2="207" y2="242" class="arrow"/>
  <polygon points="207,248 202,240 212,240" fill="#ccc"/>

  <!-- Step 4 -->
  <g transform="translate(25, 252)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#3498DB"/>
    <rect x="4" y="0" width="4" height="52" fill="#3498DB"/>
    <text x="22" y="18" class="step-name">测试可读性 Readability Test</text>
    <text x="22" y="34" class="step-desc">退后2米看屏幕 / 强烈背光下看 / 高速移动中读HUD数字——三项全过</text>
  </g>

  <!-- ===== RIGHT column: Steps 5-8 ===== -->
  <!-- Step 5 -->
  <g transform="translate(410, 42)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#8E44AD"/>
    <rect x="4" y="0" width="4" height="52" fill="#8E44AD"/>
    <text x="22" y="18" class="step-name">色盲模拟 Color Blindness</text>
    <text x="22" y="34" class="step-desc">模拟红/绿色盲——关颜色只看明度，灰度中信息仍可辨识→通过</text>
  </g>

  <line x1="592" y1="94" x2="592" y2="102" class="arrow"/>
  <polygon points="592,108 587,100 597,100" fill="#ccc"/>

  <!-- Step 6 -->
  <g transform="translate(410, 112)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#F1C40F"/>
    <rect x="4" y="0" width="4" height="52" fill="#F1C40F"/>
    <text x="22" y="18" class="step-name">添加 Juice 反馈</text>
    <text x="22" y="34" class="step-desc">血量低于25%闪红抖动 / 升级弹窗动画 / 物品飞入——前5步全过之后再加</text>
  </g>

  <line x1="592" y1="164" x2="592" y2="172" class="arrow"/>
  <polygon points="592,178 587,170 597,170" fill="#ccc"/>

  <!-- Step 7 -->
  <g transform="translate(410, 182)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#1ABC9C"/>
    <rect x="4" y="0" width="4" height="52" fill="#1ABC9C"/>
    <text x="22" y="18" class="step-name">集成无障碍 Accessibility</text>
    <text x="22" y="34" class="step-desc">HUD缩放 / 对比度增强 / 色觉辅助 / 字体大小——让更多人玩到的基础设施</text>
  </g>

  <line x1="592" y1="234" x2="592" y2="242" class="arrow"/>
  <polygon points="592,248 587,240 597,240" fill="#ccc"/>

  <!-- Step 8 -->
  <g transform="translate(410, 252)">
    <rect x="0" y="0" width="365" height="52" rx="4" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="52" rx="4" fill="#E74C3C"/>
    <rect x="4" y="0" width="4" height="52" fill="#E74C3C"/>
    <text x="22" y="18" class="step-name">观察真人使用 Live Observation</text>
    <text x="22" y="34" class="step-desc">找人玩不说话只看——在哪犹豫？在哪点错？在哪反复看UI？在哪忽略提示？</text>
  </g>

  <!-- Bottom principle -->
  <rect x="25" y="325" width="750" height="24" rx="4" fill="#E8F4FD"/>
  <text x="400" y="341" style="font-size:9px;fill:#2E6BA6;text-anchor:middle;font-weight:bold;">核心：前 5 步不通过绝不跳到下一步——UI 是功能不是美术，跳步的代价是返工</text>
</svg>
