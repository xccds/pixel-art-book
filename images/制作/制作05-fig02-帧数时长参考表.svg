<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .header-text { font-size: 10px; font-weight: bold; fill: #fff; }
    .action-name { font-size: 11px; font-weight: bold; fill: #333; }
    .action-sub { font-size: 9px; fill: #888; }
    .cell-main { font-size: 10px; font-weight: bold; fill: #333; text-anchor: middle; }
    .cell-sub { font-size: 8px; fill: #888; text-anchor: middle; }
    .tag-fast { font-size: 8px; fill: #E74C3C; font-weight: bold; text-anchor: middle; }
    .tag-slow { font-size: 8px; fill: #3498DB; font-weight: bold; text-anchor: middle; }
    .tag-hold { font-size: 8px; fill: #F39C12; font-weight: bold; text-anchor: middle; }
    .note { font-size: 9px; fill: #555; }
  </style>

  <text x="400" y="22" class="title" text-anchor="middle">帧数 / 时长参考表——像素角色动画工时基准</text>

  <!-- Table -->
  <g transform="translate(25, 40)">
    <!-- Header -->
    <rect x="0" y="0" width="750" height="28" fill="#333" rx="3"/>
    <text x="160" y="18" class="header-text" text-anchor="middle">动作</text>
    <text x="290" y="18" class="header-text" text-anchor="middle">帧数</text>
    <text x="415" y="18" class="header-text" text-anchor="middle">每帧时长</text>
    <text x="550" y="18" class="header-text" text-anchor="middle">循环总长</text>
    <text x="690" y="18" class="header-text" text-anchor="middle">核心要点</text>

    <!-- Row 1: Idle -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="750" height="36" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">空闲 Idle</text>
      <text x="12" y="29" class="action-sub">站立呼吸浮动</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">2 – 4 帧</text>
      <text x="380" y="22" class="cell-main">300 – 500 ms</text>
      <text x="515" y="22" class="cell-main">1 – 2 秒</text>
      <text x="620" y="22" class="note">最少 2 帧——"站着不动"会让角色感觉死了</text>
    </g>

    <!-- Row 2: Walk -->
    <g transform="translate(0, 68)">
      <rect x="0" y="0" width="750" height="36" fill="#fff" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">行走 Walk</text>
      <text x="12" y="29" class="action-sub">正常速度移动</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">4 – 6 帧</text>
      <text x="380" y="22" class="cell-main">100 – 150 ms</text>
      <text x="515" y="22" class="cell-main">0.5 – 0.8 秒</text>
      <text x="620" y="22" class="note">6 帧≈横版标配，少于 4 帧会"滑行"</text>
    </g>

    <!-- Row 3: Run -->
    <g transform="translate(0, 106)">
      <rect x="0" y="0" width="750" height="36" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">跑步 Run</text>
      <text x="12" y="29" class="action-sub">快速移动</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">6 – 8 帧</text>
      <text x="380" y="22" class="cell-main">60 – 100 ms</text>
      <text x="515" y="22" class="cell-main">0.5 – 0.7 秒</text>
      <text x="620" y="22" class="note">低帧数跑步="溜冰"，8 帧才有流畅感</text>
    </g>

    <!-- Row 4: Attack -->
    <g transform="translate(0, 144)">
      <rect x="0" y="0" width="750" height="36" fill="#fff" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">攻击 Attack</text>
      <text x="12" y="29" class="action-sub">蓄力 + 命中 + 收招</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">3 – 4 帧</text>
      <text x="380" y="22" class="cell-main">蓄快(60) + 命长(150)</text>
      <text x="515" y="22" class="cell-main">~ 0.3 – 0.5 秒</text>
      <text x="620" y="22" class="note">蓄力太快=没重量，命中太短=没打击感</text>
    </g>

    <!-- Row 5: Hurt -->
    <g transform="translate(0, 182)">
      <rect x="0" y="0" width="750" height="36" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">受击 Hurt</text>
      <text x="12" y="29" class="action-sub">被击中后的反应</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">2 – 3 帧</text>
      <text x="380" y="22" class="cell-main">80 – 120 ms</text>
      <text x="515" y="22" class="cell-main">~ 0.2 – 0.3 秒</text>
      <text x="620" y="22" class="note">2 帧后仰+表情变化，加闪白强化反馈</text>
    </g>

    <!-- Row 6: Jump -->
    <g transform="translate(0, 220)">
      <rect x="0" y="0" width="750" height="36" fill="#fff" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">跳跃 Jump</text>
      <text x="12" y="29" class="action-sub">腾空 + 顶点 + 落地</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">3 – 4 帧</text>
      <text x="380" y="22" class="cell-main">起快(60) + 顶长(150)</text>
      <text x="515" y="22" class="cell-main">~ 0.3 – 0.5 秒</text>
      <text x="620" y="22" class="note">腾空必须 1 帧回应，顶点长让跳跃有"飘感"</text>
    </g>

    <!-- Row 7: Death -->
    <g transform="translate(0, 258)">
      <rect x="0" y="0" width="750" height="36" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">死亡 Death</text>
      <text x="12" y="29" class="action-sub">退后 + 倒地 + 消散</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">6 – 10 帧</text>
      <text x="380" y="22" class="cell-main">100 – 150 ms</text>
      <text x="515" y="22" class="cell-main">1 – 1.5 秒</text>
      <text x="620" y="22" class="note">最长的动画——死亡是"有重量的结束"</text>
    </g>

    <!-- Row 8: Special -->
    <g transform="translate(0, 296)">
      <rect x="0" y="0" width="750" height="36" fill="#fff" stroke="#eee" stroke-width="0.5"/>
      <text x="12" y="15" class="action-name">特殊技能 Special</text>
      <text x="12" y="29" class="action-sub">大招 / 变身 / 场景交互</text>
      <text x="260" y="22" class="cell-main" fill="#E74C3C">6 – 16 帧</text>
      <text x="380" y="22" class="cell-main">80 – 120 ms</text>
      <text x="515" y="22" class="cell-main">0.5 – 2 秒</text>
      <text x="620" y="22" class="note">帧数依"技能重用频率"定——越常用越短</text>
    </g>
  </g>

  <!-- Bottom: summary bars -->
  <g transform="translate(25, 365)">
    <rect x="0" y="0" width="370" height="44" rx="4" fill="#FDEDEC"/>
    <text x="12" y="16" style="font-size:9px;fill:#C0392B;font-weight:bold;">快速动作（反应力优先）：</text>
    <text x="12" y="30" style="font-size:8px;fill:#555;">跳跃腾空 1帧 / 攻击蓄力 1-2帧 / 受击 2-3帧 —— 帧数越少手感越"脆"</text>
    <text x="12" y="40" style="font-size:8px;fill:#E74C3C;">必须 0.1s 内响应按键——跳帧延迟 = 游戏死刑</text>

    <rect x="380" y="0" width="370" height="44" rx="4" fill="#E8F4FD"/>
    <text x="392" y="16" style="font-size:9px;fill:#2980B9;font-weight:bold;">慢动作（重量感优先）：</text>
    <text x="392" y="30" style="font-size:8px;fill:#555;">空闲 2-4帧 / 死亡率6-10帧 / 落地压缩1-2帧 —— 帧数越多动作越"重"</text>
    <text x="392" y="40" style="font-size:8px;fill:#2980B9;">长停留 = 真实质量——顶点/命中帧要"挂"住</text>
  </g>
</svg>
