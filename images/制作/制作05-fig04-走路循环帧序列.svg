<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 10px; fill: #888; }
    .frame-label { font-size: 11px; font-weight: bold; fill: #333; text-anchor: middle; }
    .pose-name { font-size: 9px; fill: #555; text-anchor: middle; }
    .duration { font-size: 10px; font-weight: bold; text-anchor: middle; }
    .note { font-size: 8px; fill: #888; }
    .axis { stroke: #bbb; stroke-width: 0.8; }
  </style>

  <text x="400" y="22" class="title" text-anchor="middle">走路循环 6 帧——接触/低位/过步/高位四关键位</text>
  <text x="400" y="38" class="subtitle" text-anchor="middle">帧时序不等长——接触帧 150ms 是重音，过渡帧 80-90ms 是连读</text>

  <line x1="40" y1="190" x2="750" y2="190" class="axis"/>
  <text x="752" y="193" class="note">地面</text>

  <!-- F1 Contact x=95 -->
  <g transform="translate(40, 52)">
    <rect x="0" y="0" width="110" height="150" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.8" rx="3"/>
    <text x="55" y="16" class="frame-label">F1</text>
    <text x="55" y="30" class="pose-name">接触 Contact</text>
    <g transform="translate(55, 78) scale(2.8)">
      <rect x="-4" y="0" width="8" height="8" fill="#D4A574"/>
      <rect x="-4" y="8" width="8" height="12" fill="#2E86C1"/>
      <rect x="-6" y="10" width="4" height="8" fill="#D4A574"/>
      <rect x="2" y="4" width="4" height="6" fill="#D4A574"/>
      <rect x="-6" y="20" width="4" height="4" fill="#2E4053"/>
      <rect x="2" y="20" width="4" height="4" fill="#2E4053"/>
    </g>
    <text x="55" y="148" class="duration" fill="#E74C3C">150ms · 重音</text>
  </g>

  <!-- F2 Recoil x=215 -->
  <g transform="translate(160, 52)">
    <rect x="0" y="0" width="110" height="150" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.8" rx="3"/>
    <text x="55" y="16" class="frame-label">F2</text>
    <text x="55" y="30" class="pose-name">低位 Recoil</text>
    <g transform="translate(55, 82) scale(2.8)">
      <rect x="-4" y="0" width="8" height="8" fill="#D4A574"/>
      <rect x="-4" y="8" width="8" height="12" fill="#2E86C1"/>
      <rect x="-6" y="10" width="4" height="6" fill="#D4A574"/>
      <rect x="2" y="6" width="4" height="8" fill="#D4A574"/>
      <rect x="-4" y="20" width="4" height="2" fill="#2E4053"/>
      <rect x="0" y="20" width="4" height="2" fill="#2E4053"/>
    </g>
    <text x="55" y="148" class="duration" fill="#555">90ms</text>
  </g>

  <!-- F3 Passing x=335 -->
  <g transform="translate(280, 52)">
    <rect x="0" y="0" width="110" height="150" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.8" rx="3"/>
    <text x="55" y="16" class="frame-label">F3</text>
    <text x="55" y="30" class="pose-name">过步 Passing</text>
    <g transform="translate(55, 74) scale(2.8)">
      <rect x="-4" y="0" width="8" height="8" fill="#D4A574"/>
      <rect x="-4" y="8" width="8" height="12" fill="#2E86C1"/>
      <rect x="-6" y="6" width="4" height="6" fill="#D4A574"/>
      <rect x="2" y="10" width="4" height="8" fill="#D4A574"/>
      <rect x="-3" y="20" width="4" height="10" fill="#2E4053"/>
      <rect x="0" y="20" width="4" height="10" fill="#2E4053"/>
    </g>
    <text x="55" y="148" class="duration" fill="#555">80ms</text>
  </g>

  <!-- F4 High x=455 -->
  <g transform="translate(400, 52)">
    <rect x="0" y="0" width="110" height="150" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.8" rx="3"/>
    <text x="55" y="16" class="frame-label">F4</text>
    <text x="55" y="30" class="pose-name">高位 High</text>
    <g transform="translate(55, 64) scale(2.8)">
      <rect x="-4" y="0" width="8" height="8" fill="#D4A574"/>
      <rect x="-4" y="8" width="8" height="12" fill="#2E86C1"/>
      <rect x="-6" y="10" width="4" height="8" fill="#D4A574"/>
      <rect x="2" y="4" width="4" height="6" fill="#D4A574"/>
      <rect x="-3" y="20" width="4" height="16" fill="#2E4053"/>
      <rect x="0" y="20" width="4" height="16" fill="#2E4053"/>
    </g>
    <text x="55" y="148" class="duration" fill="#555">110ms</text>
  </g>

  <!-- F5 Contact mirror x=575 -->
  <g transform="translate(520, 52)">
    <rect x="0" y="0" width="110" height="150" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.8" rx="3"/>
    <text x="55" y="16" class="frame-label">F5</text>
    <text x="55" y="30" class="pose-name">接触 Contact</text>
    <g transform="translate(55, 78) scale(2.8)">
      <rect x="-4" y="0" width="8" height="8" fill="#D4A574"/>
      <rect x="-4" y="8" width="8" height="12" fill="#2E86C1"/>
      <rect x="2" y="4" width="4" height="6" fill="#D4A574"/>
      <rect x="-6" y="10" width="4" height="8" fill="#D4A574"/>
      <rect x="2" y="20" width="4" height="4" fill="#2E4053"/>
      <rect x="-6" y="20" width="4" height="4" fill="#2E4053"/>
    </g>
    <text x="55" y="148" class="duration" fill="#E74C3C">150ms · 重音</text>
  </g>

  <!-- F6 Passing mirror x=695 -->
  <g transform="translate(640, 52)">
    <rect x="0" y="0" width="110" height="150" fill="#fafafa" stroke="#e0e0e0" stroke-width="0.8" rx="3"/>
    <text x="55" y="16" class="frame-label">F6</text>
    <text x="55" y="30" class="pose-name">过步 Passing</text>
    <g transform="translate(55, 74) scale(2.8)">
      <rect x="-4" y="0" width="8" height="8" fill="#D4A574"/>
      <rect x="-4" y="8" width="8" height="12" fill="#2E86C1"/>
      <rect x="2" y="10" width="4" height="8" fill="#D4A574"/>
      <rect x="-6" y="6" width="4" height="6" fill="#D4A574"/>
      <rect x="0" y="20" width="4" height="10" fill="#2E4053"/>
      <rect x="-3" y="20" width="4" height="10" fill="#2E4053"/>
    </g>
    <text x="55" y="148" class="duration" fill="#555">80ms</text>
  </g>

  <!-- Body height curve -->
  <g transform="translate(40, 225)">
    <text x="0" y="0" class="note" fill="#E67E22" font-weight="bold">身体高度起伏：</text>
    <line x1="0" y1="28" x2="710" y2="28" class="axis"/>
    <text x="712" y="31" class="note">时间→</text>
    <path d="M 55,30 C 110,30 120,26 175,26 C 230,26 240,20 295,20 C 350,20 360,14 415,14 C 470,14 480,26 535,26 C 590,26 600,20 655,20" stroke="#E67E22" stroke-width="1.6" fill="none"/>
    <circle cx="55" cy="28" r="3" fill="#E67E22"/>
    <circle cx="175" cy="26" r="3" fill="#E67E22"/>
    <circle cx="295" cy="22" r="3" fill="#E67E22"/>
    <circle cx="415" cy="14" r="4" fill="#E67E22"/>
    <circle cx="535" cy="28" r="3" fill="#E67E22"/>
    <circle cx="655" cy="22" r="3" fill="#E67E22"/>
    <text x="55" y="44" class="note" text-anchor="middle">F1接触</text>
    <text x="175" y="44" class="note" text-anchor="middle">F2低位</text>
    <text x="295" y="44" class="note" text-anchor="middle">F3过步</text>
    <text x="415" y="44" class="note" text-anchor="middle">F4高位·波峰</text>
    <text x="535" y="44" class="note" text-anchor="middle">F5接触</text>
    <text x="655" y="44" class="note" text-anchor="middle">F6过步</text>
  </g>
</svg>
