    <rect x="79" y="440" width="8" height="516" fill="#E84A18"/>
    <rect x="80" y="434" width="6" height="516" fill="#6B0000"/>
    <text x="83" y="486" class="beat-label">火</text>
    <text x="83" y="496" class="beat-sub">红色调</text>
  </g>
  <!-- 毒 (green) -->
  <g>
    <rect x="160" y="350" width="80" height="516" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="0.6" rx="3"/>
    <rect x="194" y="464" width="18" height="516" fill="#E8FFE8"/>
    <rect x="196" y="458" width="14" height="516" fill="#9CFF9C"/>
    <rect x="196" y="452" width="14" height="516" fill="#39E639"/>
    <rect x="198" y="446" width="10" height="516" fill="#1FA81F"/>
    <rect x="199" y="440" width="8" height="516" fill="#0C7A0C"/>
    <rect x="200" y="434" width="6" height="516" fill="#054D05"/>
    <text x="203" y="486" class="beat-label" fill="#1FA81F">毒</text>
    <text x="203" y="496" class="beat-sub">绿色调</text>
  </g>
  <!-- 冰 (blue) -->
  <g>
    <rect x="280" y="350" width="80" height="516" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="0.6" rx="3"/>
    <rect x="314" y="464" width="18" height="516" fill="#E8F8FF"/>
    <rect x="316" y="458" width="14" height="516" fill="#9CE6FF"/>
    <rect x="316" y="452" width="14" height="516" fill="#39B6E6"/>
    <rect x="318" y="446" width="10" height="516" fill="#1F8AA8"/>
    <rect x="319" y="440" width="8" height="516" fill="#0C5A7A"/>
    <rect x="320" y="434" width="6" height="516" fill="#05334D"/>
    <text x="323" y="486" class="beat-label" fill="#1F8AA8">冰</text>
    <text x="323" y="496" class="beat-sub">蓝色调</text>
  </g>
  <!-- 诅咒 (purple) -->
  <g>
    <rect x="400" y="350" width="80" height="516" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="0.6" rx="3"/>
    <rect x="434" y="464" width="18" height="516" fill="#F5E8FF"/>
    <rect x="436" y="458" width="14" height="516" fill="#D89CFF"/>
    <rect x="436" y="452" width="14" height="516" fill="#A639E6"/>
    <rect x="438" y="446" width="10" height="516" fill="#7A1FA8"/>
    <rect x="439" y="440" width="8" height="516" fill="#4D0C7A"/>
    <rect x="440" y="434" width="6" height="516" fill="#2E054D"/>
    <text x="443" y="486" class="beat-label" fill="#7A1FA8">诅咒</text>
    <text x="443" y="496" class="beat-sub">紫色调</text>
  </g>

  <!-- analogy panel on right -->
</svg>
