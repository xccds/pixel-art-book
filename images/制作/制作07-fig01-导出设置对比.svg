<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <filter id="bilinear-blur"><feGaussianBlur stdDeviation="1.2"/></filter>
    <g id="pixel-char">
      <rect x="3" y="0" width="10" height="2" fill="#4A3728"/>
      <rect x="2" y="2" width="12" height="2" fill="#4A3728"/>
      <rect x="1" y="4" width="14" height="1" fill="#4A3728"/>
      <rect x="4" y="6" width="8" height="2" fill="#F5C6A0"/>
      <rect x="5" y="7" width="2" height="1" fill="#222"/>
      <rect x="9" y="7" width="2" height="1" fill="#222"/>
      <rect x="7" y="9" width="2" height="1" fill="#222"/>
      <rect x="2" y="8" width="1" height="2" fill="#4A3728"/>
      <rect x="13" y="8" width="1" height="2" fill="#4A3728"/>
      <rect x="3" y="10" width="10" height="1" fill="#4A3728"/>
      <rect x="4" y="11" width="8" height="3" fill="#4A90D9"/>
      <rect x="3" y="14" width="10" height="2" fill="#4A90D9"/>
      <rect x="4" y="16" width="8" height="2" fill="#3A7BC8"/>
      <rect x="4" y="18" width="8" height="1" fill="#8B6914"/>
      <rect x="1" y="12" width="3" height="2" fill="#4A90D9"/>
      <rect x="0" y="14" width="3" height="2" fill="#F5C6A0"/>
      <rect x="0" y="16" width="2" height="2" fill="#F5C6A0"/>
      <rect x="13" y="12" width="2" height="2" fill="#4A90D9"/>
      <rect x="15" y="9" width="1" height="1" fill="#C0C0C0"/>
      <rect x="15" y="10" width="1" height="6" fill="#C0C0C0"/>
      <rect x="15" y="8" width="1" height="1" fill="#E8E8E8"/>
      <rect x="5" y="19" width="3" height="4" fill="#3C3C3C"/>
      <rect x="8" y="19" width="3" height="4" fill="#3C3C3C"/>
      <rect x="4" y="23" width="4" height="1" fill="#5C3A1E"/>
      <rect x="8" y="23" width="4" height="1" fill="#5C3A1E"/>
      <rect x="2" y="6" width="2" height="2" fill="#4A3728"/>
      <rect x="12" y="6" width="2" height="2" fill="#4A3728"/>
    </g>
  </defs>

  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 10px; fill: #888; }
    .panel-title { font-size: 13px; font-weight: bold; text-anchor: middle; }
    .panel-sub { font-size: 9px; fill: #888; text-anchor: middle; }
    .desc { font-size: 9px; fill: #555; }
    .note { font-size: 8px; fill: #888; text-anchor: middle; }
  </style>

  <text x="400" y="22" class="title" text-anchor="middle">导出设置对比——Bilinear vs Nearest Neighbor</text>
  <text x="400" y="36" class="subtitle" text-anchor="middle">同一 16×16 像素角色放大 4 倍——两种缩放算法的视觉差异</text>

  <!-- Divider -->
  <line x1="400" y1="48" x2="400" y2="340" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT: Bilinear (WRONG) ===== -->
  <g transform="translate(25, 52)">
    <rect x="0" y="0" width="370" height="310" fill="#FFF5F5" rx="6"/>

    <!-- Title -->
    <text x="185" y="22" class="panel-title" fill="#E74C3C">&#x2717; Bilinear 双线性插值</text>
    <text x="185" y="36" class="panel-sub">边缘像素被平均 · 颜色渗入相邻像素</text>

    <!-- Character (blurred) -->
    <g transform="translate(50, 50) scale(4)" filter="url(#bilinear-blur)">
      <use href="#pixel-char"/>
    </g>

    <!-- Zoom-in detail -->
    <g transform="translate(130, 50)">
      <text x="0" y="-8" class="note" fill="#E74C3C">原始像素A/B</text>
      <rect x="0" y="0" width="36" height="36" fill="#4A90D9"/>
      <rect x="36" y="0" width="36" height="36" fill="#E8F4FD"/>
      <rect x="0" y="36" width="36" height="36" fill="#8BB8E8"/>
      <rect x="36" y="36" width="36" height="36" fill="#D0E4F8"/>
      <text x="18" y="76" class="note" fill="#E74C3C">插值后产生过渡色 → 边界模糊</text>
    </g>

    <!-- Consequences -->
    <g transform="translate(15, 220)">
      <text x="0" y="0" style="font-size:9px;fill:#C0392B;font-weight:bold;">后果：</text>
      <text x="0" y="16" class="desc">角色边缘模糊——像没戴眼镜看画面</text>
      <text x="0" y="30" class="desc">像素色块边界消失</text>
      <text x="0" y="44" class="desc">像素字体不可读</text>
    </g>
  </g>

  <!-- ===== RIGHT: Nearest Neighbor (CORRECT) ===== -->
  <g transform="translate(405, 52)">
    <rect x="0" y="0" width="370" height="310" fill="#F0FFF0" rx="6"/>

    <text x="185" y="22" class="panel-title" fill="#27AE60">&#x2713; Nearest Neighbor 最近邻</text>
    <text x="185" y="36" class="panel-sub">每个像素独立放大 · 无颜色混合</text>

    <!-- Character (crisp) -->
    <g transform="translate(50, 50) scale(4)">
      <use href="#pixel-char"/>
    </g>

    <!-- Zoom-in detail -->
    <g transform="translate(130, 50)">
      <text x="0" y="-8" class="note" fill="#27AE60">原始像素A/B</text>
      <rect x="0" y="0" width="36" height="36" fill="#4A90D9"/>
      <rect x="36" y="0" width="36" height="36" fill="#E8F4FD"/>
      <rect x="0" y="36" width="36" height="36" fill="#4A90D9"/>
      <rect x="36" y="36" width="36" height="36" fill="#E8F4FD"/>
      <text x="18" y="76" class="note" fill="#27AE60">像素方块完整保留 → 锐利清晰</text>
    </g>

    <!-- Benefits -->
    <g transform="translate(15, 220)">
      <text x="0" y="0" style="font-size:9px;fill:#27AE60;font-weight:bold;">结果：</text>
      <text x="0" y="16" class="desc">像素边界锐利——"清爽感"</text>
      <text x="0" y="30" class="desc">小文字清晰可读</text>
      <text x="0" y="44" class="desc">像素艺术的特征被完整保留</text>
    </g>
  </g>

  <!-- Bottom rule -->
  <rect x="25" y="352" width="750" height="20" rx="3" fill="#E8F4FD"/>
  <text x="400" y="365" style="font-size:9px;fill:#2E6BA6;text-anchor:middle;font-weight:bold;">关键规则：像素艺术导出必须用 Nearest Neighbor。任何其他采样算法都会破坏像素边界。</text>
</svg>
