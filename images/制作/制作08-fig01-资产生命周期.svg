<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" width="800" height="470" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>

  <rect width="800" height="470" fill="#FAFBFC"/>

  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">一张像素资产的完整生命周期</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#888">Asset Lifecycle · 从"我要一个史莱姆"到"史莱姆在引擎里能用了"</text>

  <!-- Six stages: 110px wide, 15px gap, starting at x=25 -->
  <!-- Stage positions: 25, 150, 275, 400, 525, 650 -->

  <g id="stages">
    <!-- Stage 1 -->
    <g transform="translate(25, 68)">
      <rect x="0" y="0" width="110" height="325" rx="6" fill="#FFF" stroke="#9C27B0" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="30" rx="6" fill="#9C27B0"/>
      <rect x="0" y="15" width="110" height="15" fill="#9C27B0"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">① 参考收集</text>
      <text x="55" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">输入</text>
      <text x="55" y="63" text-anchor="middle" font-size="8" fill="#555">需求描述 · 风格方向</text>
      <line x1="10" y1="72" x2="100" y2="72" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="86" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">操作</text>
      <text x="55" y="99" text-anchor="middle" font-size="8" fill="#555">搜索 · 截图</text>
      <text x="55" y="112" text-anchor="middle" font-size="8" fill="#555">建 Mood Board</text>
      <line x1="10" y1="121" x2="100" y2="121" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">输出</text>
      <text x="55" y="150" text-anchor="middle" font-size="8" fill="#555">参考图板</text>
      <rect x="10" y="168" width="90" height="20" rx="3" fill="#F3E5F5"/>
      <text x="55" y="182" text-anchor="middle" font-size="7" fill="#9C27B0">✓ 风格一致？≥3张参考？</text>
      <text x="55" y="210" text-anchor="middle" font-size="10" fill="#9C27B0" font-weight="bold">~10%</text>
    </g>

    <!-- Arrow 1→2 -->
    <line x1="140" y1="230" x2="148" y2="230" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Stage 2 -->
    <g transform="translate(150, 68)">
      <rect x="0" y="0" width="110" height="325" rx="6" fill="#FFF" stroke="#3498DB" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="30" rx="6" fill="#3498DB"/>
      <rect x="0" y="15" width="110" height="15" fill="#3498DB"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">② 草稿</text>
      <text x="55" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">输入</text>
      <text x="55" y="63" text-anchor="middle" font-size="8" fill="#555">参考图板</text>
      <line x1="10" y1="72" x2="100" y2="72" stroke="#3498DB" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="86" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">操作</text>
      <text x="55" y="99" text-anchor="middle" font-size="8" fill="#555">缩略图 · 像素草图</text>
      <text x="55" y="112" text-anchor="middle" font-size="8" fill="#555">比例探索</text>
      <line x1="10" y1="121" x2="100" y2="121" stroke="#3498DB" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">输出</text>
      <text x="55" y="150" text-anchor="middle" font-size="8" fill="#555">粗草稿 1-3版</text>
      <rect x="10" y="168" width="90" height="20" rx="3" fill="#E8F4FD"/>
      <text x="55" y="182" text-anchor="middle" font-size="7" fill="#3498DB">✓ 轮廓可辨？比例不崩？</text>
      <text x="55" y="210" text-anchor="middle" font-size="10" fill="#3498DB" font-weight="bold">~15%</text>
    </g>

    <!-- Arrow 2→3 -->
    <line x1="265" y1="230" x2="273" y2="230" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Stage 3 -->
    <g transform="translate(275, 68)">
      <rect x="0" y="0" width="110" height="325" rx="6" fill="#FFF" stroke="#F39C12" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="30" rx="6" fill="#F39C12"/>
      <rect x="0" y="15" width="110" height="15" fill="#F39C12"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">③ 粗胚</text>
      <text x="55" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">输入</text>
      <text x="55" y="63" text-anchor="middle" font-size="8" fill="#555">选定的草稿</text>
      <line x1="10" y1="72" x2="100" y2="72" stroke="#F39C12" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="86" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">操作</text>
      <text x="55" y="99" text-anchor="middle" font-size="8" fill="#555">定大型 · 铺底色</text>
      <text x="55" y="112" text-anchor="middle" font-size="8" fill="#555">粗略光影</text>
      <line x1="10" y1="121" x2="100" y2="121" stroke="#F39C12" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">输出</text>
      <text x="55" y="150" text-anchor="middle" font-size="8" fill="#555">粗胚资产</text>
      <rect x="10" y="168" width="90" height="20" rx="3" fill="#FFF8E1"/>
      <text x="55" y="182" text-anchor="middle" font-size="7" fill="#F39C12">✓ 比例定型？不用大改？</text>
      <text x="55" y="210" text-anchor="middle" font-size="10" fill="#F39C12" font-weight="bold">~20%</text>
    </g>

    <!-- Arrow 3→4 -->
    <line x1="390" y1="230" x2="398" y2="230" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Stage 4 -->
    <g transform="translate(400, 68)">
      <rect x="0" y="0" width="110" height="325" rx="6" fill="#FFF" stroke="#27AE60" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="30" rx="6" fill="#27AE60"/>
      <rect x="0" y="15" width="110" height="15" fill="#27AE60"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">④ 精修</text>
      <text x="55" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">输入</text>
      <text x="55" y="63" text-anchor="middle" font-size="8" fill="#555">粗胚资产</text>
      <line x1="10" y1="72" x2="100" y2="72" stroke="#27AE60" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="86" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">操作</text>
      <text x="55" y="99" text-anchor="middle" font-size="8" fill="#555">细化线条 · 深入渲染</text>
      <text x="55" y="112" text-anchor="middle" font-size="8" fill="#555">纹理/做旧</text>
      <line x1="10" y1="121" x2="100" y2="121" stroke="#27AE60" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">输出</text>
      <text x="55" y="150" text-anchor="middle" font-size="8" fill="#555">最终资产</text>
      <rect x="10" y="168" width="90" height="20" rx="3" fill="#E8F5E9"/>
      <text x="55" y="182" text-anchor="middle" font-size="7" fill="#27AE60">✓ 与参考一致？尺寸规范？</text>
      <text x="55" y="210" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="bold">~35%</text>
    </g>

    <!-- Arrow 4→5 -->
    <line x1="515" y1="230" x2="523" y2="230" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Stage 5 -->
    <g transform="translate(525, 68)">
      <rect x="0" y="0" width="110" height="325" rx="6" fill="#FFF" stroke="#E67E22" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="30" rx="6" fill="#E67E22"/>
      <rect x="0" y="15" width="110" height="15" fill="#E67E22"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">⑤ 导出</text>
      <text x="55" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">输入</text>
      <text x="55" y="63" text-anchor="middle" font-size="8" fill="#555">最终资产</text>
      <line x1="10" y1="72" x2="100" y2="72" stroke="#E67E22" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="86" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">操作</text>
      <text x="55" y="99" text-anchor="middle" font-size="8" fill="#555">裁剪 · 格式转换</text>
      <text x="55" y="112" text-anchor="middle" font-size="8" fill="#555">规范命名</text>
      <line x1="10" y1="121" x2="100" y2="121" stroke="#E67E22" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">输出</text>
      <text x="55" y="150" text-anchor="middle" font-size="8" fill="#E74C3C">.png</text>
      <rect x="10" y="168" width="90" height="20" rx="3" fill="#FFF3E0"/>
      <text x="55" y="182" text-anchor="middle" font-size="7" fill="#E67E22">✓ 尺寸/透明/命名？</text>
      <text x="55" y="210" text-anchor="middle" font-size="10" fill="#E67E22" font-weight="bold">~10%</text>
    </g>

    <!-- Arrow 5→6 -->
    <line x1="640" y1="230" x2="648" y2="230" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Stage 6 -->
    <g transform="translate(650, 68)">
      <rect x="0" y="0" width="110" height="325" rx="6" fill="#FFF" stroke="#E74C3C" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="30" rx="6" fill="#E74C3C"/>
      <rect x="0" y="15" width="110" height="15" fill="#E74C3C"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">⑥ 引擎验证</text>
      <text x="55" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">输入</text>
      <text x="55" y="63" text-anchor="middle" font-size="8" fill="#555">导出的 .png</text>
      <line x1="10" y1="72" x2="100" y2="72" stroke="#E74C3C" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="86" text-anchor="middle" font-size="8" font-weight="bold" fill="#666">操作</text>
      <text x="55" y="99" text-anchor="middle" font-size="8" fill="#555">导入引擎</text>
      <text x="55" y="112" text-anchor="middle" font-size="8" fill="#555">调参数 · 看效果</text>
      <line x1="10" y1="121" x2="100" y2="121" stroke="#E74C3C" stroke-width="0.5" opacity="0.3"/>
      <text x="55" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">输出</text>
      <text x="55" y="150" text-anchor="middle" font-size="8" fill="#E74C3C">完成 / 回到④</text>
      <rect x="10" y="168" width="90" height="20" rx="3" fill="#FDEDEC"/>
      <text x="55" y="182" text-anchor="middle" font-size="7" fill="#E74C3C">✓ 效果通过？循环迭代</text>
      <text x="55" y="210" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="bold">~10%</text>
    </g>
  </g>

  <!-- Time bar -->
  <text x="400" y="410" text-anchor="middle" font-size="10" fill="#888">典型时间占比</text>
  <g transform="translate(25, 416)">
    <rect x="0" y="0" width="750" height="16" rx="3" fill="#EEE"/>
    <rect x="0" y="0" width="75" height="16" rx="3" fill="#9C27B0"/>
    <rect x="75" y="0" width="112" height="16" fill="#3498DB"/>
    <rect x="187" y="0" width="150" height="16" fill="#F39C12"/>
    <rect x="337" y="0" width="262" height="16" fill="#27AE60"/>
    <rect x="599" y="0" width="75" height="16" fill="#E67E22"/>
    <rect x="674" y="0" width="76" height="16" fill="#E74C3C"/>
    <text x="37" y="12" text-anchor="middle" font-size="7" fill="#FFF" font-weight="bold">10%</text>
    <text x="131" y="12" text-anchor="middle" font-size="7" fill="#FFF" font-weight="bold">15%</text>
    <text x="262" y="12" text-anchor="middle" font-size="7" fill="#FFF" font-weight="bold">20%</text>
    <text x="468" y="12" text-anchor="middle" font-size="7" fill="#FFF" font-weight="bold">35%</text>
    <text x="636" y="12" text-anchor="middle" font-size="7" fill="#FFF" font-weight="bold">10%</text>
    <text x="712" y="12" text-anchor="middle" font-size="7" fill="#FFF" font-weight="bold">10%</text>
  </g>
</svg>
