<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 517" width="800" height="517" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="517" fill="#FAFBFC"/>

  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">命名的艺术：为什么程序员会秒懂</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#666">Naming Convention — 类比：就像代码里的变量名，`tmp`和`player_health`是两种人生</text>

  <!-- ===== LEFT: BAD ===== -->
  <rect x="20" y="80" width="370" height="517" rx="12" fill="#FFF" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>

  <rect x="20" y="80" width="370" height="517" rx="12" fill="#E74C3C"/>
  <rect x="20" y="100" width="370" height="517" fill="#E74C3C"/>
  <text x="205" y="106" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFF">❌ 反面教材：混乱是常态</text>

  <!-- Mock folder with bad files -->
  <rect x="40" y="135" width="330" height="517" rx="8" fill="#1E1E1E"/>

