  <rect x="40" y="135" width="330" height="517" rx="8" fill="#2D2D2D"/>
  <rect x="40" y="147" width="330" height="517" fill="#2D2D2D"/>
  <text x="55" y="154" font-size="10" fill="#999">📁 project_assets/sprites/</text>

