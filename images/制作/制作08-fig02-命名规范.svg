  <text x="595" y="355" text-anchor="middle" font-size="12" fill="#43A047">↓ ↓ ↓</text>
  <text x="595" y="378" text-anchor="middle" font-size="11" fill="#43A047">任何时间打开：</text>
  <text x="595" y="396" text-anchor="middle" font-size="11" fill="#43A047">"spr_hero_attack → 主角攻击动画"</text>
  <text x="595" y="414" text-anchor="middle" font-size="11" fill="#43A047">按名称排序自动分组！</text>
  <text x="595" y="440" text-anchor="middle" font-size="11" fill="#999">↑ 这就是命名的自动化收益</text>

  <!-- Bottom: naming convention formula -->
  <rect x="20" y="480" width="760" height="517" fill="#EEE"/>
  <text x="400" y="497" text-anchor="middle" font-size="10" fill="#666">命名公式：类型_对象_动作_序号.png → 如 spr_hero_idle_01.png | tile_grass_01.png | ui_btn_start_01.png</text>
</svg>
