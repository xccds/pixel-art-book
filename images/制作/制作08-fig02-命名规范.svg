  <circle cx="58" cy="275" r="3" fill="#F0A030"/>
  <text x="68" y="278" font-size="9.5" fill="#F0A030">BOSS_v3_副本_副本.png</text>

  <circle cx="58" cy="295" r="3" fill="#E74C3C"/>
  <text x="68" y="298" font-size="9.5" fill="#E74C3C">img_20240512.png</text>

  <circle cx="58" cy="315" r="3" fill="#F0A030"/>
  <text x="68" y="318" font-size="9.5" fill="#F0A030">hero.png</text>

  <!-- Chaos arrows -->
  <text x="205" y="355" text-anchor="middle" font-size="12" fill="#E74C3C">↓ ↓ ↓</text>
  <text x="205" y="378" text-anchor="middle" font-size="11" fill="#E74C3C">三周后：</text>
  <text x="205" y="396" text-anchor="middle" font-size="11" fill="#E74C3C">"哪个才是boss的最终版？？"</text>
  <text x="205" y="414" text-anchor="middle" font-size="11" fill="#E74C3C">"为什么有15个final？"</text>
  <text x="205" y="440" text-anchor="middle" font-size="11" fill="#999">↑ 这就是命名的技术债</text>

  <!-- Cross divider -->
  <line x1="395" y1="100" x2="395" y2="470" stroke="#DDD" stroke-width="1" stroke-dasharray="5,5"/>

