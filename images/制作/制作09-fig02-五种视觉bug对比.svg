<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 10px; fill: #888; }
    .bug-num { font-size: 10px; font-weight: bold; fill: #E74C3C; }
    .bug-name { font-size: 11px; font-weight: bold; fill: #333; }
    .sym-label { font-size: 9px; fill: #E74C3C; font-weight: bold; }
    .fix-label { font-size: 9px; fill: #27AE60; font-weight: bold; }
    .desc { font-size: 8px; fill: #666; }
    .row-bg { fill: #fafafa; stroke: #eee; stroke-width: 0.5; rx: 4; }
  </style>

  <text x="400" y="22" class="title" text-anchor="middle">5 种常见视觉 Bug——症状与修复对比</text>
  <text x="400" y="36" class="subtitle" text-anchor="middle">左列 Bug 症状（异常）· 右列修复后（正常）——每行对应一种 Bug</text>

  <!-- Row 1: Line Weight -->
  <g transform="translate(25, 52)">
    <rect x="0" y="0" width="750" height="68" fill="#fafafa" stroke="#eee" stroke-width="0.5" rx="4"/>
    <text x="12" y="16" class="bug-num">Bug 1</text>
    <text x="55" y="16" class="bug-name">线宽不统一</text>
    <text x="150" y="16" class="desc">不同素材的边缘粗细不一致——有的 1px、有的 3px，拼在一起像"拼凑"出来的</text>

    <!-- Symptom -->
    <g transform="translate(12, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#FFF5F5" stroke="#FFCCCC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="sym-label">✗ 症状</text>
      <rect x="60" y="8" width="10" height="14" fill="#E8F4FD" stroke="#333" stroke-width="3"/>
      <rect x="73" y="8" width="10" height="14" fill="#E8F4FD" stroke="#333" stroke-width="1"/>
      <rect x="86" y="8" width="10" height="14" fill="#E8F4FD" stroke="#333" stroke-width="0.5"/>
      <polygon points="76,8 86,-4 96,8" fill="#D5F5E3" stroke="#333" stroke-width="2.5"/>
      <text x="180" y="19" class="desc">不同线宽混在一起</text>
    </g>
    <!-- Fix -->
    <g transform="translate(383, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#F0FFF0" stroke="#CCEECC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="fix-label">✓ 修复</text>
      <rect x="60" y="8" width="10" height="14" fill="#E8F4FD" stroke="#333" stroke-width="2"/>
      <rect x="73" y="8" width="10" height="14" fill="#E8F4FD" stroke="#333" stroke-width="2"/>
      <rect x="86" y="8" width="10" height="14" fill="#E8F4FD" stroke="#333" stroke-width="2"/>
      <polygon points="76,8 86,-4 96,8" fill="#D5F5E3" stroke="#333" stroke-width="2"/>
      <text x="180" y="19" class="desc" fill="#555">全部统一 2px 描边</text>
    </g>
  </g>

  <!-- Row 2: Palette Pollution -->
  <g transform="translate(25, 126)">
    <rect x="0" y="0" width="750" height="68" fill="#fafafa" stroke="#eee" stroke-width="0.5" rx="4"/>
    <text x="12" y="16" class="bug-num">Bug 2</text>
    <text x="55" y="16" class="bug-name">色板污染</text>
    <text x="150" y="16" class="desc">使用了调色板之外的颜色——高饱和尼龙色出现在复古像素画面中，像"另一个游戏的颜色"</text>

    <g transform="translate(12, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#FFF5F5" stroke="#FFCCCC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="sym-label">✗ 症状</text>
      <rect x="72" y="6" width="8" height="18" fill="#8B6914"/>
      <circle cx="84" cy="10" r="10" fill="#00FF00"/>
      <circle cx="84" cy="10" r="10" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="120" y="14" class="desc">外来高饱和绿色→突兀</text>
    </g>
    <g transform="translate(383, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#F0FFF0" stroke="#CCEECC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="fix-label">✓ 修复</text>
      <rect x="72" y="6" width="8" height="18" fill="#8B6914"/>
      <circle cx="84" cy="10" r="10" fill="#27AE60"/>
      <circle cx="84" cy="10" r="10" fill="none" stroke="#27AE60" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="120" y="14" class="desc" fill="#555">替换为色板内的绿色</text>
    </g>
  </g>

  <!-- Row 3: Detail Density -->
  <g transform="translate(25, 200)">
    <rect x="0" y="0" width="750" height="68" fill="#fafafa" stroke="#eee" stroke-width="0.5" rx="4"/>
    <text x="12" y="16" class="bug-num">Bug 3</text>
    <text x="55" y="16" class="bug-name">细节密度跳跃</text>
    <text x="150" y="16" class="desc">同一屏幕内角色A极简（3色纯块）角色B繁复（8色+纹理）——像两个不同游戏的素材放在一起</text>

    <g transform="translate(12, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#FFF5F5" stroke="#FFCCCC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="sym-label">✗ 症状</text>
      <!-- Simple character -->
      <circle cx="66" cy="10" r="4" fill="#F5C6A0"/>
      <rect x="60" y="14" width="12" height="12" fill="#4A90D9"/>
      <rect x="62" y="26" width="4" height="4" fill="#3C3C3C"/>
      <rect x="66" y="26" width="4" height="4" fill="#3C3C3C"/>
      <!-- Complex character -->
      <circle cx="100" cy="10" r="6" fill="#F5C6A0"/>
      <rect x="96" y="7" width="2" height="2" fill="#222"/>
      <rect x="102" y="7" width="2" height="2" fill="#222"/>
      <rect x="94" y="16" width="12" height="12" fill="#4A90D9"/>
      <line x1="100" y1="20" x2="100" y2="28" stroke="#C0C0C0" stroke-width="1"/>
      <rect x="95" y="28" width="4" height="4" fill="#3C3C3C"/>
      <rect x="101" y="28" width="4" height="4" fill="#3C3C3C"/>
      <rect x="91" y="18" width="3" height="3" fill="#F1C40F"/>
      <text x="150" y="14" class="desc">极简 vs 繁复→密度跳跃巨大</text>
    </g>
    <g transform="translate(383, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#F0FFF0" stroke="#CCEECC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="fix-label">✓ 修复</text>
      <circle cx="66" cy="10" r="4" fill="#F5C6A0"/>
      <rect x="60" y="14" width="14" height="12" fill="#4A90D9"/>
      <rect x="62" y="26" width="4" height="4" fill="#3C3C3C"/>
      <rect x="66" y="26" width="4" height="4" fill="#3C3C3C"/>
      <circle cx="100" cy="10" r="5" fill="#F5C6A0"/>
      <rect x="96" y="7" width="2" height="2" fill="#222"/>
      <rect x="102" y="7" width="2" height="2" fill="#222"/>
      <rect x="95" y="15" width="11" height="12" fill="#4A90D9"/>
      <rect x="96" y="27" width="4" height="4" fill="#3C3C3C"/>
      <rect x="101" y="27" width="4" height="4" fill="#3C3C3C"/>
      <text x="145" y="14" class="desc" fill="#555">两角色密度接近</text>
    </g>
  </g>

  <!-- Row 4: Anti-aliasing -->
  <g transform="translate(25, 274)">
    <rect x="0" y="0" width="750" height="68" fill="#fafafa" stroke="#eee" stroke-width="0.5" rx="4"/>
    <text x="12" y="16" class="bug-num">Bug 4</text>
    <text x="55" y="16" class="bug-name">抗锯齿不一致</text>
    <text x="150" y="16" class="desc">同一画面里有的素材硬边(无AA)、有的软边(过度AA)——边界处理策略不统一，画面像"没做完"</text>

    <g transform="translate(12, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#FFF5F5" stroke="#FFCCCC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="sym-label">✗ 症状</text>
      <circle cx="72" cy="14" r="8" fill="#F39C12"/>
      <rect x="72" y="14" width="12" height="12" fill="#F39C12"/>
      <text x="92" y="18" class="desc">硬边</text>
      <circle cx="150" cy="14" r="8" fill="#F39C12" opacity="0.5"/>
      <circle cx="150" cy="14" r="10" fill="none" stroke="#E67E22" stroke-width="1.5" opacity="0.4"/>
      <text x="170" y="18" class="desc">过度AA</text>
      <text x="240" y="18" class="desc" fill="#E74C3C">硬边+软边混用</text>
    </g>
    <g transform="translate(383, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#F0FFF0" stroke="#CCEECC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="fix-label">✓ 修复</text>
      <circle cx="72" cy="14" r="8" fill="#F39C12"/>
      <rect x="72" y="14" width="12" height="12" fill="#F39C12"/>
      <circle cx="150" cy="14" r="8" fill="#F39C12"/>
      <rect x="150" y="14" width="12" height="12" fill="#F39C12"/>
      <text x="180" y="18" class="desc" fill="#555">全部统一硬边（像素本来就不该AA）</text>
    </g>
  </g>

  <!-- Row 5: UI Style -->
  <g transform="translate(25, 348)">
    <rect x="0" y="0" width="750" height="68" fill="#fafafa" stroke="#eee" stroke-width="0.5" rx="4"/>
    <text x="12" y="16" class="bug-num">Bug 5</text>
    <text x="55" y="16" class="bug-name">UI 风格突变</text>
    <text x="150" y="16" class="desc">不同场景/界面的 UI 风格不统一——一个面板是像素风、另一个是矢量的、第三个是手绘的——同一个游戏有三种 UI 语言</text>

    <g transform="translate(12, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#FFF5F5" stroke="#FFCCCC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="sym-label">✗ 症状</text>
      <rect x="60" y="6" width="70" height="8" rx="2" fill="#333"/>
      <rect x="60" y="6" width="50" height="8" rx="2" fill="#E74C3C"/>
      <text x="140" y="13" class="desc" font-size="7">像素风</text>
      <rect x="185" y="6" width="70" height="8" rx="0" fill="#111" stroke="#0FF" stroke-width="0.8"/>
      <rect x="185" y="6" width="45" height="8" rx="0" fill="#0FF" opacity="0.6"/>
      <text x="265" y="13" class="desc" font-size="7">科幻风</text>
      <text x="240" y="26" class="desc" fill="#E74C3C">风格冲突→两个游戏</text>
    </g>
    <g transform="translate(383, 28)">
      <rect x="0" y="0" width="355" height="32" fill="#F0FFF0" stroke="#CCEECC" stroke-width="0.5" rx="2"/>
      <text x="8" y="14" class="fix-label">✓ 修复</text>
      <rect x="60" y="6" width="70" height="8" rx="2" fill="#333"/>
      <rect x="60" y="6" width="50" height="8" rx="2" fill="#E74C3C"/>
      <rect x="185" y="6" width="70" height="8" rx="2" fill="#333"/>
      <rect x="185" y="6" width="40" height="8" rx="2" fill="#E74C3C"/>
      <text x="260" y="13" class="desc" fill="#555">统一像素风格</text>
    </g>
  </g>

  <!-- Bottom summary -->
  <rect x="25" y="432" width="750" height="42" rx="4" fill="#E8F4FD"/>
  <text x="400" y="452" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">快速自查：截图并排——遮住 UI——还能认出是同一个游戏吗？</text>
  <text x="400" y="467" font-size="8" fill="#666" text-anchor="middle">如果能——视觉一致。如果不能——上面 5 种 Bug 至少中了 1 个。</text>
</svg>
