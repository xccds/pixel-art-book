<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .panel-label { font-size: 12px; font-weight: bold; fill: #333; text-anchor: middle; }
    .panel-desc { font-size: 9px; fill: #888; text-anchor: middle; }
    .analogy-title { font-size: 13px; font-weight: bold; fill: #333; }
    .analogy-text { font-size: 11px; fill: #555; }
    .analogy-key { font-size: 11px; fill: #E74C3C; font-weight: bold; }
  </style>

  <defs>
    <!-- 6x6 blob body, 32 cells, fill inherits currentColor -->
    <g id="blob">
      <rect x="14" y="0" width="14" height="14" fill="currentColor"/><rect x="28" y="0" width="14" height="14" fill="currentColor"/><rect x="42" y="0" width="14" height="14" fill="currentColor"/><rect x="56" y="0" width="14" height="14" fill="currentColor"/>
      <rect x="0" y="14" width="14" height="14" fill="currentColor"/><rect x="14" y="14" width="14" height="14" fill="currentColor"/><rect x="28" y="14" width="14" height="14" fill="currentColor"/><rect x="42" y="14" width="14" height="14" fill="currentColor"/><rect x="56" y="14" width="14" height="14" fill="currentColor"/><rect x="70" y="14" width="14" height="14" fill="currentColor"/>
      <rect x="0" y="28" width="14" height="14" fill="currentColor"/><rect x="14" y="28" width="14" height="14" fill="currentColor"/><rect x="28" y="28" width="14" height="14" fill="currentColor"/><rect x="42" y="28" width="14" height="14" fill="currentColor"/><rect x="56" y="28" width="14" height="14" fill="currentColor"/><rect x="70" y="28" width="14" height="14" fill="currentColor"/>
      <rect x="0" y="42" width="14" height="14" fill="currentColor"/><rect x="14" y="42" width="14" height="14" fill="currentColor"/><rect x="28" y="42" width="14" height="14" fill="currentColor"/><rect x="42" y="42" width="14" height="14" fill="currentColor"/><rect x="56" y="42" width="14" height="14" fill="currentColor"/><rect x="70" y="42" width="14" height="14" fill="currentColor"/>
      <rect x="0" y="56" width="14" height="14" fill="currentColor"/><rect x="14" y="56" width="14" height="14" fill="currentColor"/><rect x="28" y="56" width="14" height="14" fill="currentColor"/><rect x="42" y="56" width="14" height="14" fill="currentColor"/><rect x="56" y="56" width="14" height="14" fill="currentColor"/><rect x="70" y="56" width="14" height="14" fill="currentColor"/>
      <rect x="14" y="70" width="14" height="14" fill="currentColor"/><rect x="28" y="70" width="14" height="14" fill="currentColor"/><rect x="42" y="70" width="14" height="14" fill="currentColor"/><rect x="56" y="70" width="14" height="14" fill="currentColor"/>
    </g>
    <!-- two 1x2 vertical eyes -->
    <g id="eyes">
      <rect x="14" y="28" width="14" height="28" fill="currentColor"/>
      <rect x="56" y="28" width="14" height="28" fill="currentColor"/>
    </g>
  </defs>

  <text x="400" y="28" class="title" text-anchor="middle">图 练手01.5 五种轮廓类型对比——同一个角色的不同勾边策略</text>

  <!-- Panel 1: 无轮廓 (no outline) -->
  <g transform="translate(40, 70)">
    <rect x="-6" y="-6" width="124" height="124" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <g transform="translate(14, 14)">
      <use href="#blob" color="#5DADE2"/>
      <use href="#eyes" color="#fafafa"/>
    </g>
    <text x="56" y="132" class="panel-label">无轮廓</text>
    <text x="56" y="146" class="panel-desc">靠色块本身区分</text>
  </g>

  <!-- Panel 2: 黑色内描 (black inline: outer + inner details black) -->
  <g transform="translate(192, 70)">
    <rect x="-6" y="-6" width="124" height="124" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <g transform="translate(14, 14)">
      <use href="#blob" x="-14" y="-14" color="#1C1C1C"/><use href="#blob" x="0" y="-14" color="#1C1C1C"/><use href="#blob" x="14" y="-14" color="#1C1C1C"/>
      <use href="#blob" x="-14" y="0" color="#1C1C1C"/><use href="#blob" x="14" y="0" color="#1C1C1C"/>
      <use href="#blob" x="-14" y="14" color="#1C1C1C"/><use href="#blob" x="0" y="14" color="#1C1C1C"/><use href="#blob" x="14" y="14" color="#1C1C1C"/>
      <use href="#blob" color="#5DADE2"/>
      <use href="#eyes" color="#1C1C1C"/>
    </g>
    <text x="56" y="132" class="panel-label">黑色内描</text>
    <text x="56" y="146" class="panel-desc">外轮廓+内部细节全黑</text>
  </g>

  <!-- Panel 3: 黑色外轮廓 (black contour: outer black, inner clean) -->
  <g transform="translate(344, 70)">
    <rect x="-6" y="-6" width="124" height="124" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <g transform="translate(14, 14)">
      <use href="#blob" x="-14" y="-14" color="#1C1C1C"/><use href="#blob" x="0" y="-14" color="#1C1C1C"/><use href="#blob" x="14" y="-14" color="#1C1C1C"/>
      <use href="#blob" x="-14" y="0" color="#1C1C1C"/><use href="#blob" x="14" y="0" color="#1C1C1C"/>
      <use href="#blob" x="-14" y="14" color="#1C1C1C"/><use href="#blob" x="0" y="14" color="#1C1C1C"/><use href="#blob" x="14" y="14" color="#1C1C1C"/>
      <use href="#blob" color="#5DADE2"/>
      <use href="#eyes" color="#1A5276"/>
    </g>
    <text x="56" y="132" class="panel-label">黑色外轮廓</text>
    <text x="56" y="146" class="panel-desc">外黑，内部干净</text>
  </g>

  <!-- Panel 4: 彩色轮廓 (colored: dark version of body color) -->
  <g transform="translate(496, 70)">
    <rect x="-6" y="-6" width="124" height="124" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <g transform="translate(14, 14)">
      <use href="#blob" x="-14" y="-14" color="#1A5276"/><use href="#blob" x="0" y="-14" color="#1A5276"/><use href="#blob" x="14" y="-14" color="#1A5276"/>
      <use href="#blob" x="-14" y="0" color="#1A5276"/><use href="#blob" x="14" y="0" color="#1A5276"/>
      <use href="#blob" x="-14" y="14" color="#1A5276"/><use href="#blob" x="0" y="14" color="#1A5276"/><use href="#blob" x="14" y="14" color="#1A5276"/>
      <use href="#blob" color="#5DADE2"/>
      <use href="#eyes" color="#1A5276"/>
    </g>
    <text x="56" y="132" class="panel-label">彩色轮廓</text>
    <text x="56" y="146" class="panel-desc">深色版本体色勾边</text>
  </g>

  <!-- Panel 5: 着色轮廓 (shaded: outline varies with light, top lighter, bottom darker) -->
  <g transform="translate(648, 70)">
    <rect x="-6" y="-6" width="124" height="124" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <g transform="translate(14, 14)">
      <use href="#blob" x="-14" y="-14" color="#2E86C1"/><use href="#blob" x="0" y="-14" color="#2E86C1"/><use href="#blob" x="14" y="-14" color="#2E86C1"/>
      <use href="#blob" x="-14" y="0" color="#1A5276"/><use href="#blob" x="14" y="0" color="#1A5276"/>
      <use href="#blob" x="-14" y="14" color="#154360"/><use href="#blob" x="0" y="14" color="#154360"/><use href="#blob" x="14" y="14" color="#154360"/>
      <use href="#blob" color="#5DADE2"/>
      <use href="#eyes" color="#1A5276"/>
    </g>
    <text x="56" y="132" class="panel-label">着色轮廓</text>
    <text x="56" y="146" class="panel-desc">轮廓带光影变化</text>
  </g>

  <!-- Bottom: programmer analogy (outline = type-system boundary check strictness) -->
  <g transform="translate(0, 250)">
    <rect x="40" y="0" width="720" height="270" fill="#F8F9FA" rx="4"/>

    <text x="60" y="28" class="analogy-title">程序员类比：轮廓 = 类型系统的边界检查策略</text>

    <text x="60" y="58" class="analogy-key">无轮廓</text>
    <text x="180" y="58" class="analogy-text">= any / 不检查 — 快、灵活，但形状易与背景粘连（运行时边界出错）</text>

    <text x="60" y="82" class="analogy-key">黑色内描</text>
    <text x="180" y="82" class="analogy-text">= 到处显式标注 — 像每个变量都写 Array&lt;number&gt; 的遗留代码，安全但啰嗦（"脏"）</text>

    <text x="60" y="106" class="analogy-key">黑色外轮廓</text>
    <text x="180" y="106" class="analogy-text">= 严格外边界 + 内部推断 — 默认 strict 模式，API 表面清晰、内部不啰嗦</text>

    <text x="60" y="130" class="analogy-key">彩色轮廓</text>
    <text x="180" y="130" class="analogy-text">= 泛型 / 参数化类型 — 每个边界按各自域类型着色，精确表达领域语义</text>

    <text x="60" y="154" class="analogy-key">着色轮廓</text>
    <text x="180" y="154" class="analogy-text">= refinement types / 依赖类型 — 边界携带运行时变化信息（光与影），最强也最复杂</text>

    <line x1="60" y1="178" x2="740" y2="178" stroke="#e0e0e0" stroke-width="1"/>

    <text x="60" y="204" class="analogy-text" style="font-weight:bold;fill:#E74C3C;">选择原则</text>
    <text x="60" y="226" class="analogy-text">不是"哪个最好"，是"你的项目需要多严格的边界、能负担多复杂的类型系统"。</text>
    <text x="60" y="248" class="analogy-text">背景 tile 用 any（无轮廓）省事；主角用 strict（黑色外轮廓）保证可读；大 BOSS 用 refinement（着色轮廓）追求融合。</text>
  </g>
</svg>
