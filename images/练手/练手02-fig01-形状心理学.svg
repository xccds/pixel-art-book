  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" class="title">形状心理学：三种基本形状的语言</text>

  <!-- Three columns -->
  <!-- Column 1: Circle -->

  <!-- Column 2: Square -->

  <!-- Column 3: Triangle -->

  <!-- Bottom summary -->
  <line x1="40" y1="370" x2="760" y2="370" class="line"/>
