<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 492" width="800" height="492">
  <style>
    .bg { fill: #FAFAFA; }
    .title { font-family: sans-serif; font-size: 17px; font-weight: bold; fill: #2C3E50; }
    .panel-title { font-family: sans-serif; font-size: 13px; font-weight: bold; fill: #2C3E50; }
    .lbl { font-family: sans-serif; font-size: 9px; fill: #E74C3C; }
    .lbl-blue { font-family: sans-serif; font-size: 9px; fill: #2980B9; }
    .desc { font-family: sans-serif; font-size: 9px; fill: #666; }
    .panel-bg { fill: #fff; stroke: #E0E0E0; stroke-width: 1; }
    .lead { stroke: #E74C3C; stroke-width: 0.8; }
    .lead-blue { stroke: #2980B9; stroke-width: 0.8; }
  </style>
  <rect class="bg" width="800" height="492"/>
  <text x="400" y="32" text-anchor="middle" class="title">五大基本几何体的光照模式</text>
  <text x="400" y="50" text-anchor="middle" class="desc">光源统一来自左上方 · 万物皆可拆解为这五种形体的组合</text>

  <defs>
    <radialGradient id="g-sphere" cx="32%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="22%" stop-color="#ECECEC"/>
      <stop offset="55%" stop-color="#9C9C9C"/>
      <stop offset="80%" stop-color="#444444"/>
      <stop offset="92%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#4A4A4A"/>
    </radialGradient>
    <linearGradient id="g-cyl-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="20%" stop-color="#7C7C7C"/>
      <stop offset="42%" stop-color="#E2E2E2"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#D6D6D6"/>
      <stop offset="82%" stop-color="#6E6E6E"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <linearGradient id="g-cone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="30%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#383838"/>
    </linearGradient>
    <radialGradient id="g-torus" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#C8C8C8"/>
      <stop offset="65%" stop-color="#6E6E6E"/>
      <stop offset="100%" stop-color="#2E2E2E"/>
    </radialGradient>
  </defs>

  <!-- Panel 1: Sphere -->
  <g transform="translate(20, 70)">
    <rect class="panel-bg" x="0" y="0" width="148" height="492" rx="6"/>
    <text x="74" y="22" text-anchor="middle" class="panel-title">球 体</text>
    <circle cx="74" cy="130" r="50" fill="url(#g-sphere)"/>
    <line x1="58" y1="100" x2="40" y2="86" class="lead"/>
    <text x="14" y="84" class="lbl">高光</text>
    <line x1="92" y1="118" x2="112" y2="104" class="lead"/>
    <text x="114" y="102" class="lbl">亮面</text>
    <line x1="86" y1="160" x2="108" y2="172" class="lead"/>
    <text x="110" y="176" class="lbl">明暗交界</text>
    <line x1="62" y1="170" x2="44" y2="184" class="lead-blue"/>
    <text x="10" y="188" class="lbl-blue">反射光</text>
    <line x1="74" y1="184" x2="74" y2="196" class="lead-blue"/>
    <text x="42" y="206" class="lbl-blue">暗面</text>
    <text x="74" y="240" text-anchor="middle" class="desc">表面法线连续变化</text>
    <text x="74" y="256" text-anchor="middle" class="desc">3~5 级明度弧形排列</text>
    <text x="74" y="282" text-anchor="middle" class="desc">头 · 球果 · 水滴</text>
  </g>

  <!-- Panel 2: Cube -->
  <g transform="translate(178, 70)">
    <rect class="panel-bg" x="0" y="0" width="148" height="492" rx="6"/>
    <text x="74" y="22" text-anchor="middle" class="panel-title">立方体</text>
    <g transform="translate(44, 80)">
      <polygon points="0,40 60,40 90,18 30,18" fill="#F2F2F2" stroke="#555" stroke-width="1"/>
      <polygon points="0,40 30,18 30,58 0,80" fill="#A6A6A6" stroke="#555" stroke-width="1"/>
      <polygon points="60,40 90,18 90,58 60,80" fill="#5A5A5A" stroke="#555" stroke-width="1"/>
      <polygon points="0,80 60,80 90,58 30,58" fill="#3A3A3A" stroke="#555" stroke-width="1"/>
      <line x1="30" y1="18" x2="14" y2="6" class="lead"/>
      <text x="-6" y="4" class="lbl">顶面最亮</text>
      <line x1="15" y1="58" x2="-2" y2="60" class="lead"/>
      <text x="-22" y="64" class="lbl">中间调</text>
      <line x1="88" y1="40" x2="106" y2="32" class="lead"/>
      <text x="108" y="30" class="lbl">正面最暗</text>
    </g>
    <text x="74" y="200" text-anchor="middle" class="desc">只有面 · 没有渐变</text>
    <text x="74" y="216" text-anchor="middle" class="desc">三面阶跃式切换</text>
    <text x="74" y="242" text-anchor="middle" class="desc">盒 · 墙 · 宝箱</text>
  </g>

  <!-- Panel 3: Cylinder -->
  <g transform="translate(336, 70)">
    <rect class="panel-bg" x="0" y="0" width="148" height="492" rx="6"/>
    <text x="74" y="22" text-anchor="middle" class="panel-title">圆柱体</text>
    <g transform="translate(34, 80)">
      <ellipse cx="40" cy="16" rx="40" ry="12" fill="#D6D6D6" stroke="#555" stroke-width="1"/>
      <rect x="0" y="16" width="80" height="492" fill="url(#g-cyl-side)"/>
      <ellipse cx="40" cy="84" rx="40" ry="12" fill="#2E2E2E" stroke="#555" stroke-width="1"/>
      <line x1="62" y1="30" x2="84" y2="22" class="lead"/>
      <text x="86" y="20" class="lbl">高光(竖线)</text>
      <line x1="20" y1="60" x2="-4" y2="66" class="lead"/>
      <text x="-14" y="70" class="lbl">暗面</text>
      <text x="40" y="108" text-anchor="middle" class="lbl-blue">顶面平面均匀</text>
    </g>
    <text x="74" y="216" text-anchor="middle" class="desc">侧面=竖向渐变条带</text>
    <text x="74" y="232" text-anchor="middle" class="desc">3~4 条带即可</text>
    <text x="74" y="258" text-anchor="middle" class="desc">四肢 · 树干 · 瓶</text>
  </g>

  <!-- Panel 4: Cone -->
  <g transform="translate(494, 70)">
    <rect class="panel-bg" x="0" y="0" width="148" height="492" rx="6"/>
    <text x="74" y="22" text-anchor="middle" class="panel-title">圆锥体</text>
    <g transform="translate(34, 78)">
      <ellipse cx="40" cy="86" rx="40" ry="11" fill="#3A3A3A" stroke="#555" stroke-width="1"/>
      <polygon points="40,0 0,86 80,86" fill="url(#g-cone)" stroke="#555" stroke-width="1"/>
      <line x1="52" y1="22" x2="74" y2="14" class="lead"/>
      <text x="76" y="12" class="lbl">高光</text>
      <line x1="22" y1="60" x2="-2" y2="66" class="lead"/>
      <text x="-14" y="70" class="lbl">暗面</text>
      <line x1="40" y1="0" x2="40" y2="-12" class="lead-blue"/>
      <text x="20" y="-16" class="lbl-blue">顶窄底宽</text>
    </g>
    <text x="74" y="216" text-anchor="middle" class="desc">渐变宽度的圆柱</text>
    <text x="74" y="232" text-anchor="middle" class="desc">双向明暗变化</text>
    <text x="74" y="258" text-anchor="middle" class="desc">塔顶 · 帽 · 尖刺</text>
  </g>

  <!-- Panel 5: Torus -->
  <g transform="translate(652, 70)">
    <rect class="panel-bg" x="0" y="0" width="148" height="492" rx="6"/>
    <text x="74" y="22" text-anchor="middle" class="panel-title">环 体</text>
    <g transform="translate(34, 86)">
      <ellipse cx="40" cy="44" rx="46" ry="20" fill="none" stroke="#555" stroke-width="1"/>
      <path d="M6,40 Q40,8 74,40 Q40,30 6,40 Z" fill="url(#g-torus)" stroke="#555" stroke-width="1"/>
      <path d="M14,46 Q40,72 66,46 Q40,58 14,46 Z" fill="#3A3A3A" stroke="#555" stroke-width="1" opacity="0.85"/>
      <line x1="50" y1="18" x2="72" y2="10" class="lead"/>
      <text x="74" y="8" class="lbl">外侧高光</text>
      <line x1="28" y1="58" x2="6" y2="64" class="lead-blue"/>
      <text x="-12" y="68" class="lbl-blue">内侧自遮挡</text>
    </g>
    <text x="74" y="216" text-anchor="middle" class="desc">自遮挡最复杂</text>
    <text x="74" y="232" text-anchor="middle" class="desc">内侧受环境光</text>
    <text x="74" y="258" text-anchor="middle" class="desc">手镯 · 轮胎 · 拳头</text>
  </g>

  <!-- Bottom analogy -->
  <rect x="40" y="432" width="720" height="492" rx="4" fill="#2C3E50"/>
    <text x="400" y="472" text-anchor="middle" style="font-family:sans-serif;font-size:10px;fill:#BDC3C7;">WebGL 的 box/sphere/cylinder 几何体是渲染管线的最小单元，复杂 mesh 都是它们的组合。会画这五个 = 会拆万物。</text>
</svg>
