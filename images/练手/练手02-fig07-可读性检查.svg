<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    .bg { fill: #FAFAFA; }
    .title { font-family: sans-serif; font-size: 17px; font-weight: bold; fill: #2C3E50; }
    .col-title { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #2C3E50; }
    .desc { font-family: sans-serif; font-size: 10px; fill: #666; }
    .small { font-family: sans-serif; font-size: 9px; fill: #888; }
    .pass { font-family: sans-serif; font-size: 13px; font-weight: bold; fill: #27AE60; }
    .fail { font-family: sans-serif; font-size: 13px; font-weight: bold; fill: #E74C3C; }
    .panel-bg { fill: #fff; stroke: #E0E0E0; stroke-width: 1; rx: 6; }
  </style>
  <rect class="bg" width="800" height="400"/>
  <text x="400" y="28" text-anchor="middle" class="title">可读性检查：100% 实尺 + 模糊测试</text>
  <text x="400" y="46" text-anchor="middle" class="desc">小尺寸下信息密度要克制——"活下来"的特征才是真焦点</text>

  <defs>
    <filter id="blur-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.6"/>
    </filter>
  </defs>

  <!-- === 骑士精灵定义（复用） === -->
  <defs>
    <g id="knight">
      <rect x="6" y="0" width="8" height="3" fill="#3498DB"/>
      <rect x="5" y="3" width="10" height="2" fill="#2980B9"/>
      <rect x="9" y="-3" width="2" height="3" fill="#E74C3C"/>
      <rect x="6" y="5" width="8" height="4" fill="#FDBFA3"/>
      <rect x="7" y="6" width="1" height="1" fill="#2C3E50"/>
      <rect x="12" y="6" width="1" height="1" fill="#2C3E50"/>
      <rect x="4" y="9" width="12" height="8" fill="#3498DB"/>
      <rect x="4" y="9" width="12" height="2" fill="#5DADE2"/>
      <rect x="8" y="11" width="4" height="2" fill="#F1C40F"/>
      <rect x="4" y="17" width="12" height="2" fill="#7F4A2A"/>
      <rect x="5" y="19" width="4" height="6" fill="#34495E"/>
      <rect x="11" y="19" width="4" height="6" fill="#34495E"/>
      <rect x="5" y="25" width="4" height="2" fill="#7F4A2A"/>
      <rect x="11" y="25" width="4" height="2" fill="#7F4A2A"/>
      <rect x="2" y="10" width="2" height="6" fill="#3498DB"/>
      <rect x="16" y="3" width="2" height="14" fill="#ECF0F1"/>
      <rect x="15" y="14" width="4" height="1" fill="#7F4A2A"/>
      <rect x="3" y="9" width="2" height="10" fill="#E74C3C"/>
    </g>
  </defs>

  <!-- Column 1: 100% clean -->
  <g transform="translate(40, 65)">
    <rect class="panel-bg" x="0" y="0" width="220" height="310" rx="6"/>
    <text x="110" y="24" text-anchor="middle" class="col-title">100% 实尺</text>
    <text x="110" y="46" text-anchor="middle" class="pass">&#x2713; 可读</text>
    <g transform="translate(70, 60) scale(2.2)">
      <use href="#knight"/>
    </g>
    <text x="110" y="195" text-anchor="middle" class="desc">剪影 + 红羽 + 剑 + 腰带 四个锚点</text>
    <text x="110" y="212" text-anchor="middle" class="desc">一眼可辨"持剑骑士"</text>
    <text x="110" y="240" text-anchor="middle" class="small" fill="#27AE60">游戏内缩小时仍可辨认</text>
  </g>

  <!-- Column 2: blurred (stronger blur) -->
  <g transform="translate(290, 65)">
    <rect class="panel-bg" x="0" y="0" width="220" height="310" rx="6"/>
    <text x="110" y="24" text-anchor="middle" class="col-title">模糊测试</text>
    <text x="110" y="46" text-anchor="middle" class="pass">&#x2713; 焦点活下来</text>
    <g transform="translate(70, 60) scale(2.2)" filter="url(#blur-strong)">
      <use href="#knight"/>
    </g>
    <text x="110" y="195" text-anchor="middle" class="desc">细节被抹平后还能看到什么？</text>
    <text x="110" y="212" text-anchor="middle" class="desc">&#x2192; 蓝+红大色块 · 剑的纵向线</text>
    <text x="110" y="240" text-anchor="middle" class="small" fill="#27AE60">活下来的 = 真焦点</text>
  </g>

  <!-- Column 3: overloaded / broken silhouette -->
  <g transform="translate(540, 65)">
    <rect class="panel-bg" x="0" y="0" width="220" height="310" rx="6"/>
    <text x="110" y="24" text-anchor="middle" class="col-title">信息过载</text>
    <text x="110" y="46" text-anchor="middle" class="fail">&#x2717; 糊成一团</text>
    <g transform="translate(70, 60) scale(2.2)">
      <use href="#knight"/>
      <!-- heavy noise: many extra colored pixels that break silhouette -->
      <rect x="0" y="6" width="2" height="2" fill="#F1C40F"/>
      <rect x="18" y="8" width="2" height="2" fill="#F1C40F"/>
      <rect x="6" y="2" width="4" height="1" fill="#27AE60"/>
      <rect x="12" y="2" width="4" height="1" fill="#E67E22"/>
      <rect x="8" y="13" width="2" height="2" fill="#FFFFFF"/>
      <rect x="10" y="13" width="2" height="2" fill="#FFFFFF"/>
      <rect x="7" y="15" width="1" height="1" fill="#9B59B6"/>
      <rect x="12" y="15" width="1" height="1" fill="#9B59B6"/>
      <rect x="14" y="20" width="1" height="3" fill="#E67E22"/>
      <rect x="5" y="20" width="1" height="3" fill="#E67E22"/>
      <rect x="8" y="26" width="2" height="1" fill="#E74C3C"/>
      <rect x="11" y="26" width="2" height="1" fill="#9B59B6"/>
      <rect x="1" y="13" width="1" height="2" fill="#F1C40F"/>
      <rect x="13" y="7" width="1" height="2" fill="#27AE60"/>
      <rect x="6" y="27" width="1" height="1" fill="#FFFFFF"/>
      <!-- extra armor detail that clutters -->
      <rect x="4" y="13" width="2" height="1" fill="#E74C3C"/>
      <rect x="14" y="13" width="2" height="1" fill="#E74C3C"/>
      <rect x="6" y="11" width="1" height="1" fill="#F1C40F"/>
      <rect x="13" y="11" width="1" height="1" fill="#F1C40F"/>
      <rect x="9" y="10" width="2" height="1" fill="#27AE60"/>
    </g>
    <text x="110" y="195" text-anchor="middle" class="desc">8 色装饰 · 边缘破碎 · 剪影变乱</text>
    <text x="110" y="212" text-anchor="middle" class="desc">看不清主体轮廓，焦点丢失</text>
    <text x="110" y="240" text-anchor="middle" class="small" fill="#E74C3C">有疑虑 &#x2192; 删，别加</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="40" y="345" width="720" height="38" rx="4" fill="#2C3E50"/>
  <text x="400" y="369" text-anchor="middle" style="font-family:sans-serif;font-size:10px;fill:#BDC3C7;">小尺寸下信息密度要克制——暴露的视觉字段越少，读者越不容易误读。模糊测试 = 压测：扛住降级的特征才是真设计。</text>
</svg>
