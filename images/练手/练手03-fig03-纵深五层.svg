<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .layer-label { font-size: 12px; font-weight: bold; fill: #fff; }
    .layer-sub { font-size: 9px; fill: #ddd; }
    .layer-desc { font-size: 9px; fill: #888; }
    .layer-num { font-size: 18px; font-weight: bold; fill: #fff; opacity: 0.7; }
    .demo-label { font-size: 9px; fill: #666; }
    .note { font-size: 10px; fill: #888; }
    .arrow { stroke: #888; stroke-width: 1; fill: none; }
    .divider { stroke: #BDC3C7; stroke-width: 1; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#888"/>
    </marker>
    <linearGradient id="parallax-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#A0C4E0"/>
    </linearGradient>
    <linearGradient id="parallax-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CA84A"/>
      <stop offset="100%" stop-color="#4A7020"/>
    </linearGradient>
  </defs>

  <text x="400" y="26" class="title" text-anchor="middle">2D游戏纵深五层技术全景</text>

  <!-- Layer 1: Parallax -->
  <g transform="translate(30, 45)">
    <rect x="0" y="0" width="740" height="70" rx="4" fill="#2C3E50"/>
    <text x="25" y="28" class="layer-num">1</text>
    <text x="50" y="25" class="layer-label">视差滚动</text>
    <text x="50" y="42" class="layer-sub">Parallax Scrolling</text>
    <text x="180" y="30" class="layer-desc">远景层移动得比近景层慢</text>

    <!-- Mini demo: 3 horizontal scrolling layers -->
    <g transform="translate(430, 10)">
      <!-- Far -->
      <text x="0" y="15" class="demo-label" font-size="8">远景 (速度 1x)</text>
      <rect x="0" y="20" width="280" height="14" rx="2" fill="#A0C4E0" opacity="0.7"/>
      <!-- mountain shapes on far -->
      <polygon points="20,20 35,1 50,20" fill="#B0D4F0"/>
      <polygon points="80,20 100,4 120,20" fill="#B0D4F0"/>
      <polygon points="150,20 170,7 190,20" fill="#B0D4F0"/>
      <polygon points="220,20 235,2 250,20" fill="#B0D4F0"/>
      <!-- Mid -->
      <text x="0" y="43" class="demo-label" font-size="8">中景 (速度 3x)</text>
      <rect x="0" y="48" width="280" height="12" rx="2" fill="#7CA84A" opacity="0.8"/>
    </g>
  </g>

  <!-- Layer 2: Atmospheric Perspective -->
  <g transform="translate(30, 125)">
    <rect x="0" y="0" width="740" height="70" rx="4" fill="#4A90D9"/>
    <text x="25" y="28" class="layer-num">2</text>
    <text x="50" y="25" class="layer-label">大气透视</text>
    <text x="50" y="42" class="layer-sub">Atmospheric Perspective</text>
    <text x="180" y="30" class="layer-desc">远景偏蓝偏灰，颜色饱和度降低</text>

    <!-- Gradient strips showing color shift -->
    <g transform="translate(430, 12)">
      <text x="0" y="12" class="demo-label">近 → 远</text>
      <rect x="40" y="4" width="38" height="16" rx="2" fill="#8B4513"/>
      <rect x="82" y="4" width="38" height="16" rx="2" fill="#A0826D"/>
      <rect x="124" y="4" width="38" height="16" rx="2" fill="#B8AFA6"/>
      <rect x="166" y="4" width="38" height="16" rx="2" fill="#C8D0DB"/>
      <rect x="208" y="4" width="38" height="16" rx="2" fill="#D0DCF0"/>
      <text x="252" y="16" class="demo-label" fill="#E74C3C">越远越蓝</text>
    </g>
  </g>

  <!-- Layer 3: Color Recession -->
  <g transform="translate(30, 205)">
    <rect x="0" y="0" width="740" height="70" rx="4" fill="#27AE60"/>
    <text x="25" y="28" class="layer-num">3</text>
    <text x="50" y="25" class="layer-label">色彩后退</text>
    <text x="50" y="42" class="layer-sub">Color Recession</text>
    <text x="180" y="30" class="layer-desc">暖色（红/橙）前进，冷色（蓝/青）后退</text>

    <g transform="translate(430, 10)">
      <text x="0" y="14" class="demo-label">近景暖色</text>
      <rect x="70" y="6" width="28" height="14" rx="2" fill="#E74C3C"/>
      <rect x="102" y="6" width="28" height="14" rx="2" fill="#E67E22"/>
      <rect x="180" y="14" class="demo-label" font-size="8">→ 前进感</rect>
      <text x="0" y="43" class="demo-label">远景冷色</text>
      <rect x="70" y="35" width="28" height="14" rx="2" fill="#3498DB"/>
      <rect x="102" y="35" width="28" height="14" rx="2" fill="#A0C4E0"/>
      <rect x="180" y="43" class="demo-label" font-size="8">→ 后退感</rect>
    </g>
  </g>

  <!-- Layer 4: Detail Decay -->
  <g transform="translate(30, 285)">
    <rect x="0" y="0" width="740" height="70" rx="4" fill="#8E44AD"/>
    <text x="25" y="28" class="layer-num">4</text>
    <text x="50" y="25" class="layer-label">细节衰减</text>
    <text x="50" y="42" class="layer-sub">Detail Decay</text>
    <text x="180" y="30" class="layer-desc">远景细节少，简化成色块和轮廓</text>

    <g transform="translate(430, 12)">
      <!-- Near: detailed tree -->
      <text x="0" y="12" class="demo-label">近景树</text>
      <rect x="55" y="5" width="8" height="18" fill="#5D4037"/>
      <circle cx="59" cy="6" r="14" fill="#4CAF50"/>
      <circle cx="50" cy="10" r="9" fill="#388E3C"/>
      <circle cx="69" cy="10" r="9" fill="#2E7D32"/>
      <!-- Far: simple tree -->
      <text x="110" y="12" class="demo-label">远景树</text>
      <rect x="154" y="10" width="4" height="6" fill="#5D4037"/>
      <polygon points="156,3 150,14 162,14" fill="#7CA84A" opacity="0.7"/>
      <text x="185" y="14" class="demo-label" fill="#E74C3C">细节消失了</text>
    </g>
  </g>

  <!-- Layer 5: Overlap -->
  <g transform="translate(30, 365)">
    <rect x="0" y="0" width="740" height="70" rx="4" fill="#E67E22"/>
    <text x="25" y="28" class="layer-num">5</text>
    <text x="50" y="25" class="layer-label">叠压关系</text>
    <text x="50" y="42" class="layer-sub">Occlusion / Overlap</text>
    <text x="180" y="30" class="layer-desc">前面的物体挡住后面的——最直观的深度线索</text>

    <g transform="translate(430, 10)">
      <circle cx="58" cy="35" r="20" fill="#E8F4FD" opacity="0.6"/>
      <circle cx="85" cy="25" r="18" fill="#3498DB" opacity="0.7"/>
      <circle cx="100" cy="35" r="22" fill="#2C3E50" opacity="0.9"/>
      <text x="140" y="38" class="demo-label" fill="#333">挡住=更近</text>
      <text x="45" y="55" class="demo-label">远</text>
      <text x="105" y="58" class="demo-label">→</text>
      <text x="130" y="55" class="demo-label">近</text>
    </g>
  </g>

  <!-- Summary -->
  <rect x="30" y="452" width="740" height="34" rx="4" fill="#E8F4FD" stroke="#4A90D9" stroke-width="1"/>
  </svg>