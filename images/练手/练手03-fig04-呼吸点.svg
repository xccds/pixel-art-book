<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <style>
    .title { font-family: sans-serif; font-size: 17px; font-weight: bold; fill: #222; }
    .subtitle { font-family: sans-serif; font-size: 11px; fill: #888; }
    .panel-title { font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .label { font-family: sans-serif; font-size: 11px; }
    .badge-bad { fill: #E74C3C; font-weight: bold; }
    .badge-good { fill: #27AE60; font-weight: bold; }
    .pixel { stroke: none; }
    .frame { fill: none; stroke: #bbb; stroke-width: 2; rx: 4; }
    .breath-marker { stroke: #27AE60; stroke-width: 2; fill: none; stroke-dasharray: 6,3; rx: 3; }
    .breath-label { font-family: sans-serif; font-size: 13px; fill: #27AE60; font-weight: bold; }
    .insight { font-family: sans-serif; font-size: 10px; fill: #666; }
  </style>

  <text x="400" y="28" class="title" text-anchor="middle">呼吸点——画面的肺，眼睛的休息区</text>

  <!-- ===== LEFT: suffocating scene ===== -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="355" height="220" class="frame"/>
    <text x="177" y="-14" class="panel-title" fill="#E74C3C">&#x2717; 窒息：没有留白</text>

    <!-- Ground (starts low, fills bottom) -->
    <rect x="0" y="180" width="355" height="40" class="pixel" fill="#5D4037"/>
    <rect x="0" y="176" width="355" height="4" class="pixel" fill="#4CAF50"/>

    <!-- Everything crammed: buildings + enemies + collectibles packed together -->
    <rect x="5" y="100" width="30" height="76" class="pixel" fill="#546E7A"/>
    <rect x="10" y="105" width="8" height="8" class="pixel" fill="#FFB74D"/>
    <rect x="22" y="120" width="8" height="8" class="pixel" fill="#FFB74D"/>

    <rect x="42" y="120" width="28" height="56" class="pixel" fill="#607D8B"/>
    <rect x="46" y="125" width="8" height="8" class="pixel" fill="#FFB74D"/>
    <rect x="58" y="110" width="8" height="8" class="pixel" fill="#E74C3C"/>

    <rect x="78" y="90" width="32" height="86" class="pixel" fill="#455A64"/>
    <rect x="82" y="98" width="10" height="10" class="pixel" fill="#FFB74D"/>

    <rect x="120" y="115" width="26" height="61" class="pixel" fill="#546E7A"/>
    <rect x="155" y="105" width="24" height="71" class="pixel" fill="#607D8B"/>

    <rect x="190" y="95" width="30" height="81" class="pixel" fill="#455A64"/>
    <rect x="230" y="110" width="28" height="66" class="pixel" fill="#546E7A"/>
    <rect x="270" y="100" width="25" height="76" class="pixel" fill="#607D8B"/>
    <rect x="305" y="120" width="30" height="56" class="pixel" fill="#455A64"/>

    <!-- Collectibles scattered everywhere -->
    <circle cx="70" cy="168" r="4" class="pixel" fill="#F1C40F"/>
    <circle cx="140" cy="160" r="4" class="pixel" fill="#F1C40F"/>
    <circle cx="200" cy="172" r="4" class="pixel" fill="#F1C40F"/>
    <circle cx="250" cy="165" r="4" class="pixel" fill="#F1C40F"/>
    <circle cx="310" cy="170" r="4" class="pixel" fill="#F1C40F"/>

    <!-- Enemy everywhere -->
    <rect x="100" y="148" width="10" height="10" class="pixel" fill="#E74C3C"/>
    <rect x="220" y="140" width="10" height="10" class="pixel" fill="#E74C3C"/>
    <rect x="300" y="152" width="10" height="10" class="pixel" fill="#E74C3C"/>

    <!-- HUD at top, also crammed -->
    <rect x="5" y="6" width="100" height="16" class="pixel" fill="#34495E" rx="2"/>
    <rect x="115" y="6" width="60" height="16" class="pixel" fill="#2C3E50" rx="2"/>
    <rect x="185" y="6" width="80" height="16" class="pixel" fill="#34495E" rx="2"/>
    <rect x="280" y="6" width="50" height="16" class="pixel" fill="#34495E" rx="2"/>

    <!-- Clouds filling the sky -->
    <rect x="10" y="35" width="40" height="16" class="pixel" fill="#BDC3C7" rx="4"/>
    <rect x="60" y="28" width="50" height="14" class="pixel" fill="#BDC3C7" rx="4"/>
    <rect x="130" y="38" width="35" height="14" class="pixel" fill="#BDC3C7" rx="4"/>
    <rect x="180" y="30" width="45" height="16" class="pixel" fill="#BDC3C7" rx="4"/>
    <rect x="240" y="38" width="40" height="12" class="pixel" fill="#BDC3C7" rx="4"/>
    <rect x="300" y="32" width="45" height="14" class="pixel" fill="#BDC3C7" rx="4"/>

    <text x="177" y="245" class="label" text-anchor="middle" fill="#E74C3C">眼睛没有停歇的地方，画面像被塞满了</text>
  </g>

  <!-- ===== RIGHT: breathing room ===== -->
  <g transform="translate(415, 55)">
    <rect x="0" y="0" width="355" height="220" class="frame"/>
    <text x="177" y="-14" class="panel-title" fill="#27AE60">&#x2713; 舒适：有呼吸点</text>

    <!-- Ground -->
    <rect x="0" y="180" width="355" height="40" class="pixel" fill="#5D4037"/>
    <rect x="0" y="176" width="355" height="4" class="pixel" fill="#4CAF50"/>

    <!-- Fewer buildings, spaced out, leave open sky -->
    <rect x="10" y="120" width="24" height="56" class="pixel" fill="#546E7A"/>
    <rect x="14" y="125" width="6" height="6" class="pixel" fill="#FFB74D"/>

    <rect x="60" y="130" width="22" height="46" class="pixel" fill="#607D8B"/>

    <rect x="130" y="110" width="26" height="66" class="pixel" fill="#455A64"/>
    <rect x="134" y="118" width="8" height="8" class="pixel" fill="#FFB74D"/>

    <rect x="220" y="125" width="24" height="51" class="pixel" fill="#546E7A"/>

    <!-- Only one enemy, in clear space to the right -->
    <rect x="300" y="146" width="10" height="10" class="pixel" fill="#E74C3C"/>

    <!-- Light HUD, minimal -->
    <rect x="5" y="6" width="80" height="13" class="pixel" fill="#34495E" rx="2"/>
    <rect x="260" y="6" width="60" height="13" class="pixel" fill="#34495E" rx="2"/>

    <!-- Just one cloud -->
    <rect x="160" y="30" width="40" height="14" class="pixel" fill="#BDC3C7" rx="4"/>

    <!-- Character standing in breathing space -->
    <rect x="195" y="162" width="8" height="14" class="pixel" fill="#3498DB"/>
    <rect x="196" y="158" width="6" height="4" class="pixel" fill="#3498DB"/>
    <rect x="190" y="155" width="4" height="6" class="pixel" fill="#3498DB"/>
    <rect x="204" y="155" width="4" height="6" class="pixel" fill="#3498DB"/>

    <!-- Breathing point marker (the empty area to the right of character) -->
    <rect x="220" y="45" width="120" height="110" class="breath-marker"/>
    <text x="280" y="80" class="breath-label" text-anchor="middle">呼吸点</text>
    <text x="280" y="96" class="label" text-anchor="middle" fill="#27AE60" font-size="9">&#x2190; 眼睛在此休息</text>

    <text x="177" y="245" class="label" text-anchor="middle" fill="#27AE60">留白让画面有节奏，像音乐中的休止符</text>
  </g>

  <!-- Bottom insight -->
  <rect x="30" y="330" width="740" height="40" rx="4" fill="#F0F7F4"/>
  <text x="400" y="352" class="insight" text-anchor="middle" fill="#27AE60" font-size="11" font-weight="bold">设计原则：每张游戏画面留出 10-15% 的空白区域</text>
  <text x="400" y="368" class="insight" text-anchor="middle">不是"什么都没画"，而是有意设计的休息点——让玩家眼睛有停顿，作品才有呼吸节奏</text>

  <!-- Bottom: ratio bar -->
  <text x="400" y="395" class="label" text-anchor="middle" fill="#888" font-size="10">构图中的留白比例参考</text>
  <g transform="translate(40, 405)">
    <rect x="0" y="0" width="720" height="22" rx="3" fill="#ECF0F1"/>
    <!-- 10-15% breathing zone marker -->
    <rect x="72" y="0" width="36" height="22" rx="3" fill="#27AE60" opacity="0.3"/>
    <line x1="90" y1="0" x2="90" y2="22" stroke="#27AE60" stroke-width="2"/>
    <text x="90" y="29" text-anchor="middle" class="label" fill="#27AE60" font-size="9">≥ 10%</text>
    <line x1="90" y1="22" x2="90" y2="27" stroke="#27AE60" stroke-width="1"/>

    <text x="45" y="15" class="label" text-anchor="middle" fill="#888" font-size="9">太拥挤</text>
    <text x="720" y="15" class="label" text-anchor="end" fill="#888" font-size="9">太空旷</text>
  </g>
</svg>
