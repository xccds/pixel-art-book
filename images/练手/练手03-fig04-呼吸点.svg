<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .scene-bg { fill: #1A1A2E; }
    .busy { fill: #2C3E50; }
    .busy-accent { fill: #E74C3C; }
    .busy-accent-dim { fill: #C0392B; opacity: 0.6; }
    .busy-light { fill: #F39C12; opacity: 0.5; }
    .medium { fill: #34495E; }
    .medium-accent { fill: #3498DB; }
    .calm-zone { fill: #16213E; stroke: #27AE60; stroke-width: 2; stroke-dasharray: 6,3; }
    .calm-zone-fill { fill: #16213E; opacity: 0.5; }
    .note { font-size: 10px; fill: #888; }
    .highlight { font-size: 11px; fill: #27AE60; font-weight: bold; }
    .legend-text { font-size: 10px; fill: #ccc; }
    .zone-label { font-size: 10px; fill: #666; }
    .breath-label { font-size: 13px; fill: #27AE60; font-weight: bold; }
  </style>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#27AE60"/>
    </marker>
  </defs>

  <text x="400" y="26" class="title" text-anchor="middle">呼吸点——让眼睛有地方休息</text>

  <!-- Main scene -->
  <rect x="25" y="42" width="750" height="360" rx="4" class="scene-bg"/>

  <!-- Zone A: Top-left - Dense elements -->
  <g transform="translate(25, 42)">
    <!-- Buildings cluster -->
    <rect x="20" y="100" width="18" height="80" class="busy"/>
    <rect x="42" y="80" width="22" height="100" class="busy"/>
    <rect x="68" y="110" width="16" height="70" class="busy"/>
    <rect x="88" y="70" width="24" height="110" class="busy"/>
    <!-- Windows -->
    <rect x="25" y="108" width="4" height="4" class="busy-accent-dim"/>
    <rect x="33" y="108" width="4" height="4" class="busy-accent-dim"/>
    <rect x="25" y="120" width="4" height="4" class="busy-accent-dim"/>
    <rect x="47" y="88" width="4" height="4" class="busy-accent-dim"/>
    <rect x="55" y="88" width="4" height="4" class="busy-accent-dim"/>
    <rect x="47" y="100" width="4" height="4" class="busy-light"/>
    <rect x="93" y="78" width="4" height="4" class="busy-accent-dim"/>
    <rect x="101" y="78" width="4" height="4" class="busy-accent-dim"/>
    <rect x="93" y="90" width="4" height="4" class="busy-accent-dim"/>
    <rect x="101" y="90" width="4" height="4" class="busy-light"/>

    <!-- Decorations -->
    <circle cx="75" cy="60" r="8" class="busy-light"/>
    <circle cx="90" cy="55" r="5" class="busy-light" opacity="0.5"/>

    <!-- Ground clutter -->
    <rect x="15" y="180" width="105" height="4" fill="#16213E"/>
    <rect x="30" y="178" width="8" height="2" fill="#2C3E50"/>
    <rect x="70" y="176" width="12" height="2" fill="#2C3E50"/>

    <text x="65" y="210" class="zone-label">A 区：90% 元素密集</text>
  </g>

  <!-- Zone B: Top-right - Moderate elements -->
  <g transform="translate(25, 42)">
    <rect x="440" y="70" width="16" height="110" class="medium"/>
    <rect x="460" y="60" width="14" height="80" class="medium"/>
    <rect x="478" y="90" width="10" height="50" class="medium"/>

    <circle cx="470" cy="55" r="6" fill="#3498DB" opacity="0.4"/>

    <!-- Ground -->
    <rect x="440" y="180" width="52" height="3" fill="#16213E"/>

    <!-- Tree silhouette -->
    <polygon points="590,50 615,140 565,140" fill="#1A1A2E" stroke="#34495E" stroke-width="1"/>
    <rect x="585" y="140" width="10" height="40" fill="#2C3E50"/>

    <text x="500" y="210" class="zone-label">B 区：60% 中等密度</text>
  </g>

  <!-- Zone C: Bottom-left - Sparse -->
  <g transform="translate(25, 42)">
    <rect x="30" y="260" width="12" height="40" class="medium"/>
    <rect x="60" y="280" width="8" height="20" class="medium"/>
    <rect x="20" y="300" width="60" height="2" fill="#16213E"/>
    <text x="55" y="330" class="zone-label">C 区：30% 稀疏</text>
  </g>

  <!-- Zone D: Breathing point - Bottom-right -->
  <g transform="translate(25, 42)">
    <rect x="440" y="250" width="310" height="140" rx="4" class="calm-zone"/>
    <rect x="440" y="250" width="310" height="140" class="calm-zone-fill"/>

    <!-- Minimal elements: just a small ground hint -->
    <rect x="500" y="370" width="180" height="1" fill="#16213E"/>

    <text x="595" y="310" class="breath-label" text-anchor="middle">呼 吸 点</text>
    <text x="595" y="330" class="zone-label" text-anchor="middle">Breathing Point</text>
    <text x="595" y="348" class="note" text-anchor="middle">10% 元素 ● 最低对比度</text>
    <text x="595" y="365" class="note" text-anchor="middle">眼睛在这里休息</text>

    <!-- Arrow pointing to breathing zone -->
    <line x1="310" y1="300" x2="435" y2="300" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="4,2"/>
  </g>

  <!-- Legend -->
  <rect x="25" y="418" width="750" height="50" rx="4" fill="#E8F4FD" stroke="#4A90D9" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" class="note" fill="#2C3E50" font-size="10">设计原则：90% 的区域承载信息，但必须有至少 10% 的区域“什么都没有”——它是画面的减压阀</text>
  <text x="400" y="456" text-anchor="middle" class="note" fill="#666" font-size="10">程序员类比：就像代码中的空行——没有空行的代码块像一堵墙；有空行的代码，逻辑边界一眼可辨</text>
</svg>