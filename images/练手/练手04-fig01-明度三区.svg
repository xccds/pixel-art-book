<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 16px; font-weight: bold; fill: #fff; }
      .label-dark { font-size: 16px; font-weight: bold; fill: #333; }
      .note { font-size: 13px; fill: #666; }
      .zone-label { font-size: 20px; font-weight: bold; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#FAFAFA"/>

  <text x="400" y="36" text-anchor="middle" class="title">明度三区系统（Value Three-Zone System）</text>
  <text x="400" y="58" text-anchor="middle" class="subtitle">将画面分为亮区、中调区、暗区——各区的面积占比决定画面情绪</text>

  <!-- Zone 1: High Key (亮区) -->
  <rect x="60" y="90" width="680" height="80" rx="4" fill="#F0F0F0" stroke="#CCC" stroke-width="1"/>
  <text x="80" y="120" class="zone-label" fill="#333">亮区（High Key）</text>
  <text x="80" y="148" class="note">明度范围 7–10 | 大面积→明亮、轻快、开阔、安全 | 小面积→点缀、高光</text>
  <rect x="620" y="105" width="100" height="50" rx="3" fill="#CCC"/>
  <text x="670" y="130" text-anchor="middle" class="label-dark" font-size="11">面积可变</text>
  <text x="670" y="148" text-anchor="middle" class="note" font-size="10">决定情绪</text>

  <!-- Zone 2: Mid Tone (中调区) -->
  <rect x="60" y="190" width="680" height="80" rx="4" fill="#888" stroke="#999" stroke-width="1"/>
  <text x="80" y="220" class="zone-label" fill="#FFF">中调区（Mid Tone）</text>
  <text x="80" y="248" class="note" fill="#FFF" opacity="0.9">明度范围 3–7 | 画面主体所在 | 承载大部分信息</text>

  <!-- Zone 3: Low Key (暗区) -->
  <rect x="60" y="290" width="680" height="80" rx="4" fill="#2C2C2C" stroke="#555" stroke-width="1"/>
  <text x="80" y="320" class="zone-label" fill="#FFF">暗区（Low Key）</text>
  <text x="80" y="348" class="note" fill="#AAA">明度范围 0–3 | 大面积→神秘、压抑、恐怖、危险 | 小面积→阴影、深度</text>
  <rect x="620" y="305" width="100" height="50" rx="3" fill="#555"/>
  <text x="670" y="330" text-anchor="middle" class="label" fill="#FFF" font-size="11">面积可变</text>
  <text x="670" y="348" text-anchor="middle" class="note" fill="#AAA" font-size="10">决定情绪</text>

  <!-- Arrow annotations -->
  <line x1="400" y1="175" x2="400" y2="185" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="400" y1="275" x2="400" y2="285" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Gamut examples at bottom -->
  <text x="400" y="420" text-anchor="middle" class="title" font-size="16">关键洞察</text>

  <rect x="60" y="440" width="680" height="40" rx="4" fill="#E8F4FD"/>
  <text x="400" y="465" text-anchor="middle" class="note" fill="#333" font-size="14">明度结构 = 画面骨架。骨架对了，色彩随便换；骨架错了，换什么颜色都救不回来。</text>
</svg>
