<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .note { font-size: 13px; fill: #666; }
      .caption { font-size: 14px; font-weight: bold; fill: #333; }
      .question { font-size: 15px; font-weight: bold; fill: #E74C3C; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#FAFAFA"/>

  <text x="400" y="32" text-anchor="middle" class="title">去色检验法（Desaturation Test）</text>
  <text x="400" y="54" text-anchor="middle" class="note">去掉色彩后，你的画面骨架还站得住吗？</text>

  <!-- Left: Color scene -->
  <text x="220" y="82" text-anchor="middle" class="caption">彩色画面</text>
  <rect x="40" y="92" width="360" height="260" rx="4" fill="#2C3E50" stroke="#CCC" stroke-width="1"/>

  <!-- Sky gradient colored -->
  <rect x="40" y="92" width="360" height="140" rx="4" fill="#5DADE2"/>
  <rect x="40" y="220" width="360" height="132" fill="#2C3E50"/>

  <!-- Ground -->
  <rect x="40" y="292" width="360" height="60" fill="#1E8449"/>

  <!-- Buildings -->
  <rect x="60" y="170" width="60" height="130" fill="#E74C3C" rx="2"/>
  <rect x="135" y="200" width="50" height="100" fill="#3498DB" rx="2"/>
  <rect x="200" y="155" width="55" height="145" fill="#F39C12" rx="2"/>

  <!-- Windows -->
  <rect x="70" y="180" width="12" height="14" fill="#FFF9C4" rx="1"/>
  <rect x="90" y="180" width="12" height="14" fill="#FFF9C4" rx="1"/>
  <rect x="70" y="205" width="12" height="14" fill="#FFF9C4" rx="1"/>
  <rect x="90" y="205" width="12" height="14" fill="#FFF9C4" rx="1"/>
  <rect x="145" y="212" width="10" height="12" fill="#FFF9C4" rx="1"/>
  <rect x="160" y="212" width="10" height="12" fill="#FFF9C4" rx="1"/>
  <rect x="212" y="167" width="10" height="12" fill="#FFF9C4" rx="1"/>
  <rect x="232" y="167" width="10" height="12" fill="#FFF9C4" rx="1"/>
  <rect x="212" y="192" width="10" height="12" fill="#FFF9C4" rx="1"/>
  <rect x="232" y="192" width="10" height="12" fill="#FFF9C4" rx="1"/>

  <!-- Foreground tree -->
  <rect x="280" y="220" width="12" height="72" fill="#6E2C00"/>
  <ellipse cx="286" cy="210" rx="35" ry="30" fill="#27AE60"/>

  <!-- Person (color) -->
  <circle cx="330" cy="260" r="10" fill="#F1C40F"/>
  <rect x="323" y="270" width="14" height="22" fill="#F1C40F" rx="2"/>

  <!-- Right: Desaturated scene -->
  <text x="580" y="82" text-anchor="middle" class="caption">去色后</text>
  <rect x="400" y="92" width="360" height="260" rx="4" fill="#5C5C5C" stroke="#CCC" stroke-width="1"/>

  <!-- Desaturated versions -->
  <rect x="400" y="92" width="360" height="140" rx="4" fill="#ABABAB"/>
  <rect x="400" y="220" width="360" height="132" fill="#5C5C5C"/>

  <!-- Ground desat -->
  <rect x="400" y="292" width="360" height="60" fill="#6B6B6B"/>

  <!-- Buildings desat -->
  <rect x="420" y="170" width="60" height="130" fill="#8C8C8C" rx="2"/>
  <rect x="495" y="200" width="50" height="100" fill="#8C8C8C" rx="2"/>
  <rect x="560" y="155" width="55" height="145" fill="#A0A0A0" rx="2"/>

  <!-- Windows desat -->
  <rect x="430" y="180" width="12" height="14" fill="#D4D4D4" rx="1"/>
  <rect x="450" y="180" width="12" height="14" fill="#D4D4D4" rx="1"/>
  <rect x="430" y="205" width="12" height="14" fill="#D4D4D4" rx="1"/>
  <rect x="450" y="205" width="12" height="14" fill="#D4D4D4" rx="1"/>
  <rect x="505" y="212" width="10" height="12" fill="#D4D4D4" rx="1"/>
  <rect x="520" y="212" width="10" height="12" fill="#D4D4D4" rx="1"/>
  <rect x="572" y="167" width="10" height="12" fill="#D4D4D4" rx="1"/>
  <rect x="592" y="167" width="10" height="12" fill="#D4D4D4" rx="1"/>
  <rect x="572" y="192" width="10" height="12" fill="#D4D4D4" rx="1"/>
  <rect x="592" y="192" width="10" height="12" fill="#D4D4D4" rx="1"/>

  <!-- Tree desat -->
  <rect x="640" y="220" width="12" height="72" fill="#5A5A5A"/>
  <ellipse cx="646" cy="210" rx="35" ry="30" fill="#8E8E8E"/>

  <!-- Person desat -->
  <circle cx="690" cy="260" r="10" fill="#B0B0B0"/>
  <rect x="683" y="270" width="14" height="22" fill="#B0B0B0" rx="2"/>

  <!-- Arrow between -->
  <polygon points="385,225 400,215 400,235" fill="#E74C3C"/>

  <!-- Analysis below -->
  <text x="400" y="385" text-anchor="middle" class="question">去色后还能看出焦点吗？人物和背景分得开吗？</text>

  <!-- Bad example annotation -->
  <rect x="40" y="410" width="720" height="38" rx="3" fill="#FFEEEE"/>
  <text x="400" y="433" text-anchor="middle" class="note" fill="#E74C3C" font-size="14">如果去色后画面融为一体、分不出层次 → 说明你一直在靠色彩"作弊"掩盖明度问题</text>

  <text x="400" y="472" text-anchor="middle" class="note" font-size="12">来源：James Gurney "If your picture looks bad in black and white, it won't be saved by color"</text>
</svg>
