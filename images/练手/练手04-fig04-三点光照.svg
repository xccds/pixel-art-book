<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 490" width="800" height="490">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .light-label { font-size: 15px; font-weight: bold; fill: #E67E22; }
      .light-note { font-size: 12px; fill: #666; }
      .ray-label { font-size: 13px; font-weight: bold; }
    </style>
    <radialGradient id="spotKey" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B3E5FC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B3E5FC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotRim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="490" fill="#FAFAFA"/>

  <text x="400" y="32" text-anchor="middle" class="title">三步照明法（Three-Point Lighting）</text>
  <text x="400" y="54" text-anchor="middle" class="subtitle">Key（主光源）+ Fill（补光）+ Rim（轮廓光）——可在任何引擎中实现</text>

  <!-- Sphere area -->
  <rect x="200" y="100" width="200" height="490" rx="100" fill="#1A1A1A"/>

  <!-- Key light effect on sphere -->
  <ellipse cx="280" cy="180" rx="70" ry="70" fill="#F5F5F5" opacity="0.9"/>
  <ellipse cx="300" cy="160" rx="40" ry="40" fill="#FFFFFF" opacity="0.95"/>

  <!-- Fill light effect -->
  <ellipse cx="250" cy="230" rx="40" ry="30" fill="#B3E5FC" opacity="0.35"/>

  <!-- Rim light effect -->
  <ellipse cx="370" cy="200" rx="15" ry="50" fill="#FFFFFF" opacity="0.7"/>

  <!-- Light sources (outside sphere area, showing directions) -->
  <!-- Key Light - top right -->
  <circle cx="550" cy="110" r="12" fill="#FFF9C4" stroke="#E67E22" stroke-width="2"/>
  <text x="568" y="115" class="light-label">Key 主光源</text>
  <text x="568" y="132" class="light-note">右上45°，最强光照</text>
  <line x1="538" y1="115" x2="370" y2="165" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Fill Light - bottom left -->
  <circle cx="80" cy="380" r="10" fill="#B3E5FC" stroke="#3498DB" stroke-width="2"/>
  <text x="98" y="385" class="light-label" fill="#3498DB">Fill 补光</text>
  <text x="98" y="402" class="light-note">左下，柔和补充暗部</text>
  <line x1="92" y1="372" x2="230" y2="260" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- Rim Light - back -->
  <circle cx="550" cy="380" r="10" fill="#FFFFFF" stroke="#999" stroke-width="2"/>
  <text x="568" y="385" class="light-label" fill="#3498DB">Rim 轮廓光</text>
  <text x="568" y="402" class="light-note">正后方，分离角色与背景</text>
  <line x1="540" y1="372" x2="380" y2="240" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- Legend / formula -->
  <rect x="30" y="430" width="740" height="490" rx="4" fill="#E8F4FD"/>
  <text x="400" y="450" text-anchor="middle" class="note" fill="#333" font-size="14">公式：Key决定明度结构（主）· Fill控制暗部细节（辅）· Rim分离轮廓（点睛）</text>
  <text x="400" y="470" text-anchor="middle" class="note" fill="#999" font-size="12">适用：3D渲染、2D插画、像素艺术、UI设计 · 来源：电影/摄影标准技法 · Gurney《Color and Light》</text>

  <!-- Top-down mini diagram -->
  <rect x="30" y="75" width="130" height="490" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="95" y="93" text-anchor="middle" class="note" font-size="11">俯视示意</text>
  <circle cx="95" cy="145" r="20" fill="#888" stroke="#666" stroke-width="1"/>
  <text x="95" y="149" text-anchor="middle" class="note" fill="#FFF" font-size="8">球体</text>
  <!-- Key from top-right -->
  <text x="130" y="118" text-anchor="middle" class="note" font-size="8" fill="#E67E22">Key</text>
  <line x1="125" y1="125" x2="108" y2="138" stroke="#E67E22" stroke-width="1.5"/>
  <!-- Fill from bottom -->
  <text x="95" y="175" text-anchor="middle" class="note" font-size="8" fill="#3498DB">Fill</text>
  <line x1="95" y1="168" x2="95" y2="158" stroke="#3498DB" stroke-width="1.5"/>
  <!-- Rim from back -->
  <text x="50" y="145" text-anchor="middle" class="note" font-size="8" fill="#999">Rim</text>
  <line x1="67" y1="145" x2="78" y2="145" stroke="#999" stroke-width="1.5"/>
</svg>
