<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 492" width="800" height="492">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 13px; fill: #666; }
      .panel-title { font-size: 15px; font-weight: bold; fill: #333; }
      .panel-sub { font-size: 12px; fill: #666; }
      .arrow-label { font-size: 12px; fill: #E67E22; font-weight: bold; }
      .tag-html { font-size: 12px; font-weight: bold; fill: #2C7BE5; }
      .tag-css { font-size: 12px; font-weight: bold; fill: #C0392B; }
      .tag-out { font-size: 12px; font-weight: bold; fill: #27AE60; }
      .box-title { font-size: 15px; font-weight: bold; fill: #E67E22; }
      .box-note { font-size: 13px; fill: #555; }
    </style>
    <marker id="arrR2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#E67E22"/>
    </marker>
  </defs>
  <rect width="800" height="492" fill="#FAFAFA"/>

  <text x="400" y="36" text-anchor="middle" class="title">灰度→色彩工作流（Grayscale → Color）</text>
  <text x="400" y="58" text-anchor="middle" class="subtitle">先写 HTML 结构（明度），再加 CSS 样式（色彩）——结构对了，样式怎么改都不会塌</text>

  <!-- Panel 1: grayscale sketch -->
  <rect x="30" y="78" width="220" height="492" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="140" y="100" text-anchor="middle" class="panel-title">① 灰度草图</text>
  <!-- gray character -->
  <circle cx="140" cy="158" r="22" fill="#C0C0C0" stroke="#2C2C2C" stroke-width="2"/>
  <circle cx="132" cy="150" r="7" fill="#FFFFFF" opacity="0.85"/>
  <rect x="118" y="182" width="44" height="492" rx="3" fill="#808080" stroke="#2C2C2C" stroke-width="2"/>
  <rect x="146" y="182" width="16" height="492" fill="#404040" opacity="0.6"/>
  <rect x="122" y="262" width="16" height="492" fill="#606060" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="142" y="262" width="16" height="492" fill="#606060" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="150" y="182" width="5" height="492" fill="#FFF9C4" opacity="0.9"/>
  <text x="140" y="318" text-anchor="middle" class="tag-html">HTML 结构 · 明度</text>

  <!-- Arrow 1 -->
  <line x1="256" y1="210" x2="286" y2="210" stroke="#E67E22" stroke-width="2.5" marker-end="url(#arrR2)"/>
  <text x="271" y="198" text-anchor="middle" class="arrow-label">Overlay</text>
  <text x="271" y="228" text-anchor="middle" class="arrow-label">/Color</text>

  <!-- Panel 2: color overlay -->
  <rect x="290" y="78" width="220" height="492" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="400" y="100" text-anchor="middle" class="panel-title">② 叠加颜色</text>
  <!-- faint gray character behind -->
  <circle cx="400" cy="158" r="22" fill="#C0C0C0" stroke="#2C2C2C" stroke-width="2" opacity="0.35"/>
  <rect x="378" y="182" width="44" height="492" rx="3" fill="#808080" stroke="#2C2C2C" stroke-width="2" opacity="0.35"/>
  <!-- translucent color layer swatches -->
  <rect x="370" y="140" width="64" height="492" rx="3" fill="#E74C3C" opacity="0.5"/>
  <rect x="396" y="172" width="64" height="492" rx="3" fill="#3498DB" opacity="0.5"/>
  <rect x="372" y="200" width="64" height="492" rx="3" fill="#F1C40F" opacity="0.5"/>
  <!-- layer icon top-right -->
  <rect x="478" y="116" width="26" height="492" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <rect x="474" y="112" width="26" height="492" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="280" text-anchor="middle" class="panel-sub" font-size="11">混合模式只改色相 / 饱和度</text>
  <text x="400" y="296" text-anchor="middle" class="panel-sub" font-size="11">不动底层明度结构</text>
  <text x="400" y="318" text-anchor="middle" class="tag-css">CSS 样式 · 色相·饱和度</text>

  <!-- Arrow 2 -->
  <line x1="516" y1="210" x2="546" y2="210" stroke="#E67E22" stroke-width="2.5" marker-end="url(#arrR2)"/>
  <text x="531" y="198" text-anchor="middle" class="arrow-label">精修</text>

  <!-- Panel 3: final colored -->
  <rect x="550" y="78" width="220" height="492" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="660" y="100" text-anchor="middle" class="panel-title">③ 成品</text>
  <!-- colored character (same pose) -->
  <circle cx="660" cy="158" r="22" fill="#F1C40F" stroke="#2C2C2C" stroke-width="2"/>
  <circle cx="652" cy="150" r="7" fill="#FFF9C4" opacity="0.85"/>
  <rect x="638" y="182" width="44" height="492" rx="3" fill="#E74C3C" stroke="#2C2C2C" stroke-width="2"/>
  <rect x="666" y="182" width="16" height="492" fill="#922B21" opacity="0.65"/>
  <rect x="642" y="262" width="16" height="492" fill="#922B21" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="662" y="262" width="16" height="492" fill="#922B21" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="670" y="182" width="5" height="492" fill="#FFF9C4" opacity="0.9"/>
  <text x="660" y="318" text-anchor="middle" class="tag-out">结构 + 样式</text>

  <!-- analogy bar -->
  <rect x="30" y="352" width="740" height="492" rx="4" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
    <text x="50" y="404" class="box-note">灰度草图 = HTML——定义画面的结构（明度关系、层次、焦点）；Overlay/Color 图层 = CSS——定义画面的样式（色相、饱和度）。</text>
  <text x="50" y="427" class="box-note">结构（明度）对了，样式（色彩）怎么改都不会塌：换一套配色 = 换一套主题 CSS，骨架不动。</text>
  <text x="50" y="450" class="box-note">反过来先画彩色再调明度 = 在没写 HTML 的情况下硬塞 CSS——改一个样式，整个布局就崩。</text>
  <text x="50" y="472" class="box-note" fill="#E67E22">核心：强制你在最影响可读性的维度（明度）上先做对，再考虑色彩表现。</text>
</svg>
