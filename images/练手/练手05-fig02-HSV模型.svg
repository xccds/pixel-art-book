<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 14px; font-weight: bold; fill: #333; }
      .note { font-size: 12px; fill: #666; }
    </style>
    <radialGradient id="rainbow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF"/>
      <stop offset="100%" stop-color="#CCC"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#FAFAFA"/>

  <text x="400" y="32" text-anchor="middle" class="title">HSV 色彩模型——程序员的色彩三要素</text>
  <text x="400" y="54" text-anchor="middle" class="subtitle">Hue（色相）× Saturation（饱和度）× Value（明度）= 你需要的全部色彩参数</text>

  <!-- Hue Wheel -->
  <text x="200" y="85" text-anchor="middle" class="label">色相（Hue）0°–360°</text>
  <g transform="translate(200,220)">
    <!-- Simplified color wheel -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#DDD" stroke-width="1"/>
    <path d="M 0,-90 A 90,90 0 0,1 45,-78" fill="none" stroke="#E74C3C" stroke-width="14"/>
    <path d="M 45,-78 A 90,90 0 0,1 78,-45" fill="none" stroke="#E67E22" stroke-width="14"/>
    <path d="M 78,-45 A 90,90 0 0,1 90,0" fill="none" stroke="#F1C40F" stroke-width="14"/>
    <path d="M 90,0 A 90,90 0 0,1 78,45" fill="none" stroke="#2ECC71" stroke-width="14"/>
    <path d="M 78,45 A 90,90 0 0,1 45,78" fill="none" stroke="#3498DB" stroke-width="14"/>
    <path d="M 45,78 A 90,90 0 0,1 0,90" fill="none" stroke="#2ECC71" stroke-width="14"/>
    <path d="M 0,90 A 90,90 0 0,1 -45,78" fill="none" stroke="#3498DB" stroke-width="14"/>
    <path d="M -45,78 A 90,90 0 0,1 -78,45" fill="none" stroke="#9B59B6" stroke-width="14"/>
    <path d="M -78,45 A 90,90 0 0,1 -90,0" fill="none" stroke="#9B59B6" stroke-width="14"/>
    <path d="M -90,0 A 90,90 0 0,1 -78,-45" fill="none" stroke="#E74C3C" stroke-width="14"/>
    <path d="M -78,-45 A 90,90 0 0,1 -45,-78" fill="none" stroke="#E67E22" stroke-width="14"/>
    <path d="M -45,-78 A 90,90 0 0,1 0,-90" fill="none" stroke="#E67E22" stroke-width="14"/>
    <circle cx="0" cy="0" r="50" fill="#FAFAFA"/>
    <!-- Warm/Cold labels -->
    <text x="-70" y="-65" class="note" font-size="10" fill="#E67E22">暖色区</text>
    <text x="30" y="-65" class="note" font-size="10" fill="#E67E22">暖色区</text>
    <text x="-70" y="75" class="note" font-size="10" fill="#3498DB">冷色区</text>
    <text x="30" y="75" class="note" font-size="10" fill="#3498DB">冷色区</text>
  </g>
  <text x="200" y="340" text-anchor="middle" class="note">Hue = "什么颜色"——类型标签</text>

  <!-- Saturation bar -->
  <text x="500" y="85" text-anchor="middle" class="label">饱和度（Saturation）0%–100%</text>
  <g transform="translate(500, 160)">
    <defs>
      <linearGradient id="satGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#999"/>
        <stop offset="100%" stop-color="#E74C3C"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="220" height="40" rx="4" fill="url(#satGrad)" stroke="#CCC" stroke-width="1"/>
    <text x="-5" y="25" text-anchor="end" class="note" font-size="11">灰</text>
    <text x="245" y="25" text-anchor="start" class="note" font-size="11">纯</text>
    <text x="110" y="60" text-anchor="middle" class="note" font-size="11">S = "颜色多纯"——浓度</text>
  </g>

  <!-- Value bar -->
  <text x="500" y="265" text-anchor="middle" class="label">明度（Value）0%–100%</text>
  <g transform="translate(500, 300)">
    <defs>
      <linearGradient id="valGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1A1A1A"/>
        <stop offset="100%" stop-color="#FFFFFF"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="220" height="40" rx="4" fill="url(#valGrad)" stroke="#CCC" stroke-width="1"/>
    <text x="-5" y="25" text-anchor="end" class="note" font-size="11">黑</text>
    <text x="245" y="25" text-anchor="start" class="note" font-size="11">白</text>
    <text x="110" y="60" text-anchor="middle" class="note" font-size="11">V = "有多亮"——详见练手04</text>
  </g>

  <!-- Code analogy box -->
  <rect x="400" y="400" width="370" height="80" rx="4" fill="#E8F4FD"/>
  <text x="585" y="420" text-anchor="middle" class="label" font-size="13">程序员思维：</text>
  <text x="585" y="440" text-anchor="middle" class="note" font-size="12">color = (hue, saturation, value) // 三参数定义完整色彩</text>
  <text x="585" y="458" text-anchor="middle" class="note" font-size="12">换颜色 = 只改 hue → 不动 saturation / value → 保持结构</text>
  <text x="585" y="474" text-anchor="middle" class="note" font-size="12">调氛围 = 改 saturation 和 value → 不动 hue → 保持色相统一</text>

  <!-- Left code analogy -->
  <rect x="30" y="400" width="350" height="80" rx="4" fill="#FFF3E0"/>
  <text x="205" y="420" text-anchor="middle" class="label" font-size="13">HSV 常用变换：</text>
  <text x="205" y="442" text-anchor="middle" class="note" font-size="12">变亮 → V += 0.2</text>
  <text x="205" y="460" text-anchor="middle" class="note" font-size="12">变灰 → S -= 0.3</text>
  <text x="205" y="474" text-anchor="middle" class="note" font-size="12">阴影 → V -= 0.2, S += 0.1, H -= 10°（向冷色偏移）</text>
</svg>
