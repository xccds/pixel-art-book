<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 482" width="800" height="482">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .palette-label { font-size: 15px; font-weight: bold; fill: #333; }
      .note { font-size: 12px; fill: #666; }
      .swatch-note { font-size: 11px; fill: #555; }
    </style>
  </defs>
  <rect width="800" height="482" fill="#FAFAFA"/>

  <text x="400" y="32" text-anchor="middle" class="title">限色调色谱——少即是多的艺术</text>
  <text x="400" y="54" text-anchor="middle" class="note">限制色数不是偷懒，是强迫你用好每一个颜色</text>

  <!-- 3 Colors -->
  <rect x="30" y="75" width="740" height="482" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="98" class="palette-label">3 色</text>
  <rect x="140" y="82" width="36" height="482" rx="3" fill="#E74C3C" stroke="#CCC" stroke-width="0.5"/>
  <rect x="180" y="82" width="36" height="482" rx="3" fill="#F39C12" stroke="#CCC" stroke-width="0.5"/>
  <rect x="220" y="82" width="36" height="482" rx="3" fill="#2C3E50" stroke="#CCC" stroke-width="0.5"/>
  <text x="280" y="98" class="note">剪影（背景色）+ 强调色（唯一亮色）+ 中间色（过渡）</text>
  <text x="280" y="118" class="swatch-note">能做：极简海报、图标、LOGO、文字界面</text>
  <text x="280" y="136" class="swatch-note" fill="#E67E22">游戏案例：《Limbo》黑白+灰、《Thomas Was Alone》彩色方块</text>

  <!-- 4 Colors -->
  <rect x="30" y="175" width="740" height="482" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="198" class="palette-label">4 色</text>
  <rect x="140" y="182" width="36" height="482" rx="3" fill="#3498DB" stroke="#CCC" stroke-width="0.5"/>
  <rect x="180" y="182" width="36" height="482" rx="3" fill="#2ECC71" stroke="#CCC" stroke-width="0.5"/>
  <rect x="220" y="182" width="36" height="482" rx="3" fill="#F1C40F" stroke="#CCC" stroke-width="0.5"/>
  <rect x="260" y="182" width="36" height="482" rx="3" fill="#34495E" stroke="#CCC" stroke-width="0.5"/>
  <text x="320" y="198" class="note">背景色（1个）+ 角色主色（2个）+ 强调色（1个高亮）</text>
  <text x="320" y="218" class="swatch-note">能做：独立角色+简单背景、像素艺术角色、卡牌游戏</text>
  <text x="320" y="236" class="swatch-note" fill="#E67E22">游戏案例：Game Boy 风格游戏（4色调色板）、早期《宝可梦》</text>

  <!-- 8 Colors -->
  <rect x="30" y="275" width="740" height="482" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="298" class="palette-label">8 色</text>
  <rect x="140" y="282" width="32" height="482" rx="3" fill="#E74C3C" stroke="#CCC" stroke-width="0.5"/>
  <rect x="176" y="282" width="32" height="482" rx="3" fill="#E67E22" stroke="#CCC" stroke-width="0.5"/>
  <rect x="212" y="282" width="32" height="482" rx="3" fill="#F1C40F" stroke="#CCC" stroke-width="0.5"/>
  <rect x="248" y="282" width="32" height="482" rx="3" fill="#2ECC71" stroke="#CCC" stroke-width="0.5"/>
  <rect x="284" y="282" width="32" height="482" rx="3" fill="#3498DB" stroke="#CCC" stroke-width="0.5"/>
  <rect x="320" y="282" width="32" height="482" rx="3" fill="#9B59B6" stroke="#CCC" stroke-width="0.5"/>
  <rect x="356" y="282" width="32" height="482" rx="3" fill="#1ABC9C" stroke="#CCC" stroke-width="0.5"/>
  <rect x="392" y="282" width="32" height="482" rx="3" fill="#34495E" stroke="#CCC" stroke-width="0.5"/>
  <text x="450" y="298" class="note">完整场景色板：天空+地面+角色+植被+建筑+UI+特效+暗色</text>
  <text x="450" y="318" class="swatch-note">能做：完整的2D游戏场景、UI界面、卡牌设计、大多数独立游戏</text>
  <text x="450" y="336" class="swatch-note" fill="#E67E22">游戏案例：《蔚蓝》核心色板、《空洞骑士》单个区域的色板</text>

  <!-- 16 Colors -->
  <rect x="30" y="375" width="740" height="482" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="398" class="palette-label">16 色</text>
  <rect x="140" y="382" width="28" height="482" rx="2" fill="#E74C3C"/>
  <rect x="172" y="382" width="28" height="482" rx="2" fill="#C0392B"/>
  <rect x="204" y="382" width="28" height="482" rx="2" fill="#E67E22"/>
  <rect x="236" y="382" width="28" height="482" rx="2" fill="#F39C12"/>
  <rect x="268" y="382" width="28" height="482" rx="2" fill="#F1C40F"/>
  <rect x="300" y="382" width="28" height="482" rx="2" fill="#2ECC71"/>
  <rect x="332" y="382" width="28" height="482" rx="2" fill="#27AE60"/>
  <rect x="364" y="382" width="28" height="482" rx="2" fill="#3498DB"/>
  <rect x="396" y="382" width="28" height="482" rx="2" fill="#2980B9"/>
  <rect x="428" y="382" width="28" height="482" rx="2" fill="#9B59B6"/>
  <rect x="460" y="382" width="28" height="482" rx="2" fill="#8E44AD"/>
  <rect x="492" y="382" width="28" height="482" rx="2" fill="#1ABC9C"/>
  <rect x="524" y="382" width="28" height="482" rx="2" fill="#34495E"/>
  <rect x="556" y="382" width="28" height="482" rx="2" fill="#7F8C8D"/>
  <rect x="588" y="382" width="28" height="482" rx="2" fill="#BDC3C7"/>
  <rect x="620" y="382" width="28" height="482" rx="2" fill="#ECF0F1"/>
  <text x="50" y="428" class="note">丰富的层级+变化：每种主色配2-3个明度变体（亮/中/暗），加2个中性灰</text>
  <text x="50" y="446" class="swatch-note">能做：像素艺术完整场景、有层次的中型独立游戏、复杂的UI系统</text>
  <text x="50" y="462" class="swatch-note" fill="#E74C3C">超过16色容易"脏"——像素艺术的常见陷阱</text>
</svg>
