<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 17px; font-weight: bold; fill: #222; }
    .subtitle { font-size: 11px; fill: #888; }
    .panel-label { font-size: 12px; font-weight: bold; fill: #333; text-anchor: middle; }
    .swatch-label { font-size: 9px; fill: #666; text-anchor: middle; }
    .note { font-size: 10px; fill: #888; }
  </style>

  <text x="400" y="26" class="title" text-anchor="middle">色域遮罩（Gamut Masking）——在色轮上画个三角形，只用里面的颜色</text>

  <!-- ===== Panel 1: Warm gamut ===== -->
  <g transform="translate(25, 50)">
    <rect x="0" y="0" width="235" height="310" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <text x="117" y="22" class="panel-label" fill="#E67E22">暖色遮罩</text>

    <!-- Color wheel ring -->
    <g transform="translate(117, 115)">
      <circle cx="0" cy="0" r="70" fill="none" stroke="#ddd" stroke-width="1"/>
      <!-- Colored arcs around the wheel -->
      <path d="M 0,-70 A 70,70 0 0,1 49,-49" stroke="#E74C3C" stroke-width="8" fill="none"/>
      <path d="M 49,-49 A 70,70 0 0,1 70,0" stroke="#E67E22" stroke-width="8" fill="none"/>
      <path d="M 70,0 A 70,70 0 0,1 49,49" stroke="#F1C40F" stroke-width="8" fill="none"/>
      <path d="M 49,49 A 70,70 0 0,1 0,70" stroke="#2ECC71" stroke-width="8" fill="none"/>
      <path d="M 0,70 A 70,70 0 0,1 -49,49" stroke="#3498DB" stroke-width="8" fill="none"/>
      <path d="M -49,49 A 70,70 0 0,1 -70,0" stroke="#9B59B6" stroke-width="8" fill="none"/>
      <path d="M -70,0 A 70,70 0 0,1 -49,-49" stroke="#E74C3C" stroke-width="8" fill="none"/>
      <path d="M -49,-49 A 70,70 0 0,1 0,-70" stroke="#E67E22" stroke-width="8" fill="none"/>

      <!-- Triangle mask: red-orange-yellow area -->
      <polygon points="0,-45 35,40 -55,20" fill="none" stroke="#E67E22" stroke-width="2" stroke-dasharray="5,3"/>
      <circle cx="0" cy="-45" r="3" fill="#E74C3C"/>
      <circle cx="35" cy="40" r="3" fill="#F1C40F"/>
      <circle cx="-55" cy="20" r="3" fill="#E67E22"/>

      <!-- Gray out excluded area -->
      <circle cx="0" cy="0" r="58" fill="#fafafa" opacity="0.5"/>
      <polygon points="0,-45 35,40 -55,20" fill="#FFF3E0" opacity="0.4"/>
    </g>

    <!-- Resulting palette -->
    <rect x="15" y="235" width="35" height="22" rx="2" fill="#C0392B"/>
    <rect x="55" y="235" width="35" height="22" rx="2" fill="#E74C3C"/>
    <rect x="95" y="235" width="35" height="22" rx="2" fill="#E67E22"/>
    <rect x="135" y="235" width="35" height="22" rx="2" fill="#F1C40F"/>
    <rect x="175" y="235" width="35" height="22" rx="2" fill="#FFF3E0"/>
    <text x="117" y="275" class="swatch-label">红→橙→黄 五色暖调调色板</text>

    <text x="117" y="298" class="note" text-anchor="middle">蓝/绿被排除，画面自然温暖</text>
  </g>

  <!-- ===== Panel 2: Cool gamut ===== -->
  <g transform="translate(282, 50)">
    <rect x="0" y="0" width="235" height="310" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <text x="117" y="22" class="panel-label" fill="#3498DB">冷色遮罩</text>

    <g transform="translate(117, 115)">
      <circle cx="0" cy="0" r="70" fill="none" stroke="#ddd" stroke-width="1"/>
      <path d="M 0,-70 A 70,70 0 0,1 49,-49" stroke="#E74C3C" stroke-width="8" fill="none"/>
      <path d="M 49,-49 A 70,70 0 0,1 70,0" stroke="#E67E22" stroke-width="8" fill="none"/>
      <path d="M 70,0 A 70,70 0 0,1 49,49" stroke="#F1C40F" stroke-width="8" fill="none"/>
      <path d="M 49,49 A 70,70 0 0,1 0,70" stroke="#2ECC71" stroke-width="8" fill="none"/>
      <path d="M 0,70 A 70,70 0 0,1 -49,49" stroke="#3498DB" stroke-width="8" fill="none"/>
      <path d="M -49,49 A 70,70 0 0,1 -70,0" stroke="#9B59B6" stroke-width="8" fill="none"/>
      <path d="M -70,0 A 70,70 0 0,1 -49,-49" stroke="#E74C3C" stroke-width="8" fill="none"/>
      <path d="M -49,-49 A 70,70 0 0,1 0,-70" stroke="#E67E22" stroke-width="8" fill="none"/>

      <!-- Triangle mask: blue-purple-cyan area -->
      <polygon points="0,45 55,-30 -55,-30" fill="none" stroke="#3498DB" stroke-width="2" stroke-dasharray="5,3"/>
      <circle cx="0" cy="45" r="3" fill="#3498DB"/>
      <circle cx="55" cy="-30" r="3" fill="#2ECC71"/>
      <circle cx="-55" cy="-30" r="3" fill="#9B59B6"/>

      <circle cx="0" cy="0" r="58" fill="#fafafa" opacity="0.5"/>
      <polygon points="0,45 55,-30 -55,-30" fill="#E8F0FE" opacity="0.4"/>
    </g>

    <rect x="15" y="235" width="35" height="22" rx="2" fill="#1A5276"/>
    <rect x="55" y="235" width="35" height="22" rx="2" fill="#2980B9"/>
    <rect x="95" y="235" width="35" height="22" rx="2" fill="#27AE60"/>
    <rect x="135" y="235" width="35" height="22" rx="2" fill="#8E44AD"/>
    <rect x="175" y="235" width="35" height="22" rx="2" fill="#D6EAF8"/>
    <text x="117" y="275" class="swatch-label">蓝→绿→紫 五色冷调调色板</text>

    <text x="117" y="298" class="note" text-anchor="middle">红/橙被排除，画面自然冷静</text>
  </g>

  <!-- ===== Panel 3: Complementary gamut ===== -->
  <g transform="translate(540, 50)">
    <rect x="0" y="0" width="235" height="310" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <text x="117" y="22" class="panel-label" fill="#8E44AD">互补遮罩</text>

    <g transform="translate(117, 115)">
      <circle cx="0" cy="0" r="70" fill="none" stroke="#ddd" stroke-width="1"/>
      <path d="M 0,-70 A 70,70 0 0,1 49,-49" stroke="#E74C3C" stroke-width="8" fill="none"/>
      <path d="M 49,-49 A 70,70 0 0,1 70,0" stroke="#E67E22" stroke-width="8" fill="none"/>
      <path d="M 70,0 A 70,70 0 0,1 49,49" stroke="#F1C40F" stroke-width="8" fill="none"/>
      <path d="M 49,49 A 70,70 0 0,1 0,70" stroke="#2ECC71" stroke-width="8" fill="none"/>
      <path d="M 0,70 A 70,70 0 0,1 -49,49" stroke="#3498DB" stroke-width="8" fill="none"/>
      <path d="M -49,49 A 70,70 0 0,1 -70,0" stroke="#9B59B6" stroke-width="8" fill="none"/>
      <path d="M -70,0 A 70,70 0 0,1 -49,-49" stroke="#E74C3C" stroke-width="8" fill="none"/>
      <path d="M -49,-49 A 70,70 0 0,1 0,-70" stroke="#E67E22" stroke-width="8" fill="none"/>

      <!-- Triangle mask: warm base + blue accent (spanning opposite sides) -->
      <polygon points="-40,-35 30,50 -10,-60" fill="none" stroke="#8E44AD" stroke-width="2" stroke-dasharray="5,3"/>
      <circle cx="-40" cy="-35" r="3" fill="#E67E22"/>
      <circle cx="30" cy="50" r="3" fill="#F1C40F"/>
      <circle cx="-10" cy="-60" r="3" fill="#3498DB"/>

      <circle cx="0" cy="0" r="58" fill="#fafafa" opacity="0.5"/>
      <polygon points="-40,-35 30,50 -10,-60" fill="#F3E5F5" opacity="0.3"/>
    </g>

    <rect x="15" y="235" width="35" height="22" rx="2" fill="#F1C40F"/>
    <rect x="55" y="235" width="35" height="22" rx="2" fill="#E67E22"/>
    <rect x="95" y="235" width="35" height="22" rx="2" fill="#8D6E63"/>
    <rect x="135" y="235" width="35" height="22" rx="2" fill="#3498DB"/>
    <rect x="175" y="235" width="35" height="22" rx="2" fill="#FFFDE7"/>
    <text x="117" y="275" class="swatch-label">暖色主导 + 蓝色点缀 互补配色</text>

    <text x="117" y="298" class="note" text-anchor="middle">三角跨暖冷两侧，冷暖对比强烈</text>
  </g>

  <!-- Bottom tao -->
  <text x="400" y="370" class="note" text-anchor="middle" fill="#999">James Gurney "Gamut Masking" · 限制色相范围 = 自动获得色彩和谐</text>
</svg>
