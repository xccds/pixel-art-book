<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .note { font-size: 12px; fill: #666; }
      .gamut-label { font-size: 13px; font-weight: bold; fill: #333; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#FAFAFA"/>

  <text x="400" y="32" text-anchor="middle" class="title">色域映射（Gamut Mapping）——限制 = 和谐</text>
  <text x="400" y="54" text-anchor="middle" class="subtitle">Gurney的色彩限制理论：限制使用的色相范围，画面反而更和谐</text>

  <!-- Color wheel with gamut mask -->
  <g transform="translate(260, 280)">
    <!-- Full color wheel (grayed outer) -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#DDD" stroke-width="1"/>
    <circle cx="0" cy="0" r="125" fill="none" stroke="#DDD" stroke-width="0.5"/>

    <!-- Outer ring - all colors subdued -->
    <path d="M 0,-135 A 135,135 0 0,1 67,-117" fill="none" stroke="#E8C8C8" stroke-width="18"/>
    <path d="M 67,-117 A 135,135 0 0,1 117,-67" fill="none" stroke="#E8D8C8" stroke-width="18"/>
    <path d="M 117,-67 A 135,135 0 0,1 135,0" fill="none" stroke="#E8E8C8" stroke-width="18"/>
    <path d="M 135,0 A 135,135 0 0,1 117,67" fill="none" stroke="#C8E8C8" stroke-width="18"/>
    <path d="M 117,67 A 135,135 0 0,1 67,117" fill="none" stroke="#C8E8E8" stroke-width="18"/>
    <path d="M 67,117 A 135,135 0 0,1 0,135" fill="none" stroke="#C8C8E8" stroke-width="18"/>
    <path d="M 0,135 A 135,135 0 0,1 -67,117" fill="none" stroke="#E8C8E8" stroke-width="18"/>
    <path d="M -67,117 A 135,135 0 0,1 -117,67" fill="none" stroke="#E8C8C8" stroke-width="18"/>
    <path d="M -117,67 A 135,135 0 0,1 -135,0" fill="none" stroke="#E8C8C8" stroke-width="18"/>
    <path d="M -135,0 A 135,135 0 0,1 -117,-67" fill="none" stroke="#E8C8C8" stroke-width="18"/>
    <path d="M -117,-67 A 135,135 0 0,1 -67,-117" fill="none" stroke="#E8D8C8" stroke-width="18"/>
    <path d="M -67,-117 A 135,135 0 0,1 0,-135" fill="none" stroke="#E8C8C8" stroke-width="18"/>

    <!-- Inside area: bright warm colors representing the gamut -->
    <path d="M 0,-110 A 110,110 0 0,1 45,-100" fill="none" stroke="#E74C3C" stroke-width="12" opacity="0.9"/>
    <path d="M 45,-100 A 110,110 0 0,1 90,-62" fill="none" stroke="#E67E22" stroke-width="12" opacity="0.9"/>
    <path d="M 90,-62 A 110,110 0 0,1 35,85" fill="none" stroke="#F1C40F" stroke-width="12" opacity="0.9"/>
    <path d="M 35,85 A 110,110 0 0,1 0,-110" fill="none" stroke="#E74C3C" stroke-width="12" opacity="0.5"/>

    <!-- Triangle gamut mask overlay -->
    <polygon points="0,-90 70,60 -50,50" fill="none" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="8,4"/>
    <text x="10" y="20" class="note" font-size="10" fill="#E74C3C">gamut mask</text>
    <text x="10" y="32" class="note" font-size="10" fill="#E74C3C">（可用色域）</text>

    <!-- Cross marks for excluded colors -->
    <text x="-80" y="-95" class="note" font-size="14" fill="#999">✕</text>
    <text x="95" y="-85" class="note" font-size="14" fill="#999">✕</text>
    <text x="-105" y="5" class="note" font-size="14" fill="#999">✕</text>
    <text x="0" y="115" class="note" font-size="14" fill="#999">✕</text>
    <text x="-50" y="0" class="note" font-size="11" fill="#E74C3C">可用色域</text>
  </g>

  <!-- Explanation on the right -->
  <text x="540" y="180" class="gamut-label">核心原理：</text>
  <text x="540" y="205" class="note">1. 在全色环上选择一个三角形遮罩</text>
  <text x="540" y="225" class="note">2. 三角形内 = 可用色相（饱和）</text>
  <text x="540" y="245" class="note">3. 三角形外 = 禁用或灰化（低饱和）</text>
  <text x="540" y="270" class="note">4. 画面由"主角色"主导</text>
  <text x="540" y="290" class="note">→ 自动获得色彩和谐</text>

  <!-- Code analogy -->
  <rect x="540" y="310" width="220" height="50" rx="3" fill="#333"/>
  <text x="650" y="330" text-anchor="middle" class="note" fill="#0F0" font-size="10" font-family="monospace">// 代码类比</text>
  <text x="650" y="348" text-anchor="middle" class="note" fill="#0F0" font-size="10" font-family="monospace">const COLORS = palette.slice(0,3)</text>

  <!-- Example strips -->
  <text x="540" y="390" class="gamut-label" font-size="12">示例：暖色调场景的 gamut mask</text>
  <rect x="540" y="400" width="40" height="20" rx="2" fill="#E74C3C"/>
  <rect x="584" y="400" width="40" height="20" rx="2" fill="#E67E22"/>
  <rect x="628" y="400" width="40" height="20" rx="2" fill="#F1C40F"/>
  <rect x="672" y="400" width="40" height="20" rx="2" fill="#E8D8B0"/>
  <text x="540" y="438" class="note">全部色彩来自红-橙-黄三角，</text>
  <text x="540" y="454" class="note">蓝/绿仅以灰化形式出现 → 和谐</text>

  <text x="30" y="472" class="note" font-size="11" fill="#999">来源：James Gurney "Gamut Masking" 理论 · 《Color and Light》第4章</text>
</svg>
