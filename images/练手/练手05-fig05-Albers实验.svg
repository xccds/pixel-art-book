<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 498" width="800" height="498">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .panel-label { font-size: 15px; font-weight: bold; fill: #333; }
      .note { font-size: 13px; fill: #666; }
      .big-note { font-size: 15px; font-weight: bold; fill: #E74C3C; }
    </style>
  </defs>
  <rect width="800" height="498" fill="#FAFAFA"/>

  <text x="400" y="32" text-anchor="middle" class="title">Albers 色彩相对性实验</text>
  <text x="400" y="54" text-anchor="middle" class="subtitle">同一个颜色，在不同背景下看起来截然不同</text>

  <!-- Panel 1: White background -->
  <rect x="30" y="75" width="230" height="498" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="145" y="98" text-anchor="middle" class="panel-label">白色背景</text>
  <rect x="145" y="80" width="230" height="498" fill="#FFFFFF"/>
  <rect x="110" y="120" width="70" height="498" rx="2" fill="#2E6B3E"/>
  <text x="145" y="210" text-anchor="middle" class="note">看起来：暗、深、浓郁</text>
  <text x="145" y="228" text-anchor="middle" class="note" font-size="11" fill="#999">→ 深绿色显得很"实"</text>

  <!-- Panel 2: Red background -->
  <rect x="285" y="75" width="230" height="498" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="400" y="98" text-anchor="middle" class="panel-label">红色背景</text>
  <rect x="285" y="80" width="230" height="498" fill="#E74C3C"/>
  <rect x="365" y="120" width="70" height="498" rx="2" fill="#2E6B3E"/>
  <text x="400" y="210" text-anchor="middle" class="note">看起来：偏蓝、偏冷</text>
  <text x="400" y="228" text-anchor="middle" class="note" font-size="11" fill="#999">→ 红色让绿色"变冷"</text>

  <!-- Panel 3: Same green background -->
  <rect x="540" y="75" width="230" height="498" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="655" y="98" text-anchor="middle" class="panel-label">同色背景</text>
  <rect x="540" y="80" width="230" height="498" fill="#2E6B3E"/>
  <rect x="620" y="120" width="70" height="498" rx="2" fill="#2E6B3E"/>
  <text x="655" y="210" text-anchor="middle" class="note">看起来：几乎消失</text>
  <text x="655" y="228" text-anchor="middle" class="note" font-size="11" fill="#999">→ 同化效应、边界模糊</text>

  <!-- Key insight -->
  <rect x="30" y="270" width="740" height="498" rx="4" fill="#FFF3E0"/>
  <text x="400" y="290" text-anchor="middle" class="big-note">同一个墨绿色 → 三个背景 → 三种截然不同的视觉感受</text>
  <text x="400" y="310" text-anchor="middle" class="note">这就是色彩相对性（Color Relativity）——Albers一书的核心发现</text>

  <!-- Three more experiments -->
  <text x="400" y="348" text-anchor="middle" class="panel-label">更多 Albers 实验（建议你在屏幕上自己试试）</text>

  <!-- Exp 4 -->
  <rect x="30" y="362" width="230" height="498" rx="3" fill="#F0F0F0"/>
  <rect x="45" y="375" width="20" height="498" rx="1" fill="#E67E22"/>
  <rect x="185" y="375" width="20" height="498" rx="1" fill="#E67E22"/>
  <text x="125" y="380" text-anchor="middle" class="note" font-size="11">同一橙色，灰底上偏暖，蓝底上偏亮</text>
  <text x="125" y="400" text-anchor="middle" class="note" font-size="10" fill="#999">实验4：同色不同背景的冷暖偏移</text>

  <!-- Exp 5 -->
  <rect x="285" y="362" width="230" height="498" rx="3" fill="#F0F0F0"/>
  <rect x="310" y="375" width="15" height="498" rx="1" fill="#3498DB"/>
  <rect x="335" y="375" width="15" height="498" rx="1" fill="#3498DB"/>
  <rect x="440" y="375" width="15" height="498" rx="1" fill="#3498DB"/>
  <rect x="465" y="375" width="15" height="498" rx="1" fill="#3498DB"/>
  <text x="400" y="400" text-anchor="middle" class="note" font-size="10" fill="#999">实验5：同一蓝在不同明度底上，明度感不同</text>

  <!-- Exp 6 -->
  <rect x="540" y="362" width="230" height="498" rx="3" fill="#F0F0F0"/>
  <rect x="555" y="378" width="12" height="498" rx="1" fill="#E74C3C"/>
  <rect x="572" y="378" width="12" height="498" rx="1" fill="#E74C3C"/>
  <rect x="589" y="378" width="12" height="498" rx="1" fill="#F1C40F"/>
  <rect x="606" y="378" width="12" height="498" rx="1" fill="#F1C40F"/>
  <rect x="700" y="378" width="12" height="498" rx="1" fill="#E74C3C"/>
  <rect x="717" y="378" width="12" height="498" rx="1" fill="#E74C3C"/>
  <text x="655" y="395" text-anchor="middle" class="note" font-size="11">红黄交替→产生视觉混合</text>
  <text x="655" y="410" text-anchor="middle" class="note" font-size="10" fill="#999">实验6：两色交替产生第三色视错觉</text>

  <text x="400" y="460" text-anchor="middle" class="note" font-size="12">来源：Josef Albers《Interaction of Color》（1963）——不需要买书，做这6个实验就掌握了核心</text>
  <text x="400" y="478" text-anchor="middle" class="note" font-size="11" fill="#999">所有实验可在任何绘图软件中15分钟完成</text>
</svg>
