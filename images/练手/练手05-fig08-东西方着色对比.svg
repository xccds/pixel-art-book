  <text x="200" y="360" text-anchor="middle" class="label">西式方法（Western）</text>
  <text x="200" y="378" text-anchor="middle" class="desc">色相不变 · 只调明度（加黑/加白）</text>
  <text x="600" y="360" text-anchor="middle" class="label">东式方法（Eastern）</text>
  <text x="600" y="378" text-anchor="middle" class="desc">色相偏移 · 暖高光 → 冷阴影</text>
