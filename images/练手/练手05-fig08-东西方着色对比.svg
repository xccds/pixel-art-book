<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 435" width="800" height="435">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 12px; fill: #666; }
      .label { font-size: 14px; font-weight: bold; fill: #333; }
      .desc { font-size: 11px; fill: #666; }
      .swatch-label { font-size: 9px; fill: #444; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="480" fill="#FAFAFA"/>
  <text x="400" y="28" text-anchor="middle" class="title">东西方着色两流派（Western vs Eastern）</text>
  <text x="400" y="46" text-anchor="middle" class="subtitle">同一球体两种着色法：左·西式逐级明度（色相不变）  右·东式色相偏移（暖高光→冷阴影）</text>

  <!-- Divider line -->
  <line x1="400" y1="70" x2="400" y2="320" stroke="#CCC" stroke-dasharray="4 4"/>

  <!-- ===== Left sphere: Western ===== -->
  <circle cx="222" cy="232" r="90" fill="#5C3008"/>
  <circle cx="218" cy="228" r="75" fill="#8A4D14"/>
  <circle cx="214" cy="224" r="60" fill="#B56820"/>
  <circle cx="210" cy="220" r="45" fill="#E09040"/>
  <circle cx="206" cy="216" r="30" fill="#FFB870"/>
  <circle cx="202" cy="212" r="16" fill="#FFD9A0"/>

  <!-- ===== Right sphere: Eastern ===== -->
  <circle cx="622" cy="232" r="90" fill="#2A1F4A"/>
  <circle cx="618" cy="228" r="75" fill="#5A3866"/>
  <circle cx="614" cy="224" r="60" fill="#9A5868"/>
  <circle cx="610" cy="220" r="45" fill="#E09040"/>
  <circle cx="606" cy="216" r="30" fill="#FFC060"/>
  <circle cx="602" cy="212" r="16" fill="#FFE890"/>

  <!-- Sphere labels -->
  <text x="200" y="345" text-anchor="middle" class="label">西式方法（Western）</text>
  <text x="200" y="363" text-anchor="middle" class="desc">色相不变 · 只调明度（加黑/加白）</text>
  <text x="600" y="345" text-anchor="middle" class="label">东式方法（Eastern）</text>
  <text x="600" y="363" text-anchor="middle" class="desc">色相偏移 · 暖高光 → 冷阴影</text>

  <!-- ===== Left swatches (Western) ===== -->
  <!-- Width: 42px, gap: 3px, 6 swatches = 6*42+5*3=267, start at x=67, end at 334 -->
  <rect x="67" y="380" width="42" height="24" fill="#5C3008" stroke="#999" stroke-width="0.5"/>
  <text x="88" y="418" class="swatch-label">阴影</text>
  <rect x="112" y="380" width="42" height="24" fill="#8A4D14" stroke="#999" stroke-width="0.5"/>
  <text x="133" y="418" class="swatch-label">暗面</text>
  <rect x="157" y="380" width="42" height="24" fill="#B56820" stroke="#999" stroke-width="0.5"/>
  <text x="178" y="418" class="swatch-label">中间偏暗</text>
  <rect x="202" y="380" width="42" height="24" fill="#E09040" stroke="#999" stroke-width="0.5"/>
  <text x="223" y="418" class="swatch-label">中间调</text>
  <rect x="247" y="380" width="42" height="24" fill="#FFB870" stroke="#999" stroke-width="0.5"/>
  <text x="268" y="418" class="swatch-label">亮面</text>
  <rect x="292" y="380" width="42" height="24" fill="#FFD9A0" stroke="#999" stroke-width="0.5"/>
  <text x="313" y="418" class="swatch-label">高光</text>

  <!-- ===== Right swatches (Eastern) ===== -->
  <!-- Start at x=467, end at 467+267=734 -->
  <rect x="467" y="380" width="42" height="24" fill="#2A1F4A" stroke="#999" stroke-width="0.5"/>
  <text x="488" y="418" class="swatch-label">阴影</text>
  <rect x="512" y="380" width="42" height="24" fill="#5A3866" stroke="#999" stroke-width="0.5"/>
  <text x="533" y="418" class="swatch-label">暗面</text>
  <rect x="557" y="380" width="42" height="24" fill="#9A5868" stroke="#999" stroke-width="0.5"/>
  <text x="578" y="418" class="swatch-label">中间偏暗</text>
  <rect x="602" y="380" width="42" height="24" fill="#E09040" stroke="#999" stroke-width="0.5"/>
  <text x="623" y="418" class="swatch-label">中间调</text>
  <rect x="647" y="380" width="42" height="24" fill="#FFC060" stroke="#999" stroke-width="0.5"/>
  <text x="668" y="418" class="swatch-label">亮面</text>
  <rect x="692" y="380" width="42" height="24" fill="#FFE890" stroke="#999" stroke-width="0.5"/>
  <text x="713" y="418" class="swatch-label">高光</text>
</svg>
