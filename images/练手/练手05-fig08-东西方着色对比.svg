  <text x="400" y="32" text-anchor="middle" class="title">东西方着色两流派（Western vs Eastern）</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">同一球体两种着色法：左·西式逐级明度（色相不变）  右·东式色相偏移（暖高光→冷阴影）</text>
