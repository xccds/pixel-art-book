<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 11px; fill: #666; }
    .step-num { font-size: 20px; font-weight: bold; fill: #E74C3C; }
    .step-title { font-size: 14px; font-weight: bold; fill: #333; }
    .step-desc { font-size: 10px; fill: #666; }
    .grid-cell { stroke: #ccc; stroke-width: 0.4; }
    .grid-fill { fill: #2C3E50; }
    .grid-fill-mid { fill: #5D6D7E; }
    .grid-fill-light { fill: #aab7c4; }
    .grid-bg { fill: #fafafa; }
    .arrow { stroke: #E74C3C; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-cyan { stroke: #3498DB; stroke-width: 1.2; fill: none; marker-end: url(#arrowhead-cyan); }
    .highlight { fill: none; stroke: #E74C3C; stroke-width: 1.5; stroke-dasharray: 4,3; opacity: 0.7; }
    .step-box { fill: #F8F9FA; stroke: #dee2e6; stroke-width: 1; }
    .tag { font-size: 9px; fill: #fff; font-weight: bold; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#E74C3C"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#3498DB"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">无缝纹理四步法（Seamless Texture Four-Step Method）</text>

  <!-- ====== Step 1: Seed Unit ====== -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="165" height="230" class="step-box" rx="4"/>
    <rect x="0" y="0" width="165" height="28" fill="#E74C3C" rx="4"/>
    <rect x="0" y="14" width="165" height="14" fill="#E74C3C" rx="4"/>
    <rect x="165" y="0" width="0" height="28" fill="#E74C3C"/>
    <text x="82" y="19" class="tag" text-anchor="middle">STEP 1</text>

    <text x="82" y="48" class="step-title" text-anchor="middle">种子单元</text>
    <text x="82" y="64" class="step-desc" text-anchor="middle">用铅笔画出单个 tile 的</text>
    <text x="82" y="78" class="step-desc" text-anchor="middle">基本纹理图案</text>

    <!-- 16x16 grid with a simple pattern -->
    <g transform="translate(18, 90)">
      <rect x="0" y="0" width="128" height="128" class="grid-bg" rx="2"/>
      <!-- grid lines -->
      <g stroke="#e0e0e0" stroke-width="0.3">
        <line x1="0" y1="8" x2="128" y2="8"/><line x1="0" y1="16" x2="128" y2="16"/>
        <line x1="0" y1="24" x2="128" y2="24"/><line x1="0" y1="32" x2="128" y2="32"/>
        <line x1="0" y1="40" x2="128" y2="40"/><line x1="0" y1="48" x2="128" y2="48"/>
        <line x1="0" y1="56" x2="128" y2="56"/><line x1="0" y1="64" x2="128" y2="64"/>
        <line x1="0" y1="72" x2="128" y2="72"/><line x1="0" y1="80" x2="128" y2="80"/>
        <line x1="0" y1="88" x2="128" y2="88"/><line x1="0" y1="96" x2="128" y2="96"/>
        <line x1="0" y1="104" x2="128" y2="104"/><line x1="0" y1="112" x2="128" y2="112"/>
        <line x1="0" y1="120" x2="128" y2="120"/>
        <line x1="8" y1="0" x2="8" y2="128"/><line x1="16" y1="0" x2="16" y2="128"/>
        <line x1="24" y1="0" x2="24" y2="128"/><line x1="32" y1="0" x2="32" y2="128"/>
        <line x1="40" y1="0" x2="40" y2="128"/><line x1="48" y1="0" x2="48" y2="128"/>
        <line x1="56" y1="0" x2="56" y2="128"/><line x1="64" y1="0" x2="64" y2="128"/>
        <line x1="72" y1="0" x2="72" y2="128"/><line x1="80" y1="0" x2="80" y2="128"/>
        <line x1="88" y1="0" x2="88" y2="128"/><line x1="96" y1="0" x2="96" y2="128"/>
        <line x1="104" y1="0" x2="104" y2="128"/><line x1="112" y1="0" x2="112" y2="128"/>
        <line x1="120" y1="0" x2="120" y2="128"/>
      </g>
      <!-- random stone pattern: some dark cells, some light -->
      <rect x="8"  y="8"  width="8" height="8" class="grid-fill"/>
      <rect x="24" y="8"  width="8" height="8" class="grid-fill-mid"/>
      <rect x="40" y="16" width="8" height="8" class="grid-fill"/>
      <rect x="56" y="8"  width="8" height="8" class="grid-fill-light"/>
      <rect x="72" y="16" width="8" height="8" class="grid-fill"/>
      <rect x="96" y="8"  width="8" height="8" class="grid-fill-mid"/>
      <rect x="112" y="16" width="8" height="8" class="grid-fill"/>
      <rect x="16" y="32" width="8" height="8" class="grid-fill-mid"/>
      <rect x="40" y="40" width="8" height="8" class="grid-fill"/>
      <rect x="64" y="32" width="8" height="8" class="grid-fill-light"/>
      <rect x="80" y="40" width="8" height="8" class="grid-fill"/>
      <rect x="104" y="32" width="8" height="8" class="grid-fill-mid"/>
      <rect x="8"  y="56" width="8" height="8" class="grid-fill-light"/>
      <rect x="32" y="56" width="8" height="8" class="grid-fill"/>
      <rect x="56" y="64" width="8" height="8" class="grid-fill-mid"/>
      <rect x="88" y="56" width="8" height="8" class="grid-fill"/>
      <rect x="112" y="64" width="8" height="8" class="grid-fill-light"/>
      <rect x="24" y="80" width="8" height="8" class="grid-fill"/>
      <rect x="48" y="88" width="8" height="8" class="grid-fill-mid"/>
      <rect x="72" y="80" width="8" height="8" class="grid-fill-light"/>
      <rect x="96" y="88" width="8" height="8" class="grid-fill"/>
      <rect x="16" y="104" width="8" height="8" class="grid-fill-mid"/>
      <rect x="40" y="112" width="8" height="8" class="grid-fill-light"/>
      <rect x="64" y="104" width="8" height="8" class="grid-fill"/>
      <rect x="88" y="112" width="8" height="8" class="grid-fill-mid"/>
    </g>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="170" x2="225" y2="170" class="arrow"/>

  <!-- ====== Step 2: Edge Processing ====== -->
  <g transform="translate(235, 55)">
    <rect x="0" y="0" width="165" height="230" class="step-box" rx="4"/>
    <rect x="0" y="0" width="165" height="28" fill="#3498DB" rx="4"/>
    <rect x="0" y="14" width="165" height="14" fill="#3498DB" rx="4"/>
    <text x="82" y="19" class="tag" text-anchor="middle">STEP 2</text>

    <text x="82" y="48" class="step-title" text-anchor="middle">边界处理</text>
    <text x="82" y="64" class="step-desc" text-anchor="middle">复制对边像素使</text>
    <text x="82" y="78" class="step-desc" text-anchor="middle">接缝处无跳变</text>

    <g transform="translate(18, 90)">
      <rect x="0" y="0" width="128" height="128" class="grid-bg" rx="2"/>
      <!-- Wrap-around arrows on edges -->
      <line x1="64" y1="-6" x2="64" y2="0" class="arrow-cyan"/>
      <line x1="64" y1="134" x2="64" y2="128" class="arrow-cyan"/>
      <line x1="-6" y1="64" x2="0" y2="64" class="arrow-cyan"/>
      <line x1="134" y1="64" x2="128" y2="64" class="arrow-cyan"/>

      <!-- Edge copy indicators -->
      <rect x="0" y="0" width="128" height="6" fill="#3498DB" opacity="0.15"/>
      <rect x="0" y="122" width="128" height="6" fill="#3498DB" opacity="0.15"/>
      <rect x="0" y="0" width="6" height="128" fill="#3498DB" opacity="0.15"/>
      <rect x="122" y="0" width="6" height="128" fill="#3498DB" opacity="0.15"/>

      <text x="64" y="-10" class="step-desc" text-anchor="middle" fill="#3498DB">↑ 顶部 ↔ 底部</text>
      <text x="64" y="144" class="step-desc" text-anchor="middle" fill="#3498DB">像素连续</text>
      <text x="90" y="60" class="step-desc" text-anchor="middle" fill="#3498DB" transform="rotate(-90, 90, 60)">← 左 ↔ 右 →</text>

      <!-- Some grid cells to show the concept -->
      <g stroke="#e0e0e0" stroke-width="0.3">
        <line x1="0" y1="32" x2="128" y2="32"/><line x1="0" y1="64" x2="128" y2="64"/>
        <line x1="0" y1="96" x2="128" y2="96"/>
        <line x1="32" y1="0" x2="32" y2="128"/><line x1="64" y1="0" x2="64" y2="128"/>
        <line x1="96" y1="0" x2="96" y2="128"/>
      </g>

      <!-- Small pattern cells at edges to show they're coordinated -->
      <rect x="0"  y="0"  width="8" height="8" class="grid-fill-mid"/>
      <rect x="120" y="0"  width="8" height="8" class="grid-fill-mid"/>
      <rect x="0"  y="120" width="8" height="8" class="grid-fill-mid"/>
      <rect x="120" y="120" width="8" height="8" class="grid-fill-mid"/>
    </g>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="405" y1="170" x2="430" y2="170" class="arrow"/>

  <!-- ====== Step 3: Repetition Test ====== -->
  <g transform="translate(440, 55)">
    <rect x="0" y="0" width="165" height="230" class="step-box" rx="4"/>
    <rect x="0" y="0" width="165" height="28" fill="#27AE60" rx="4"/>
    <rect x="0" y="14" width="165" height="14" fill="#27AE60" rx="4"/>
    <text x="82" y="19" class="tag" text-anchor="middle">STEP 3</text>

    <text x="82" y="48" class="step-title" text-anchor="middle">重复检验</text>
    <text x="82" y="64" class="step-desc" text-anchor="middle">2×2 甚至 4×4 平铺</text>
    <text x="82" y="78" class="step-desc" text-anchor="middle">检查有无接缝/网格</text>

    <g transform="translate(18, 90)">
      <rect x="0" y="0" width="128" height="128" class="grid-bg" rx="2"/>

      <!-- 2x2 tiling with a small pattern -->
      <g stroke="#e0e0e0" stroke-width="0.3">
        <line x1="0" y1="32" x2="128" y2="32"/><line x1="0" y1="64" x2="128" y2="64"/>
        <line x1="0" y1="96" x2="128" y2="96"/>
        <line x1="32" y1="0" x2="32" y2="128"/><line x1="64" y1="0" x2="64" y2="128"/>
        <line x1="96" y1="0" x2="96" y2="128"/>
      </g>

      <!-- Tile borders shown as dashed -->
      <rect x="0" y="0" width="64" height="64" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="64" y="0" width="64" height="64" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="0" y="64" width="64" height="64" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="64" y="64" width="64" height="64" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Pattern fills -->
      <rect x="8" y="8" width="8" height="8" class="grid-fill"/>
      <rect x="40" y="16" width="8" height="8" class="grid-fill-mid"/>
      <rect x="16" y="40" width="8" height="8" class="grid-fill-light"/>
      <rect x="48" y="48" width="8" height="8" class="grid-fill"/>

      <rect x="72" y="8" width="8" height="8" class="grid-fill"/>
      <rect x="104" y="16" width="8" height="8" class="grid-fill-mid"/>
      <rect x="80" y="40" width="8" height="8" class="grid-fill-light"/>
      <rect x="112" y="48" width="8" height="8" class="grid-fill"/>

      <rect x="8" y="72" width="8" height="8" class="grid-fill"/>
      <rect x="40" y="80" width="8" height="8" class="grid-fill-mid"/>
      <rect x="16" y="104" width="8" height="8" class="grid-fill-light"/>
      <rect x="48" y="112" width="8" height="8" class="grid-fill"/>

      <rect x="72" y="72" width="8" height="8" class="grid-fill"/>
      <rect x="104" y="80" width="8" height="8" class="grid-fill-mid"/>
      <rect x="80" y="104" width="8" height="8" class="grid-fill-light"/>
      <rect x="112" y="112" width="8" height="8" class="grid-fill"/>

      <!-- Label: 2×2 -->
      <text x="64" y="140" class="step-desc" text-anchor="middle" fill="#E74C3C">2×2 平铺测试</text>
    </g>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="610" y1="170" x2="635" y2="170" class="arrow"/>

  <!-- ====== Step 4: Variation Injection ====== -->
  <g transform="translate(645, 55)">
    <rect x="0" y="0" width="135" height="230" class="step-box" rx="4"/>
    <rect x="0" y="0" width="135" height="28" fill="#8E44AD" rx="4"/>
    <rect x="0" y="14" width="135" height="14" fill="#8E44AD" rx="4"/>
    <text x="67" y="19" class="tag" text-anchor="middle">STEP 4</text>

    <text x="67" y="48" class="step-title" text-anchor="middle">变化注入</text>
    <text x="67" y="64" class="step-desc" text-anchor="middle">增加 2-3 个变体</text>
    <text x="67" y="78" class="step-desc" text-anchor="middle">消除重复感</text>

    <g transform="translate(3, 90)">
      <rect x="0" y="0" width="128" height="128" class="grid-bg" rx="2"/>

      <!-- 4 subtiles showing variations -->
      <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8E44AD" stroke-width="0.8" stroke-dasharray="2,2"/>
      <rect x="64" y="0" width="64" height="64" fill="none" stroke="#8E44AD" stroke-width="0.8" stroke-dasharray="2,2"/>
      <rect x="0" y="64" width="64" height="64" fill="none" stroke="#8E44AD" stroke-width="0.8" stroke-dasharray="2,2"/>
      <rect x="64" y="64" width="64" height="64" fill="none" stroke="#8E44AD" stroke-width="0.8" stroke-dasharray="2,2"/>

      <!-- Var 1 -->
      <rect x="8" y="8" width="8" height="8" class="grid-fill"/>
      <rect x="24" y="24" width="8" height="8" class="grid-fill-mid"/>
      <text x="32" y="54" class="step-desc" text-anchor="middle">A</text>

      <!-- Var 2 (slightly different) -->
      <rect x="72" y="12" width="8" height="8" class="grid-fill"/>
      <rect x="88" y="20" width="8" height="8" class="grid-fill-light"/>
      <rect x="104" y="28" width="8" height="8" class="grid-fill-mid"/>
      <text x="96" y="54" class="step-desc" text-anchor="middle">B</text>

      <!-- Var 3 -->
      <rect x="8" y="72" width="8" height="8" class="grid-fill-mid"/>
      <rect x="40" y="76" width="8" height="8" class="grid-fill"/>
      <text x="32" y="118" class="step-desc" text-anchor="middle">C</text>

      <!-- Var 4 -->
      <rect x="80" y="68" width="8" height="8" class="grid-fill-light"/>
      <rect x="104" y="88" width="8" height="8" class="grid-fill"/>
      <rect x="72" y="100" width="8" height="8" class="grid-fill-mid"/>
      <text x="96" y="118" class="step-desc" text-anchor="middle">D</text>
    </g>
  </g>

  <!-- Bottom annotations -->
  <text x="112" y="310" class="step-desc" text-anchor="middle" fill="#E74C3C">先画出基本纹理</text>
  <text x="318" y="310" class="step-desc" text-anchor="middle" fill="#3498DB">保证四条边的像素</text>
  <text x="318" y="324" class="step-desc" text-anchor="middle" fill="#3498DB">能无缝延续</text>
  <text x="522" y="310" class="step-desc" text-anchor="middle" fill="#27AE60">多次拼接确认</text>
  <text x="522" y="324" class="step-desc" text-anchor="middle" fill="#27AE60">无肉眼可见接缝</text>
  <text x="712" y="310" class="step-desc" text-anchor="middle" fill="#8E44AD">用不同排列打破</text>
  <text x="712" y="324" class="step-desc" text-anchor="middle" fill="#8E44AD">重复的机械感</text>

  </svg>