  <!-- ====== Right side: Diagnostic labels ====== -->
  <g transform="translate(420, 60)">
    <text x="0" y="0" font-size="13px" font-weight="bold" fill="#333">拼接诊断三项</text>

    <!-- Item 1 -->
    <rect x="0" y="16" width="340" height="420" fill="#FFF5F5" stroke="#E74C3C" stroke-width="0.8" rx="4"/>
    <text x="12" y="38" font-size="12px" font-weight="bold" fill="#E74C3C">❶ 出现接缝线？</text>
    <text x="12" y="56" font-size="10px" fill="#555">tile 边界处像素密度突变，形成肉眼可见的"网格"。原因：</text>
    <text x="12" y="72" font-size="10px" fill="#555">边界两边的像素值没有连续过渡。修复：在边界两侧各复制</text>
    <text x="12" y="88" font-size="10px" fill="#555">1-2 行/列像素，让 seam 处的信息量保持一致。</text>

    <!-- Item 2 -->
    <rect x="0" y="110" width="340" height="420" fill="#FFF8F0" stroke="#E67E22" stroke-width="0.8" rx="4"/>
    <text x="12" y="132" font-size="12px" font-weight="bold" fill="#E67E22">❷ 出现网格感？</text>
    <text x="12" y="150" font-size="10px" fill="#555">人眼察觉到重复 tile 的边界，画面像"铺了地砖"。原因：</text>
    <text x="12" y="166" font-size="10px" fill="#555">tile 内部有明显的"高密度区"或"方向性纹理"，重复后这些</text>
    <text x="12" y="182" font-size="10px" fill="#555">特征被大脑自动检测为周期性图案。修复：打散明显的聚集</text>
    <text x="12" y="198" font-size="10px" fill="#555">块，使特征分布趋于均匀；或创建 tile 变体交替使用。</text>

    <!-- Item 3 -->
    <rect x="0" y="205" width="340" height="420" fill="#F5F0FF" stroke="#8E44AD" stroke-width="0.8" rx="4"/>
    <text x="12" y="227" font-size="12px" font-weight="bold" fill="#8E44AD">❸ 亮度不一致？</text>
    <text x="12" y="245" font-size="10px" fill="#555">某块 tile 比周围的亮或暗。原因：绘制时潜意识里在 tile</text>
    <text x="12" y="261" font-size="10px" fill="#555">内部制造了明暗渐变，拼在一起形成棋盘格。修复：确保</text>
    <text x="12" y="277" font-size="10px" fill="#555">tile 四条边的平均明度一致。</text>

    <!-- Quick test method -->
    <rect x="0" y="285" width="340" height="420" fill="#E8F4FD" rx="4"/>
    <text x="12" y="305" font-size="11px" font-weight="bold" fill="#333">快速检验法</text>
    <text x="12" y="322" font-size="10px" fill="#555">眯眼看 → 能看到网格线 = 接缝问题。拉远看(缩放25%) → </text>
    <text x="12" y="337" font-size="10px" fill="#555">能看到棋盘格 = 亮度不均。盯5秒 → 眼睛开始找规律 = 重复感。</text>
  </g>

  <!-- Bottom annotation arrows pointing from grid to issues -->
  <line x1="220" y1="400" x2="220" y2="395" class="seam-arrow"/>
  <line x1="305" y1="400" x2="305" y2="395" class="seam-arrow"/>
</svg>