<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 420" width="800" height="420">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 11px; fill: #666; }
    .grid-cell { stroke: #ccc; stroke-width: 0.4; }
    .grid-fill { fill: #2C3E50; }
    .grid-fill-mid { fill: #5D6D7E; }
    .grid-fill-light { fill: #aab7c4; }
    .grid-bg { fill: #fafafa; }
    .tile-border { fill: none; stroke: #E74C3C; stroke-width: 1.2; stroke-dasharray: 5,4; }
    .seam-arrow { stroke: #E74C3C; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .seam-label { font-size: 10px; fill: #E74C3C; font-weight: bold; }
    .issue-callout { font-size: 9px; fill: #555; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#E74C3C"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">拼接检验——4×4 重复排列的 tile（Tiling Test）</text>

