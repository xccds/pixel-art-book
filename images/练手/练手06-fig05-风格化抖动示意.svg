<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 12px; fill: #666; }
      .panel-label { font-size: 13px; font-weight: bold; fill: #333; }
      .cap { font-size: 11px; fill: #888; }
      .section { font-size: 12px; font-weight: bold; fill: #555; }
      .on { fill: #2C3E50; }
      .bg { fill: #fafafa; }
      .box-title { font-size: 14px; font-weight: bold; fill: #8E44AD; }
      .box-note { font-size: 12px; fill: #444; }
      .code { font-family: 'Menlo','Consolas',monospace; font-size: 11px; fill: #2C3E50; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#FFFFFF"/>

  <text x="400" y="28" text-anchor="middle" class="title">风格化抖动 vs Bayer——采样核的差别（Stylized vs Bayer）</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">同一 50% 密度，左边用固定阈值矩阵（点），右边用自定义斜线核（形状）——核不同，纹理语言就不同。</text>

  <!-- ====== Left panel: Bayer @50% ====== -->
  <text x="176" y="76" text-anchor="middle" class="panel-label" fill="#3498DB">Bayer 4×4 @50%（固定采样核）</text>
  <g transform="translate(120,88)">
    <rect width="112" height="112" class="bg" rx="2"/>
    <rect width="112" height="112" fill="none" stroke="#3498DB" stroke-width="1.6" rx="2"/>
    <g class="on">
      <rect x="0" y="0" width="14" height="14"/><rect x="28" y="0" width="14" height="14"/><rect x="56" y="0" width="14" height="14"/><rect x="84" y="0" width="14" height="14"/>
      <rect x="14" y="14" width="14" height="14"/><rect x="42" y="14" width="14" height="14"/><rect x="70" y="14" width="14" height="14"/><rect x="98" y="14" width="14" height="14"/>
      <rect x="0" y="28" width="14" height="14"/><rect x="28" y="28" width="14" height="14"/><rect x="56" y="28" width="14" height="14"/><rect x="84" y="28" width="14" height="14"/>
      <rect x="14" y="42" width="14" height="14"/><rect x="42" y="42" width="14" height="14"/><rect x="70" y="42" width="14" height="14"/><rect x="98" y="42" width="14" height="14"/>
      <rect x="0" y="56" width="14" height="14"/><rect x="28" y="56" width="14" height="14"/><rect x="56" y="56" width="14" height="14"/><rect x="84" y="56" width="14" height="14"/>
      <rect x="14" y="70" width="14" height="14"/><rect x="42" y="70" width="14" height="14"/><rect x="70" y="70" width="14" height="14"/><rect x="98" y="70" width="14" height="14"/>
      <rect x="0" y="84" width="14" height="14"/><rect x="28" y="84" width="14" height="14"/><rect x="56" y="84" width="14" height="14"/><rect x="84" y="84" width="14" height="14"/>
      <rect x="14" y="98" width="14" height="14"/><rect x="42" y="98" width="14" height="14"/><rect x="70" y="98" width="14" height="14"/><rect x="98" y="98" width="14" height="14"/>
    </g>
  </g>
  <text x="176" y="214" text-anchor="middle" class="cap">像素结果：规则点阵（像自动采样）</text>

  <!-- Bayer kernel inset: 4x4 threshold matrix as grayscale -->
  <text x="400" y="244" text-anchor="middle" class="section">采样核（Kernel）↓</text>
  <g transform="translate(136,256)">
    <rect width="80" height="80" fill="#fff" stroke="#3498DB" stroke-width="1.2" rx="2"/>
    <rect x="0"  y="0"  width="20" height="20" fill="rgb(0,0,0)"/>
    <rect x="20" y="0"  width="20" height="20" fill="rgb(136,136,136)"/>
    <rect x="40" y="0"  width="20" height="20" fill="rgb(34,34,34)"/>
    <rect x="60" y="0"  width="20" height="20" fill="rgb(170,170,170)"/>
    <rect x="0"  y="20" width="20" height="20" fill="rgb(204,204,204)"/>
    <rect x="20" y="20" width="20" height="20" fill="rgb(68,68,68)"/>
    <rect x="40" y="20" width="20" height="20" fill="rgb(238,238,238)"/>
    <rect x="60" y="20" width="20" height="20" fill="rgb(102,102,102)"/>
    <rect x="0"  y="40" width="20" height="20" fill="rgb(51,51,51)"/>
    <rect x="20" y="40" width="20" height="20" fill="rgb(187,187,187)"/>
    <rect x="40" y="40" width="20" height="20" fill="rgb(17,17,17)"/>
    <rect x="60" y="40" width="20" height="20" fill="rgb(153,153,153)"/>
    <rect x="0"  y="60" width="20" height="20" fill="rgb(255,255,255)"/>
    <rect x="20" y="60" width="20" height="20" fill="rgb(119,119,119)"/>
    <rect x="40" y="60" width="20" height="20" fill="rgb(221,221,221)"/>
    <rect x="60" y="60" width="20" height="20" fill="rgb(85,85,85)"/>
  </g>
  <text x="176" y="352" text-anchor="middle" class="cap">4×4 阈值矩阵 M[r][c]（查表）</text>

  <!-- ====== Right panel: Stylized @50% (diagonal slash kernel) ====== -->
  <text x="524" y="76" text-anchor="middle" class="panel-label" fill="#8E44AD">风格化 @50%（自定义斜线核）</text>
  <g transform="translate(468,88)">
    <rect width="112" height="112" class="bg" rx="2"/>
    <rect width="112" height="112" fill="none" stroke="#8E44AD" stroke-width="1.6" rx="2"/>
    <g class="on">
      <!-- (r-c)%4==0 : 16 cells -->
      <rect x="0" y="0" width="14" height="14"/><rect x="14" y="14" width="14" height="14"/><rect x="28" y="28" width="14" height="14"/><rect x="42" y="42" width="14" height="14"/><rect x="56" y="56" width="14" height="14"/><rect x="70" y="70" width="14" height="14"/><rect x="84" y="84" width="14" height="14"/><rect x="98" y="98" width="14" height="14"/>
      <rect x="56" y="0" width="14" height="14"/><rect x="70" y="14" width="14" height="14"/><rect x="84" y="28" width="14" height="14"/><rect x="98" y="42" width="14" height="14"/>
      <rect x="0" y="56" width="14" height="14"/><rect x="14" y="70" width="14" height="14"/><rect x="28" y="84" width="14" height="14"/><rect x="42" y="98" width="14" height="14"/>
      <!-- (r-c)%4==1 : 16 cells -->
      <rect x="14" y="0" width="14" height="14"/><rect x="28" y="14" width="14" height="14"/><rect x="42" y="28" width="14" height="14"/><rect x="56" y="42" width="14" height="14"/><rect x="70" y="56" width="14" height="14"/><rect x="84" y="70" width="14" height="14"/><rect x="98" y="84" width="14" height="14"/>
      <rect x="42" y="0" width="14" height="14"/><rect x="56" y="14" width="14" height="14"/><rect x="70" y="28" width="14" height="14"/><rect x="84" y="42" width="14" height="14"/><rect x="98" y="56" width="14" height="14"/>
      <rect x="70" y="0" width="14" height="14"/><rect x="84" y="14" width="14" height="14"/><rect x="98" y="28" width="14" height="14"/>
      <rect x="98" y="0" width="14" height="14"/>
    </g>
  </g>
  <text x="524" y="214" text-anchor="middle" class="cap">像素结果：斜线纹理（像手绘排线）</text>

  <!-- Stylized kernel inset: 4x4 with main-diagonal slash -->
  <g transform="translate(484,256)">
    <rect width="80" height="80" fill="#fff" stroke="#8E44AD" stroke-width="1.2" rx="2"/>
    <rect x="0"  y="0"  width="20" height="20" fill="#2C3E50"/>
    <rect x="20" y="20" width="20" height="20" fill="#2C3E50"/>
    <rect x="40" y="40" width="20" height="20" fill="#2C3E50"/>
    <rect x="60" y="60" width="20" height="20" fill="#2C3E50"/>
    <rect x="20" y="0"  width="20" height="20" fill="#E8E8E8"/>
    <rect x="40" y="0"  width="20" height="20" fill="#E8E8E8"/>
    <rect x="60" y="0"  width="20" height="20" fill="#E8E8E8"/>
    <rect x="0"  y="20" width="20" height="20" fill="#E8E8E8"/>
    <rect x="40" y="20" width="20" height="20" fill="#E8E8E8"/>
    <rect x="60" y="20" width="20" height="20" fill="#E8E8E8"/>
    <rect x="0"  y="40" width="20" height="20" fill="#E8E8E8"/>
    <rect x="20" y="40" width="20" height="20" fill="#E8E8E8"/>
    <rect x="60" y="40" width="20" height="20" fill="#E8E8E8"/>
    <rect x="0"  y="60" width="20" height="20" fill="#E8E8E8"/>
    <rect x="20" y="60" width="20" height="20" fill="#E8E8E8"/>
    <rect x="40" y="60" width="20" height="20" fill="#E8E8E8"/>
  </g>
  <text x="524" y="352" text-anchor="middle" class="cap">4×4 斜线形状 kernel（自定义）</text>

  <!-- ====== Analogy box ====== -->
  <rect x="40" y="370" width="720" height="115" rx="5" fill="#F8F0FB" stroke="#D2B4DE" stroke-width="1"/>
    <text x="60" y="416" class="box-note">Bayer = <tspan class="code">固定查表 kernel</tspan>：4×4 阈值矩阵 M[r][c]，采样形状恒为"点"，你只改阈值 T（亮暗），几何不变——所以 Bayer 永远像 Bayer。</text>
  <text x="60" y="436" class="box-note">风格化 = <tspan class="code">自定义 shape kernel</tspan>：你定义采样的形状（斜线 / 人字 / 十字 / 圆 / 小短线），抖动像素按那个形状分布——换 kernel = 换纹理语言。</text>
  <text x="60" y="456" class="box-note">普通抖动是 <tspan class="code">if (r+c)%2==0</tspan>，风格化是 <tspan class="code">if matches_custom_pattern(r,c)</tspan>——前者调参数，后者写形状函数。</text>
  <text x="60" y="476" class="box-note" fill="#8E44AD">耀西岛的手绘斜线、Etrian Odyssey 的网格点，都是"自己定义采样核"的产物——核函数不同，采样几何就不同。</text>
</svg>
