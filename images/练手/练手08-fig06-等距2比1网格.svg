<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .cell-bg { fill: #fafafa; }
    .cell-line { stroke: #e0e0e0; stroke-width: 0.5; }
    .tile-a { fill: #D5E8D4; }
    .tile-b { fill: #AED6F1; }
    .tile-c { fill: #FAD7A0; }
    .tile-d { fill: #D2B4DE; }
    .line-iso { fill: #2C3E50; }
    .angle-arc { stroke: #E74C3C; stroke-width: 1.5; fill: none; }
    .step-label { font-size: 9px; fill: #888; }
  </style>

  <text x="400" y="30" class="title" text-anchor="middle">图 练手08.6 等距 2:1 网格——阶梯规则</text>

  <!-- ===== LEFT: 2:1 GRID ===== -->
  <g transform="translate(30, 55)">
    <text x="180" y="0" style="font-size:13px;font-weight:bold;fill:#2C3E50;text-anchor:middle;">等距菱形网格 · 2:1 阶梯线</text>

    <rect x="0" y="10" width="360" height="220" class="cell-bg" rx="2"/>

    <!-- Grid lines (vertical and horizontal reference) -->
    <g class="cell-line">
      <line x1="20" y1="10" x2="20" y2="230"/><line x1="40" y1="10" x2="40" y2="230"/>
      <line x1="60" y1="10" x2="60" y2="230"/><line x1="80" y1="10" x2="80" y2="230"/>
      <line x1="100" y1="10" x2="100" y2="230"/><line x1="120" y1="10" x2="120" y2="230"/>
      <line x1="140" y1="10" x2="140" y2="230"/><line x1="160" y1="10" x2="160" y2="230"/>
      <line x1="180" y1="10" x2="180" y2="230"/><line x1="200" y1="10" x2="200" y2="230"/>
      <line x1="220" y1="10" x2="220" y2="230"/><line x1="240" y1="10" x2="240" y2="230"/>
      <line x1="260" y1="10" x2="260" y2="230"/><line x1="280" y1="10" x2="280" y2="230"/>
      <line x1="300" y1="10" x2="300" y2="230"/><line x1="320" y1="10" x2="320" y2="230"/>
      <line x1="340" y1="10" x2="340" y2="230"/>
      <line x1="0" y1="30" x2="360" y2="30"/><line x1="0" y1="50" x2="360" y2="50"/>
      <line x1="0" y1="70" x2="360" y2="70"/><line x1="0" y1="90" x2="360" y2="90"/>
      <line x1="0" y1="110" x2="360" y2="110"/><line x1="0" y1="130" x2="360" y2="130"/>
      <line x1="0" y1="150" x2="360" y2="150"/><line x1="0" y1="170" x2="360" y2="170"/>
      <line x1="0" y1="190" x2="360" y2="190"/><line x1="0" y1="210" x2="360" y2="210"/>
    </g>

    <!-- Diamond tiles formed by 2:1 staircase lines -->
    <!-- Diamond 1 (green) centered at ~ (100, 90) -->
    <!-- Each diamond: 2:1 ratio means width=4cells, height=2cells per half -->
    <!-- Diamond vertices: top(100,50), right(140,70), bottom(100,90), left(60,70) -->
    <polygon points="100,50 140,70 100,90 60,70" class="tile-a" opacity="0.6"/>
    <polygon points="180,50 220,70 180,90 140,70" class="tile-b" opacity="0.6"/>
    <polygon points="100,90 140,110 100,130 60,110" class="tile-c" opacity="0.6"/>
    <polygon points="180,90 220,110 180,130 140,110" class="tile-d" opacity="0.6"/>
    <polygon points="260,50 300,70 260,90 220,70" class="tile-c" opacity="0.6"/>
    <polygon points="260,90 300,110 260,130 220,110" class="tile-a" opacity="0.6"/>
    <polygon points="100,130 140,150 100,170 60,150" class="tile-b" opacity="0.6"/>
    <polygon points="180,130 220,150 180,170 140,150" class="tile-d" opacity="0.6"/>
    <polygon points="260,130 300,150 260,170 220,150" class="tile-b" opacity="0.6"/>

    <!-- Outline one diamond to show the 2:1 staircase edges -->
    <polygon points="100,50 140,70 100,90 60,70" fill="none" stroke="#2C3E50" stroke-width="2"/>

    <!-- Annotate the 2:1 ratio on one edge -->
    <!-- Top-right edge: from (100,50) to (140,70): 40px right, 20px down = 2:1 -->
    <line x1="100" y1="50" x2="140" y2="70" stroke="#E74C3C" stroke-width="2.5"/>
    <text x="125" y="48" style="font-size:10px;fill:#E74C3C;font-weight:bold;">2:1</text>
    <text x="148" y="64" style="font-size:9px;fill:#E74C3C;">→2 水平</text>
    <text x="148" y="76" style="font-size:9px;fill:#E74C3C;">↓1 垂直</text>

    <!-- Angle annotation: 26.5° -->
    <path d="M 100 50 L 130 50 A 30 30 0 0 1 134 65" class="angle-arc"/>
    <text x="132" y="44" style="font-size:10px;fill:#E74C3C;font-weight:bold;">26.5°</text>
    <text x="132" y="56" style="font-size:8px;fill:#888;">(非30°)</text>

    <text x="180" y="252" class="step-label" text-anchor="middle">每条斜线：水平走 2 格、垂直走 1 格 → 近似 26.5°（整数网格上最简的等距近似）</text>
  </g>

  <!-- ===== RIGHT: COMPARISON ===== -->
  <g transform="translate(440, 55)">
    <text x="160" y="0" style="font-size:13px;font-weight:bold;fill:#2C3E50;text-anchor:middle;">30° vs 26.5°——为什么用 2:1</text>

    <rect x="0" y="20" width="320" height="210" fill="#F8F9FA" rx="4"/>

    <!-- True 30° line (needs tan(30°) ≈ 0.577, not integer) -->
    <text x="20" y="50" style="font-size:11px;font-weight:bold;fill:#E74C3C;">真等距 30°：tan(30°) ≈ 0.577</text>
    <text x="20" y="68" style="font-size:10px;fill:#555;">需要浮点数：每 1px 垂直 → 1.732px 水平</text>
    <text x="20" y="84" style="font-size:10px;fill:#E74C3C;">像素网格上无法精确表达 → 锯齿</text>

    <line x1="20" y1="100" x2="280" y2="160" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="200" y="155" style="font-size:9px;fill:#E74C3C;">30°（浮点，不可整数化）</text>

    <line x1="0" y1="175" x2="320" y2="175" stroke="#ddd" stroke-width="1"/>

    <!-- 2:1 line (26.5°) -->
    <text x="20" y="195" style="font-size:11px;font-weight:bold;fill:#27AE60;">像素等距 2:1：atan(1/2) ≈ 26.5°</text>
    <text x="20" y="213" style="font-size:10px;fill:#555;">每 2px 水平 → 1px 垂直，纯整数运算</text>
    <text x="20" y="225" style="font-size:10px;fill:#27AE60;">差 3.5° 但完全可用 Bresenham 式整数画线 ✓</text>

    <!-- Staircase 2:1 line -->
    <g class="line-iso">
      <rect x="20" y="180" width="20" height="10"/><rect x="40" y="180" width="20" height="10"/>
      <rect x="60" y="190" width="20" height="10"/><rect x="80" y="190" width="20" height="10"/>
      <rect x="100" y="200" width="20" height="10"/><rect x="120" y="200" width="20" height="10"/>
      <rect x="140" y="210" width="20" height="10"/><rect x="160" y="210" width="20" height="10"/>
    </g>
  </g>

  <!-- Bottom explanation -->
</svg>
