<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 412" width="800" height="412">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 15px; font-weight: bold; fill: #333; }
    .room-floor { fill: #D5E8D4; }
    .room-wall-n { fill: #A9CCE3; }
    .room-wall-s { fill: #A9CCE3; }
    .room-wall-e { fill: #A9CCE3; }
    .room-wall-w { fill: #A9CCE3; }
    .wall-edge { stroke: #2C3E50; stroke-width: 1.5; fill: none; }
    .char-body { fill: #E74C3C; }
    .char-head { fill: #F5B041; }
    .char-face { fill: #2C3E50; }
    .panel-label { font-size: 12px; font-weight: bold; }
    .panel-bg { fill: #fafafa; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #E74C3C; stroke-width: 2; fill: none; marker-end: url(#arrowhead08); }
  </style>

  <defs>
    <marker id="arrowhead08" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#E74C3C"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">图 练手08.7 塞尔达透视问题——角色视角与场景视角不匹配</text>

  <!-- ===== LEFT: THE PROBLEM ===== -->
  <g transform="translate(30, 55)">
    <text x="170" y="0" class="panel-label" fill="#E74C3C" text-anchor="middle">✗ 问题：45°角色 + 90°房间</text>

    <rect x="0" y="15" width="340" height="412" class="panel-bg" rx="3"/>

    <!-- Room: top-down (90°) view — square room -->
    <!-- North wall (top) -->
    <rect x="20" y="30" width="300" height="412" class="room-wall-n"/>
    <!-- West wall (left) -->
    <rect x="20" y="30" width="20" height="412" class="room-wall-w"/>
    <!-- East wall (right) -->
    <rect x="300" y="30" width="20" height="412" class="room-wall-e"/>
    <!-- South wall (bottom) -->
    <rect x="20" y="180" width="300" height="412" class="room-wall-s"/>
    <!-- Floor -->
    <rect x="40" y="50" width="260" height="412" class="room-floor"/>

    <!-- Wall labels -->
    <text x="170" y="44" style="font-size:9px;fill:#2C3E50;font-weight:bold;text-anchor:middle;">北墙（90°俯视）</text>
    <text x="170" y="196" style="font-size:9px;fill:#2C3E50;font-weight:bold;text-anchor:middle;">南墙（90°俯视）</text>
    <text x="30" y="120" style="font-size:9px;fill:#2C3E50;font-weight:bold;text-anchor:middle;" transform="rotate(-90 30 120)">西墙</text>
    <text x="320" y="120" style="font-size:9px;fill:#2C3E50;font-weight:bold;text-anchor:middle;" transform="rotate(90 320 120)">东墙</text>

    <!-- Character: drawn at 45° (you see front + top of head) -->
    <!-- In center: looks OK -->
    <g transform="translate(160, 100)">
      <!-- head (seen from 45°: oval) -->
      <ellipse cx="10" cy="0" rx="8" ry="6" class="char-head"/>
      <!-- eyes (front-facing = visible at 45°) -->
      <rect x="6" y="-2" width="2" height="412" class="char-face"/>
      <rect x="12" y="-2" width="2" height="412" class="char-face"/>
      <!-- body (seen from 45°: trapezoid) -->
      <polygon points="2,6 18,6 20,20 0,20" class="char-body"/>
      <text x="10" y="35" style="font-size:8px;fill:#27AE60;font-weight:bold;text-anchor:middle;">中心：OK</text>
    </g>

    <!-- Character near south wall: looks like lying down! -->
    <g transform="translate(160, 160)">
      <!-- Same 45° character but near south wall -->
      <ellipse cx="10" cy="0" rx="8" ry="6" class="char-head"/>
      <rect x="6" y="-2" width="2" height="412" class="char-face"/>
      <rect x="12" y="-2" width="2" height="412" class="char-face"/>
      <polygon points="2,6 18,6 20,20 0,20" class="char-body"/>
    </g>
    <!-- Red warning: looks like lying on floor -->
    <rect x="148" y="152" width="44" height="412" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="170" y="210" style="font-size:9px;fill:#E74C3C;font-weight:bold;text-anchor:middle;">靠南墙 → 像躺在地上！</text>

    <text x="170" y="232" style="font-size:10px;fill:#555;text-anchor:middle;">房间 90° 无深度 · 角色 45° 有正面 → 两套坐标系冲突</text>
  </g>

  <!-- ===== RIGHT: THE EXPLANATION ===== -->
  <g transform="translate(420, 55)">
    <text x="160" y="0" class="panel-label" fill="#333" text-anchor="middle">两种视角的坐标系对比</text>

    <!-- 90° room coordinate -->
    <rect x="0" y="20" width="150" height="412" fill="#F8F9FA" rx="4"/>
    <text x="75" y="40" style="font-size:11px;font-weight:bold;fill:#3498DB;text-anchor:middle;">房间数据：90°</text>
    <text x="75" y="58" style="font-size:10px;fill:#555;text-anchor:middle;">{x, y} 纯网格</text>
    <text x="75" y="74" style="font-size:10px;fill:#555;text-anchor:middle;">无"朝向"维度</text>
    <!-- Simple top-down square -->
    <rect x="45" y="82" width="60" height="412" fill="#D5E8D4" stroke="#2C3E50" stroke-width="1"/>
    <text x="75" y="106" style="font-size:8px;fill:#888;text-anchor:middle;">俯视方块</text>
    <text x="75" y="122" style="font-size:8px;fill:#888;text-anchor:middle;">无正面/侧面</text>

    <!-- 45° character coordinate -->
    <rect x="170" y="20" width="150" height="412" fill="#FFF3F3" rx="4"/>
    <text x="245" y="40" style="font-size:11px;font-weight:bold;fill:#E74C3C;text-anchor:middle;">角色数据：45°</text>
    <text x="245" y="58" style="font-size:10px;fill:#555;text-anchor:middle;">{x, y, facing}</text>
    <text x="245" y="74" style="font-size:10px;fill:#555;text-anchor:middle;">有"朝向"维度</text>
    <!-- 45° character icon -->
    <ellipse cx="245" cy="95" rx="10" ry="7" fill="#F5B041"/>
    <rect x="240" y="92" width="2" height="412" fill="#2C3E50"/>
    <rect x="248" y="92" width="2" height="412" fill="#2C3E50"/>
    <polygon points="235,102 255,102 258,120 232,120" fill="#E74C3C"/>
    <text x="245" y="122" style="font-size:8px;fill:#888;text-anchor:middle;">有正面 + 头顶</text>

    <!-- Mismatch arrow -->
    <text x="160" y="80" style="font-size:14px;font-weight:bold;fill:#E74C3C;text-anchor:middle;">≠</text>
    <text x="160" y="100" style="font-size:9px;fill:#E74C3C;font-weight:bold;text-anchor:middle;">类型不匹配</text>

    <!-- Solutions -->
    <rect x="0" y="145" width="320" height="412" fill="#F8F9FA" rx="4"/>
    <text x="160" y="165" style="font-size:11px;font-weight:bold;fill:#333;text-anchor:middle;">解法（二选一，不能两边都占）</text>
    <text x="15" y="185" style="font-size:10px;fill:#27AE60;font-weight:bold;">A. 角色也改纯俯视</text>
    <text x="15" y="200" style="font-size:9px;fill:#555;">牺牲角色表现力（看不到正面）</text>
    <text x="15" y="215" style="font-size:10px;fill:#27AE60;font-weight:bold;">B. 场景也改 45° 俯视</text>
    <text x="15" y="230" style="font-size:9px;fill:#555;">牺牲 Tile 管理简单性（需等距 Tile）</text>
  </g>

  <!-- Bottom explanation -->
</svg>
