<svg xmlns="http://www.w3.org/2000/svg" width="800" height="487" viewBox="0.0 0.0 800.0 487" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
    <linearGradient id="timelineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
  </defs>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">48小时视觉冲刺时间线</text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#666">48-Hour Visual Sprint Timeline</text>

  <!-- 时间轴主线 -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#E74C3C" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- 时间刻度 -->
  <line x1="60" y1="140" x2="60" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="60" y="178" text-anchor="middle" font-size="12" fill="#333">0h</text>

  <line x1="230" y1="140" x2="230" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="230" y="178" text-anchor="middle" font-size="12" fill="#333">1h</text>

  <line x1="310" y1="140" x2="310" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="310" y="178" text-anchor="middle" font-size="12" fill="#333">3h</text>

  <line x1="400" y1="140" x2="400" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="400" y="178" text-anchor="middle" font-size="12" fill="#333">8h</text>

  <line x1="570" y1="140" x2="570" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="570" y="178" text-anchor="middle" font-size="12" fill="#333">24h</text>

  <line x1="700" y1="140" x2="700" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="700" y="178" text-anchor="middle" font-size="12" fill="#333">44h</text>

  <line x="740" y1="140" x2="740" y2="160" stroke="#E74C3C" stroke-width="2"/>
  <text x="740" y="178" text-anchor="middle" font-size="12" fill="#E74C3C" font-weight="bold">48h</text>

  <!-- 节点1: 1h 定风格 -->
  <circle cx="230" cy="150" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="230" y="154" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">1</text>
  <rect x="165" y="195" width="130" height="487" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="230" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🎨 定风格</text>
  <text x="230" y="235" text-anchor="middle" font-size="11" fill="#666">浏览参考图</text>
  <text x="230" y="252" text-anchor="middle" font-size="11" fill="#666">确定配色方案</text>
  <text x="230" y="269" text-anchor="middle" font-size="11" fill="#666">建立情绪板</text>
  <text x="230" y="289" text-anchor="middle" font-size="10" fill="#E74C3C">产出：风格指南1页</text>

  <!-- 节点2: 3h 出角色 -->
  <circle cx="310" cy="150" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="310" y="154" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">2</text>
  <rect x="245" y="195" width="130" height="487" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="310" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">👤 出角色</text>
  <text x="310" y="235" text-anchor="middle" font-size="11" fill="#666">主角剪影设计</text>
  <text x="310" y="252" text-anchor="middle" font-size="11" fill="#666">站立帧+关键帧</text>
  <text x="310" y="269" text-anchor="middle" font-size="11" fill="#666">尺寸规格确定</text>
  <text x="310" y="289" text-anchor="middle" font-size="10" fill="#E74C3C">产出：角色三视图</text>

  <!-- 节点3: 8h 出场景 -->
  <circle cx="400" cy="150" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="400" y="154" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">3</text>
  <rect x="335" y="320" width="130" height="487" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🏞️ 出场景</text>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#666">主场景背景</text>
  <text x="400" y="377" text-anchor="middle" font-size="11" fill="#666">Tile规则/瓦片</text>
  <text x="400" y="394" text-anchor="middle" font-size="11" fill="#666">前景+中景+背景</text>
  <text x="400" y="414" text-anchor="middle" font-size="10" fill="#E74C3C">产出：可运行场景1个</text>

  <!-- 节点4: 24h 做动画 -->
  <circle cx="570" cy="150" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="570" y="154" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">4</text>
  <rect x="505" y="195" width="130" height="487" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="570" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🏃 做动画</text>
  <text x="570" y="235" text-anchor="middle" font-size="11" fill="#666">待机/行走/跳跃</text>
  <text x="570" y="252" text-anchor="middle" font-size="11" fill="#666">场景转场过渡</text>
  <text x="570" y="269" text-anchor="middle" font-size="11" fill="#666">粒子/VFX简单特效</text>
  <text x="570" y="289" text-anchor="middle" font-size="10" fill="#E74C3C">产出：核心动画组</text>

  <!-- 节点5: 44h 打磨 -->
  <circle cx="700" cy="150" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="700" y="154" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">5</text>
  <rect x="635" y="320" width="130" height="487" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="700" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">✨ 打磨</text>
  <text x="700" y="360" text-anchor="middle" font-size="11" fill="#666">UI统一字体色</text>
  <text x="700" y="377" text-anchor="middle" font-size="11" fill="#666">配色全局校色</text>
  <text x="700" y="394" text-anchor="middle" font-size="11" fill="#666">HUD/菜单/反馈</text>
  <text x="700" y="414" text-anchor="middle" font-size="10" fill="#E74C3C">产出：可演示成品</text>

  <!-- 连接虚线 -->
  <line x1="242" y1="140" x2="242" y2="195" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="322" y1="140" x2="322" y2="195" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="162" x2="400" y2="320" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="582" y1="140" x2="582" y2="195" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="162" x2="700" y2="320" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 冲刺建议 -->
  <rect x="170" y="442" width="460" height="487" rx="6" fill="#333"/>
  <text x="400" y="467" text-anchor="middle" font-size="13" fill="#fff">💡 核心原则：不是做最好的，是做"看起来像成品"的 —— 完成度 &gt; 精细度</text>
</svg>
