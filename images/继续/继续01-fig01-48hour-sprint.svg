<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>

  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">48小时视觉冲刺时间线</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#888">48-Hour Visual Sprint Timeline</text>

  <!-- Timeline -->
  <line x1="40" y1="130" x2="760" y2="130" stroke="#E74C3C" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Time markers -->
  <line x1="40" y1="120" x2="40" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="40" y="158" text-anchor="middle" font-size="11" fill="#333">0h</text>
  <line x1="200" y1="120" x2="200" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="200" y="158" text-anchor="middle" font-size="11" fill="#333">1h</text>
  <line x1="300" y1="120" x2="300" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="300" y="158" text-anchor="middle" font-size="11" fill="#333">3h</text>
  <line x1="400" y1="120" x2="400" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="400" y="158" text-anchor="middle" font-size="11" fill="#333">8h</text>
  <line x1="570" y1="120" x2="570" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="570" y="158" text-anchor="middle" font-size="11" fill="#333">24h</text>
  <line x1="700" y1="120" x2="700" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="700" y="158" text-anchor="middle" font-size="11" fill="#333">44h</text>
  <line x1="760" y1="120" x2="760" y2="140" stroke="#E74C3C" stroke-width="2"/>
  <text x="760" y="158" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">48h</text>

  <!-- Top row: Nodes 1, 2, 4 (at y=175) -->
  <!-- Node 1: 定风格 @ 1h, circle x=200, box at y=175 -->
  <circle cx="200" cy="130" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="200" y="134" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">1</text>
  <rect x="135" y="175" width="130" height="95" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">定风格</text>
  <text x="200" y="214" text-anchor="middle" font-size="10" fill="#666">浏览参考图</text>
  <text x="200" y="229" text-anchor="middle" font-size="10" fill="#666">确定配色 + 情绪板</text>
  <text x="200" y="246" text-anchor="middle" font-size="10" fill="#666">产出：风格指南1页</text>

  <!-- Node 2: 出角色 @ 3h, circle x=300 -->
  <circle cx="300" cy="130" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="300" y="134" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">2</text>
  <rect x="235" y="175" width="130" height="95" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">出角色</text>
  <text x="300" y="214" text-anchor="middle" font-size="10" fill="#666">主角剪影 + 站立帧</text>
  <text x="300" y="229" text-anchor="middle" font-size="10" fill="#666">尺寸规格确定</text>
  <text x="300" y="246" text-anchor="middle" font-size="10" fill="#666">产出：角色三视图</text>

  <!-- Node 4: 做动画 @ 24h, circle x=570 -->
  <circle cx="570" cy="130" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="570" y="134" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">4</text>
  <rect x="505" y="175" width="130" height="95" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="570" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">做动画</text>
  <text x="570" y="214" text-anchor="middle" font-size="10" fill="#666">待机/行走/跳跃</text>
  <text x="570" y="229" text-anchor="middle" font-size="10" fill="#666">粒子/VFX简单特效</text>
  <text x="570" y="246" text-anchor="middle" font-size="10" fill="#666">产出：核心动画组</text>

  <!-- Bottom row: Nodes 3, 5 (at y=310) -->
  <!-- Node 3: 出场景 @ 8h, circle x=400 -->
  <circle cx="400" cy="130" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="400" y="134" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">3</text>
  <rect x="335" y="310" width="130" height="95" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">出场景</text>
  <text x="400" y="349" text-anchor="middle" font-size="10" fill="#666">主场景背景 + Tile规则</text>
  <text x="400" y="364" text-anchor="middle" font-size="10" fill="#666">前景+中景+背景</text>
  <text x="400" y="381" text-anchor="middle" font-size="10" fill="#666">产出：可运行场景1个</text>

  <!-- Node 5: 打磨 @ 44h, circle x=700 -->
  <circle cx="700" cy="130" r="12" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="700" y="134" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">5</text>
  <rect x="635" y="310" width="130" height="95" rx="8" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="700" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">打磨</text>
  <text x="700" y="349" text-anchor="middle" font-size="10" fill="#666">UI统一 + 配色校色</text>
  <text x="700" y="364" text-anchor="middle" font-size="10" fill="#666">HUD/菜单/反馈</text>
  <text x="700" y="381" text-anchor="middle" font-size="10" fill="#666">产出：可演示成品</text>

  <!-- Connector lines (from circle bottom to box top) -->
  <line x1="200" y1="142" x2="200" y2="174" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="142" x2="300" y2="174" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="142" x2="570" y2="174" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="142" x2="400" y2="309" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="142" x2="700" y2="309" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom tip -->
  <rect x="180" y="445" width="440" height="36" rx="6" fill="#333"/>
  <text x="400" y="468" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">核心原则：不是做最好的，是做"看起来像成品"的——完成度 &gt; 精细度</text>
</svg>
