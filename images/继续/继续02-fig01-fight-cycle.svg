<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrowFight" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E74C3C"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">F.I.G.H.T. 有目的练习循环</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#666">Aidan Helfant — Focused Intentional Growth &amp; Hitting Targets</text>

  <!-- 五边形框架（环形布局） -->
  <!-- 节点坐标：以(400,280)为圆心，半径130 -->
  <!-- Focus: 顶 (400,150) -->
  <!-- Iteration: 右上 (524,195) -->
  <!-- Goldilocks: 右下 (477,370) -->
  <!-- Heart: 左下 (323,370) -->
  <!-- Targets: 左上 (276,195) -->

  <!-- 连接线组成的五边形 -->
  <polygon points="400,140 536,195 490,370 310,370 264,195" fill="none" stroke="#E74C3C" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- 箭头连接（五边形顺时针） -->
  <line x1="400" y1="140" x2="530" y2="192" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowFight)"/>
  <line x1="536" y1="205" x2="495" y2="365" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowFight)"/>
  <line x1="480" y1="370" x2="320" y2="370" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowFight)"/>
  <line x1="310" y1="360" x2="270" y2="205" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowFight)"/>
  <line x1="274" y1="195" x2="390" y2="147" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowFight)"/>

  <!-- 中心文字 -->
  <circle cx="400" cy="270" r="40" fill="#E74C3C" opacity="0.1" stroke="#E74C3C" stroke-width="1"/>
  <text x="400" y="265" text-anchor="middle" font-size="13" fill="#E74C3C" font-weight="bold">循环</text>
  <text x="400" y="285" text-anchor="middle" font-size="11" fill="#666">迭代成长</text>

  <!-- 节点1: Focus -->
  <circle cx="400" cy="140" r="30" fill="#333" stroke="#fff" stroke-width="2"/>
  <text x="400" y="136" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">F</text>
  <text x="400" y="150" text-anchor="middle" font-size="10" fill="#ccc">Focus</text>
  <text x="400" y="113" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">聚焦</text>
  <text x="400" y="100" text-anchor="middle" font-size="10" fill="#666">一次只练一个技能</text>
  <text x="400" y="88" text-anchor="middle" font-size="10" fill="#999">例：这周只练线稿</text>

  <!-- 节点2: Iteration -->
  <circle cx="536" cy="195" r="30" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="536" y="191" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">I</text>
  <text x="536" y="205" text-anchor="middle" font-size="10" fill="#fdd">Iteration</text>
  <text x="550" y="170" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">迭代反馈</text>
  <text x="550" y="158" text-anchor="middle" font-size="10" fill="#666">画完立刻对比参考</text>
  <text x="558" y="146" text-anchor="middle" font-size="10" fill="#999">找到3个差距，重画</text>

  <!-- 节点3: Goldilocks -->
  <circle cx="490" cy="370" r="30" fill="#333" stroke="#fff" stroke-width="2"/>
  <text x="490" y="366" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">G</text>
  <text x="490" y="380" text-anchor="middle" font-size="10" fill="#ccc">Goldilocks</text>
  <text x="515" y="400" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">难度适中</text>
  <text x="528" y="413" text-anchor="middle" font-size="10" fill="#666">太难→挫败，太简单→无聊</text>
  <text x="538" y="426" text-anchor="middle" font-size="10" fill="#999">60%成功率是最佳区</text>

  <!-- 节点4: Heart -->
  <circle cx="310" cy="370" r="30" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="310" y="366" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">H</text>
  <text x="310" y="380" text-anchor="middle" font-size="10" fill="#fdd">Heart</text>
  <text x="285" y="400" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">保持动机</text>
  <text x="270" y="413" text-anchor="middle" font-size="10" fill="#666">仪式感、小胜利、社群</text>
  <text x="262" y="426" text-anchor="middle" font-size="10" fill="#999">完成>完美，庆祝进步</text>

  <!-- 节点5: Targets -->
  <circle cx="264" cy="195" r="30" fill="#333" stroke="#fff" stroke-width="2"/>
  <text x="264" y="191" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">T</text>
  <text x="264" y="205" text-anchor="middle" font-size="10" fill="#ccc">Targets</text>
  <text x="250" y="170" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">明确目标</text>
  <text x="242" y="158" text-anchor="middle" font-size="10" fill="#666">今天要练到什么程度</text>
  <text x="236" y="146" text-anchor="middle" font-size="10" fill="#999">"画3张不同的树"</text>

  <!-- 底部注释 -->
  <rect x="140" y="448" width="520" height="36" rx="6" fill="#E8F4FD" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="472" text-anchor="middle" font-size="12" fill="#333">💡 关键：每次循环聚焦一个技能点，完成后评估，调整难度，保持动机，进入下一轮</text>
</svg>
