<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 494" width="800" height="494" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">独立开发者的三重人格</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#666">Triple Personas Model — 美术 / 程序 / 项目管理</text>

  <!-- 三个交织的圆 -->
  <!-- 左上：美术 -->
  <circle cx="330" cy="230" r="120" fill="#E74C3C" opacity="0.12" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="330" cy="230" r="20" fill="#E74C3C"/>
  <text x="330" y="235" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">美术</text>
  <text x="330" y="200" text-anchor="middle" font-size="13" fill="#E74C3C" font-weight="bold">想做好看</text>
  <text x="330" y="130" text-anchor="middle" font-size="11" fill="#666">"这个配色不够高级"</text>
  <text x="330" y="113" text-anchor="middle" font-size="11" fill="#666">"动画少了一帧过渡"</text>
  <text x="330" y="96" text-anchor="middle" font-size="11" fill="#666">"光影方向不一致"</text>

  <!-- 右上：程序 -->
  <circle cx="530" cy="230" r="120" fill="#333" opacity="0.08" stroke="#333" stroke-width="2"/>
  <circle cx="530" cy="230" r="20" fill="#333"/>
  <text x="530" y="235" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">程序</text>
  <text x="530" y="200" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">想做对</text>
  <text x="530" y="130" text-anchor="middle" font-size="11" fill="#666">"这个效果技术上太复杂"</text>
  <text x="548" y="113" text-anchor="middle" font-size="11" fill="#666">"4096×4096太占显存了"</text>
  <text x="548" y="96" text-anchor="middle" font-size="11" fill="#666">"用shader实现更优雅"</text>

  <!-- 下方：项目管理 -->
  <circle cx="430" cy="360" r="120" fill="#2E86C1" opacity="0.08" stroke="#2E86C1" stroke-width="2"/>
  <circle cx="430" cy="360" r="20" fill="#2E86C1"/>
  <text x="430" y="365" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">管理</text>
  <text x="430" y="335" text-anchor="middle" font-size="13" fill="#2E86C1" font-weight="bold">想做快</text>
  <text x="430" y="440" text-anchor="middle" font-size="11" fill="#666">"没时间迭代了，先上线"</text>
  <text x="430" y="457" text-anchor="middle" font-size="11" fill="#666">"这个功能砍掉，下个版本"</text>
  <text x="430" y="474" text-anchor="middle" font-size="11" fill="#666">"Steam页面下周要交"</text>

  <!-- 中心重叠区域 -->
  <circle cx="430" cy="290" r="55" fill="url(#centerGlow)" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="430" y="283" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="bold">成品体验</text>
  <text x="430" y="296" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="bold">&gt; 三者各自的</text>
  <text x="430" y="309" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="bold">完美主义</text>

  <!-- 连接线到中心 -->
  <line x1="360" y1="240" x2="410" y2="278" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="500" y1="240" x2="450" y2="278" stroke="#333" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="430" y1="345" x2="430" y2="318" stroke="#2E86C1" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
</svg>
