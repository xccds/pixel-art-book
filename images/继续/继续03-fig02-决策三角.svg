<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">三维决策三角</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#666">The Decision Triangle — 在约束内做最好的决策</text>

  <!-- 三角形 -->
  <polygon points="400,100 160,420 640,420" fill="#E8F4FD" stroke="#333" stroke-width="2.5"/>

  <!-- 顶点标签 -->
  <!-- 顶：时间 -->
  <circle cx="400" cy="100" r="28" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">时间</text>
  <text x="400" y="112" text-anchor="middle" font-size="10" fill="#fdd">Time</text>
  <text x="400" y="72" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">你有多少时间？</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#666">周末 vs 半年</text>

  <!-- 左下：技能 -->
  <circle cx="160" cy="420" r="28" fill="#333" stroke="#fff" stroke-width="2"/>
  <text x="160" y="416" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">技能</text>
  <text x="160" y="432" text-anchor="middle" font-size="10" fill="#ccc">Skill</text>
  <text x="110" y="462" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">你会什么？</text>
  <text x="100" y="478" text-anchor="middle" font-size="10" fill="#666">能画到什么程度</text>

  <!-- 右下：工具 -->
  <circle cx="640" cy="420" r="28" fill="#E74C3C" stroke="#fff" stroke-width="2"/>
  <text x="640" y="416" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">工具</text>
  <text x="640" y="432" text-anchor="middle" font-size="10" fill="#fdd">Tool</text>
  <text x="690" y="462" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">你有什么设备？</text>
  <text x="695" y="478" text-anchor="middle" font-size="10" fill="#666">Aseprite? PS? 手绘板?</text>

  <!-- 中心标注 -->
  <rect x="310" y="230" width="180" height="52" rx="8" fill="#fff" stroke="#E74C3C" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-size="13" fill="#E74C3C" font-weight="bold">在这个三角区域内</text>
  <text x="400" y="270" text-anchor="middle" font-size="13" fill="#E74C3C" font-weight="bold">做最好的决策</text>

  <!-- 右下角标注 -->
  <rect x="540" y="468" width="180" height="20" rx="4" fill="#333"/>
  <text x="630" y="482" text-anchor="middle" font-size="11" fill="#fff">不是妥协——是设计</text>

  <!-- 三角形顶点上的小标注 -->
  <text x="270" y="370" text-anchor="middle" font-size="10" fill="#999" transform="rotate(-52,270,370)">时间×技能</text>
  <text x="530" y="370" text-anchor="middle" font-size="10" fill="#999" transform="rotate(52,530,370)">时间×工具</text>
  <text x="400" y="405" text-anchor="middle" font-size="10" fill="#999">技能×工具</text>
</svg>
