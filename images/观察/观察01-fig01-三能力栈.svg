<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380"
     width="800" height="380"
     font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #222; text-anchor: middle; }
    .layer-title { font-size: 18px; font-weight: bold; fill: #FFF; text-anchor: start; }
    .layer-sub { font-size: 13px; fill: rgba(255,255,255,0.88); text-anchor: start; }
    .layer-role { font-size: 12px; fill: rgba(255,255,255,0.70); text-anchor: start; }
    .arrow { font-size: 16px; fill: #888; text-anchor: middle; }
    .dep-text { font-size: 12px; fill: #999; text-anchor: start; }
    .tagline { font-size: 16px; font-weight: bold; fill: #444; text-anchor: middle; }
  </style>

  <text x="400" y="28" class="title">三能力分层架构：看 → 做 → 整</text>

  <!-- Layer 整 (top) -->
  <rect x="60" y="48" width="680" height="82" rx="6" fill="#7E57C2"/>
  <text x="84" y="75" class="layer-title">整 · Integrate（部署系统）</text>
  <text x="84" y="98" class="layer-sub">把素材导入引擎、跑通、确保一切看起来统一</text>
  <text x="84" y="118" class="layer-role">训练：第四部 制作07-09（上引擎 / 管线 / 一致性审计）</text>

  <text x="400" y="150" class="arrow">▲ 依赖上层接口；底层出错，上层不可用</text>

  <!-- Layer 做 (middle) -->
  <rect x="60" y="156" width="680" height="82" rx="6" fill="#26A69A"/>
  <text x="84" y="183" class="layer-title">做 · Make（实现系统）</text>
  <text x="84" y="206" class="layer-sub">把东西画出来——控制线条、形状、明度、色彩、质感</text>
  <text x="84" y="226" class="layer-role">训练：第二部 练手（基础）+ 第四部 制作01-06（应用）</text>

  <text x="400" y="258" class="arrow">▲ 依赖上层接口；底层出错，上层不可用</text>

  <!-- Layer 看 (bottom) -->
  <rect x="60" y="264" width="680" height="82" rx="6" fill="#EF5350"/>
  <text x="84" y="291" class="layer-title">看 · See（输入系统）</text>
  <text x="84" y="314" class="layer-sub">判断什么是好、说出哪里不好——感知 + 词汇</text>
  <text x="84" y="334" class="layer-role">训练：第一部 观察（你正在读的这一部）◀ 大多数程序员的问题出在这一层</text>

  <text x="400" y="368" class="tagline">三层不能跳。跳过"看"直接"做"，等于没写测试用例就开始写代码。</text>
</svg>
