<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420"
     width="800" height="420"
     font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <style>
    .label { font-size: 15px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #222; text-anchor: middle; }
    .caption { font-size: 14px; fill: #666; }
    .tag { font-size: 13px; font-weight: bold; fill: #FFF; text-anchor: middle; }
    .desc { font-size: 13px; fill: #555; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" class="title">明度极端对比：低调 vs 高调画面</text>

  <!-- Left panel: Downwell-style (low key, B/W + red) -->
  <rect x="40" y="50" width="330" height="240" rx="6" fill="#1A1A1A" stroke="#444" stroke-width="2"/>
  <text x="205" y="28" class="tag" fill="#444">—— Downwell 式 · 低调画面 ——</text>

  <!-- Dark blocks in low-key -->
  <rect x="70" y="80" width="120" height="50" rx="3" fill="#333"/>
  <rect x="210" y="70" width="140" height="30" rx="3" fill="#2A2A2A"/>
  <rect x="80" y="150" width="180" height="20" rx="3" fill="#3D3D3D"/>
  <rect x="120" y="190" width="60" height="80" rx="3" fill="#4A4A4A"/>

  <!-- Small bright accent (focal point) -->
  <circle cx="160" cy="210" r="8" fill="#DDD"/>
  <line x1="160" y1="218" x2="160" y2="260" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="160" y="275" class="label" fill="#999" text-anchor="middle">唯一的亮区 = 焦点</text>

  <text x="205" y="300" class="desc">全局暗 + 局部亮 = 神秘/压抑</text>

  <!-- Right panel: high contrast (Celeste-style inspiration) -->
  <rect x="430" y="50" width="330" height="240" rx="6" fill="#FAFAFA" stroke="#CCC" stroke-width="2"/>
  <text x="595" y="28" class="tag" fill="#CCC">—— 高对比 · 明亮画面 ——</text>

  <!-- Bright blocks with contrast -->
  <rect x="460" y="80" width="100" height="60" rx="3" fill="#2C3E50"/>
  <rect x="580" y="60" width="140" height="30" rx="3" fill="#E8E8E8"/>
  <rect x="470" y="160" width="180" height="20" rx="3" fill="#BDC3C7"/>
  <rect x="500" y="195" width="80" height="80" rx="3" fill="#E74C3C"/>
  <rect x="610" y="140" width="60" height="50" rx="3" fill="#3498DB"/>

  <text x="595" y="300" class="desc">高对比 + 多彩 = 清晰/活泼</text>

  <!-- Arrow connecting -->
  <text x="380" y="160" class="label" text-anchor="middle" font-weight="bold">→ 去色后 →</text>

  <!-- Bottom: grayscale version -->
  <text x="400" y="345" class="label" text-anchor="middle" font-weight="bold">去色检验：两张图都转灰度后</text>

  <!-- Grayscale left -->
  <rect x="70" y="360" width="120" height="16" rx="2" fill="#555"/>
  <rect x="210" y="355" width="140" height="12" rx="2" fill="#444"/>
  <rect x="80" y="378" width="180" height="8" rx="2" fill="#666"/>
  <text x="205" y="400" class="caption" text-anchor="middle">明度结构清晰，焦点可辨</text>

  <!-- Grayscale right -->
  <rect x="460" y="360" width="100" height="20" rx="2" fill="#3A3A3A"/>
  <rect x="580" y="355" width="140" height="12" rx="2" fill="#DDD"/>
  <rect x="500" y="380" width="80" height="16" rx="2" fill="#888"/>
  <text x="595" y="400" class="caption" text-anchor="middle">高对比区域依然明显</text>

  <!-- Bottom annotation -->
  <text x="400" y="420" class="caption" text-anchor="middle" display="none">无论画面是极暗还是极亮，明度结构决定了画面的第一印象。去色后还能看出层次和焦点 = 明度扎实。</text>
</svg>