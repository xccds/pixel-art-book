<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 540" width="800" height="540"
     font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #222; text-anchor: middle; }
    .subtitle { font-size: 14px; fill: #666; text-anchor: middle; }
    .label { font-size: 13px; fill: #333; }
    .tag { font-size: 14px; font-weight: bold; text-anchor: middle; }
    .tag-good { fill: #27AE60; }
    .tag-bad { fill: #E74C3C; }
    .explain { font-size: 12px; fill: #555; text-anchor: middle; }
    .arrow { font-size: 20px; fill: #999; text-anchor: middle; }
    .pixel { stroke: none; }
    .bg { fill: #fafafa; stroke: #ddd; stroke-width: 1; rx: 4; }
    .target { stroke: #E74C3C; stroke-width: 2.5; fill: none; rx: 3; }
  </style>

  <text x="400" y="28" class="title">明度对比：去色后还剩什么</text>
  <text x="400" y="50" class="subtitle">色彩是装饰，明度是骨架——去色后还能读出结构，才是合格的画面</text>

  <!-- ======================================== -->
  <!-- LEFT: 正例 (good) -->
  <!-- ======================================== -->
  <rect x="30" y="70" width="355" height="540" class="bg"/>

  <text x="207" y="95" class="tag tag-good">&#x2713; 正例：明度层次分明</text>
  <text x="207" y="114" class="explain">虽用色不同，但前景/中景/背景的明度拉开，去色后结构依然清晰</text>

  <!-- Top row: color version -->
  <text x="207" y="140" class="label" text-anchor="middle">彩色</text>

  <!-- Sky (light value) -->
  <rect x="50" y="150" width="315" height="540" class="pixel" fill="#87CEEB"/>
  <!-- Sun -->
  <circle cx="300" cy="170" r="18" class="pixel" fill="#FFF176"/>

  <!-- Far mountains (mid-light value) -->
  <rect x="50" y="200" width="40" height="540" class="pixel" fill="#81C784"/>
  <rect x="90" y="195" width="50" height="540" class="pixel" fill="#66BB6A"/>
  <rect x="140" y="200" width="35" height="540" class="pixel" fill="#81C784"/>
  <rect x="175" y="190" width="55" height="540" class="pixel" fill="#4CAF50"/>
  <rect x="230" y="200" width="40" height="540" class="pixel" fill="#66BB6A"/>
  <rect x="270" y="198" width="95" height="540" class="pixel" fill="#5CB860"/>

  <!-- Mid-ground: trees (darker value) -->
  <rect x="70" y="225" width="18" height="540" class="pixel" fill="#388E3C"/>
  <rect x="130" y="220" width="16" height="540" class="pixel" fill="#2E7D32"/>
  <rect x="200" y="225" width="20" height="540" class="pixel" fill="#388E3C"/>
  <rect x="260" y="218" width="16" height="540" class="pixel" fill="#1B5E20"/>
  <rect x="310" y="225" width="18" height="540" class="pixel" fill="#2E7D32"/>

  <!-- Ground (darkest) -->
  <rect x="50" y="265" width="315" height="540" class="pixel" fill="#5D4037"/>

  <!-- Focal character (on ground, stands out via value) -->
  <rect x="195" y="245" width="12" height="540" class="pixel" fill="#E74C3C"/>
  <rect x="190" y="240" width="22" height="540" class="pixel" fill="#E74C3C"/>
  <rect x="185" y="235" width="4" height="540" class="pixel" fill="#E74C3C"/>
  <rect x="213" y="235" width="4" height="540" class="pixel" fill="#E74C3C"/>

  <rect x="210" y="250" width="4" height="540" class="pixel" fill="#C0392B"/>
  <rect x="188" y="250" width="4" height="540" class="pixel" fill="#C0392B"/>

  <!-- Arrow down -->
  <text x="207" y="335" class="arrow">&#x2193; 去色</text>

  <!-- Bottom row: grayscale version -->
  <text x="207" y="358" class="label" text-anchor="middle">灰度</text>

  <!-- Same scene, desaturated values -->
  <rect x="50" y="365" width="315" height="540" class="pixel" fill="#D0D0D0"/><!-- sky -->
  <circle cx="300" cy="385" r="18" class="pixel" fill="#B8B8B8"/>

  <rect x="50" y="415" width="40" height="540" class="pixel" fill="#A8A8A8"/>
  <rect x="90" y="410" width="50" height="540" class="pixel" fill="#969696"/>
  <rect x="140" y="415" width="35" height="540" class="pixel" fill="#A8A8A8"/>
  <rect x="175" y="405" width="55" height="540" class="pixel" fill="#888888"/>
  <rect x="230" y="415" width="40" height="540" class="pixel" fill="#969696"/>
  <rect x="270" y="413" width="95" height="540" class="pixel" fill="#909090"/>

  <rect x="70" y="440" width="18" height="540" class="pixel" fill="#6A6A6A"/>
  <rect x="130" y="435" width="16" height="540" class="pixel" fill="#5A5A5A"/>
  <rect x="200" y="440" width="20" height="540" class="pixel" fill="#6A6A6A"/>
  <rect x="260" y="433" width="16" height="540" class="pixel" fill="#4A4A4A"/>
  <rect x="310" y="440" width="18" height="540" class="pixel" fill="#5A5A5A"/>

  <rect x="50" y="480" width="315" height="540" class="pixel" fill="#3A3A3A"/><!-- ground -->

  <!-- Focal character still visible -->
  <rect x="195" y="460" width="12" height="540" class="pixel" fill="#505050"/>
  <rect x="190" y="455" width="22" height="540" class="pixel" fill="#505050"/>
  <rect x="185" y="450" width="4" height="540" class="pixel" fill="#505050"/>
  <rect x="213" y="450" width="4" height="540" class="pixel" fill="#505050"/>
  <rect x="210" y="465" width="4" height="540" class="pixel" fill="#404040"/>
  <rect x="188" y="465" width="4" height="540" class="pixel" fill="#404040"/>

  <text x="207" y="505" class="explain">&#x2192; 天空/远山/树林/地面，四个明度层级仍然可分</text>

  <!-- ======================================== -->
  <!-- RIGHT: 反例 (bad) -->
  <!-- ======================================== -->
  <rect x="415" y="70" width="355" height="540" class="bg"/>

  <text x="592" y="95" class="tag tag-bad">&#x2717; 反例：明度拉不开</text>
  <text x="592" y="114" class="explain">前景/中景/背景用了不同色相，但明度近乎相同，去色后糊成一片</text>

  <!-- Top row: color version -->
  <text x="592" y="140" class="label" text-anchor="middle">彩色</text>

  <!-- Sky (same mid-value, different hue) -->
  <rect x="436" y="150" width="315" height="540" class="pixel" fill="#7CB342"/><!-- green sky -->

  <!-- "Sun" — purple, same value -->
  <circle cx="686" cy="170" r="18" class="pixel" fill="#AB47BC"/>

  <!-- Mountains — all different hues, same mid-value -->
  <rect x="436" y="200" width="40" height="540" class="pixel" fill="#42A5F5"/>
  <rect x="476" y="195" width="50" height="540" class="pixel" fill="#FFA726"/>
  <rect x="526" y="200" width="35" height="540" class="pixel" fill="#66BB6A"/>
  <rect x="561" y="190" width="55" height="540" class="pixel" fill="#EF5350"/>
  <rect x="616" y="200" width="40" height="540" class="pixel" fill="#AB47BC"/>
  <rect x="656" y="198" width="95" height="540" class="pixel" fill="#FFCA28"/>

  <!-- Trees — same mid-value, different hues -->
  <rect x="456" y="225" width="18" height="540" class="pixel" fill="#26C6DA"/>
  <rect x="516" y="220" width="16" height="540" class="pixel" fill="#FF7043"/>
  <rect x="586" y="225" width="20" height="540" class="pixel" fill="#CE93D8"/>
  <rect x="646" y="218" width="16" height="540" class="pixel" fill="#81C784"/>
  <rect x="696" y="225" width="18" height="540" class="pixel" fill="#EF5350"/>

  <!-- Ground — mid-dark value -->
  <rect x="436" y="265" width="315" height="540" class="pixel" fill="#8D6E63"/>

  <!-- Focal character — same value as ground, only hue difference -->
  <rect x="581" y="245" width="12" height="540" class="pixel" fill="#7E57C2"/>
  <rect x="576" y="240" width="22" height="540" class="pixel" fill="#7E57C2"/>
  <rect x="571" y="235" width="4" height="540" class="pixel" fill="#7E57C2"/>
  <rect x="599" y="235" width="4" height="540" class="pixel" fill="#7E57C2"/>
  <rect x="596" y="250" width="4" height="540" class="pixel" fill="#6A4C9A"/>
  <rect x="574" y="250" width="4" height="540" class="pixel" fill="#6A4C9A"/>

  <!-- Arrow down -->
  <text x="592" y="335" class="arrow">&#x2193; 去色</text>

  <!-- Bottom row: grayscale — everything blends -->
  <text x="592" y="358" class="label" text-anchor="middle">灰度</text>

  <rect x="436" y="365" width="315" height="540" class="pixel" fill="#8A8A8A"/>
  <circle cx="686" cy="385" r="18" class="pixel" fill="#8A8A8A"/>

  <!-- All mountains collapse to same gray -->
  <rect x="436" y="415" width="40" height="540" class="pixel" fill="#888888"/>
  <rect x="476" y="410" width="50" height="540" class="pixel" fill="#8A8A8A"/>
  <rect x="526" y="415" width="35" height="540" class="pixel" fill="#898989"/>
  <rect x="561" y="405" width="55" height="540" class="pixel" fill="#878787"/>
  <rect x="616" y="415" width="40" height="540" class="pixel" fill="#888888"/>
  <rect x="656" y="413" width="95" height="540" class="pixel" fill="#898989"/>

  <!-- Trees collapse -->
  <rect x="456" y="440" width="18" height="540" class="pixel" fill="#888888"/>
  <rect x="516" y="435" width="16" height="540" class="pixel" fill="#878787"/>
  <rect x="586" y="440" width="20" height="540" class="pixel" fill="#8A8A8A"/>
  <rect x="646" y="433" width="16" height="540" class="pixel" fill="#898989"/> 
  <rect x="696" y="440" width="18" height="540" class="pixel" fill="#888888"/>

  <!-- Ground -->
  <rect x="436" y="480" width="315" height="540" class="pixel" fill="#787878"/>

  <!-- Character — barely visible against ground -->
  <rect x="581" y="460" width="12" height="540" class="pixel" fill="#7A7A7A"/>
  <rect x="576" y="455" width="22" height="540" class="pixel" fill="#7A7A7A"/>
  <rect x="571" y="450" width="4" height="540" class="pixel" fill="#7A7A7A"/>
  <rect x="599" y="450" width="4" height="540" class="pixel" fill="#7A7A7A"/>
  <rect x="596" y="465" width="4" height="540" class="pixel" fill="#767676"/>
  <rect x="574" y="465" width="4" height="540" class="pixel" fill="#767676"/>

  <!-- Circle the mud area -->
  <rect x="430" y="400" width="325" height="540" class="target" stroke-dasharray="6,3"/>
  <text x="592" y="520" class="explain" fill="#E74C3C">&#x2192; 天空、山、树、地面、角色，全部塌缩成一个灰阶</text>
</svg>
