<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 458"
     width="800" height="458"
     font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <style>
    .label { font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #222; text-anchor: middle; }
    .caption { font-size: 14px; fill: #666; }
    .shelf { fill: #D4A574; stroke: #B8860B; stroke-width: 1; }
    .product-label { font-size: 11px; fill: #333; text-anchor: middle; }
    .arrow-annot { stroke: #E74C3C; stroke-width: 2; fill: none; marker-end: url(#redhead); stroke-dasharray: 5,3; }
    .annot-text { font-size: 13px; fill: #C0392B; font-weight: bold; }
  </style>
  <defs>
    <marker id="redhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>

  <text x="400" y="28" class="title">便利店测试：用三个概念分析货架</text>

  <!-- Shelf background -->
  <rect x="80" y="50" width="640" height="458" rx="8" fill="#FFF9F3" stroke="#DDD" stroke-width="1"/>

  <!-- Shelves -->
  <rect x="100" y="110" width="600" height="458" rx="2" class="shelf"/>
  <rect x="100" y="200" width="600" height="458" rx="2" class="shelf"/>
  <rect x="100" y="290" width="600" height="458" rx="2" class="shelf"/>

  <!-- Shelf 1 products -->
  <rect x="130" y="70" width="50" height="458" rx="3" fill="#3498DB"/>
  <text x="155" y="93" class="product-label" fill="#FFF">蓝色</text>

  <rect x="200" y="65" width="55" height="458" rx="3" fill="#3498DB" opacity="0.7"/>
  <text x="227" y="91" class="product-label" fill="#FFF">蓝(淡)</text>

  <rect x="280" y="72" width="48" height="458" rx="3" fill="#E8E8E8"/>

  <rect x="350" y="68" width="52" height="458" rx="3" fill="#F1C40F"/>
  <text x="376" y="93" class="product-label">金黄</text>

  <!-- ★ TARGET: red product (color) -->
  <rect x="135" y="78" width="0" height="458" display="none"/>
  <rect x="280" y="160" width="50" height="458" rx="3" fill="#E74C3C"/>
  <text x="305" y="183" class="product-label" fill="#FFF">红色</text>

  <rect x="350" y="162" width="48" height="458" rx="3" fill="#F5F5F5"/>
  <rect x="420" y="158" width="55" height="458" rx="3" fill="#8E44AD"/>
  <text x="447" y="183" class="product-label" fill="#FFF">紫色</text>

  <rect x="495" y="163" width="45" height="458" rx="3" fill="#E8E8E8"/>
  <rect x="560" y="160" width="50" height="458" rx="3" fill="#2ECC71"/>
  <text x="585" y="183" class="product-label" fill="#FFF">绿色</text>

  <!-- ★ TARGET: round logo (shape) -->
  <rect x="200" y="248" width="55" height="458" rx="3" fill="#F5F5F5"/>
  <circle cx="227" cy="268" r="12" fill="#E74C3C"/>
  <text x="227" y="271" font-size="9" fill="#FFF" text-anchor="middle">★</text>

  <rect x="275" y="248" width="50" height="458" rx="3" fill="#F5F5F5"/>
  <circle cx="300" cy="268" r="12" fill="#3498DB"/>

  <rect x="345" y="248" width="55" height="458" rx="3" fill="#F5F5F5"/>
  <rect x="360" y="256" width="25" height="458" rx="2" fill="#F39C12"/>

  <!-- ★ TARGET: white space (space/negative space) -->
  <rect x="460" y="245" width="80" height="458" rx="3" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <circle cx="480" cy="266" r="8" fill="#2C3E50"/>
  <text x="510" y="270" class="product-label">大量留白</text>

  <rect x="560" y="248" width="55" height="458" rx="3" fill="#F5F5F5"/>
  <text x="587" y="270" class="product-label">密</text>

  <!-- Annotation arrows -->
  <!-- Arrow 1: Color → red product -->
  <line x1="305" y1="198" x2="305" y2="228" class="arrow-annot"/>
  <text x="250" y="222" class="annot-text">① 色彩：红色在灰调中</text>
  <text x="258" y="238" class="annot-text">天然"跳出"，视觉权重最高</text>

  <!-- Arrow 2: Shape → round logo -->
  <line x1="227" y1="288" x2="227" y2="320" class="arrow-annot"/>
  <text x="160" y="315" class="annot-text">② 形状：圆形在</text>
  <text x="168" y="331" class="annot-text">方体中更显柔和突出</text>

  <!-- Arrow 3: Space → white space product -->
  <line x1="500" y1="288" x2="500" y2="322" class="arrow-annot"/>
  <text x="440" y="317" class="annot-text">③ 空间：留白包围的产品</text>
  <text x="448" y="333" class="annot-text">自带"这是重要品"的暗示</text>

  <!-- Bottom annotation -->
  <text x="400" y="438" class="caption" text-anchor="middle">下次去便利店，用这三个概念分析货架——哪个商品先抓住你的眼睛？为什么？</text>
</svg>