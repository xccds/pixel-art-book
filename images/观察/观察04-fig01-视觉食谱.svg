  <text x="301" y="68" text-anchor="middle" class="day-hdr">周三</text>
  <text x="400" y="68" text-anchor="middle" class="day-hdr">周四</text>
  <text x="499" y="68" text-anchor="middle" class="day-hdr">周五</text>
  <text x="598" y="68" text-anchor="middle" class="day-hdr">周六</text>
  <text x="697" y="68" text-anchor="middle" class="day-hdr">周日</text>

