  <rect width="800" height="500" rx="6" class="bg"/>

  <text x="400" y="31" text-anchor="middle" class="title">月度"看画食谱"——每周循环四类输入源</text>
  <text x="400" y="49" text-anchor="middle" class="subtitle">每天15分钟专注浏览一种视觉源，周末整理归档。24/7 不中断，四周后开始自动识别视觉模式</text>

  <!-- Column headers (y=65) -->
  <text x="103" y="68" text-anchor="middle" class="day-hdr">周一</text>
