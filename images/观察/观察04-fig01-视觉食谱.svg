<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #FAFBFC; }
    .title { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 17px; font-weight: 700; fill: #333; }
    .subtitle { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 10.5px; fill: #999; }
    .day-hdr { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 11px; font-weight: 600; fill: #888; }
    .week-lbl { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 9.5px; fill: #bbb; font-weight: 600; }
    .cell-type { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 11px; font-weight: 700; }
    .cell-kw { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 9.5px; fill: #555; }
    .cell-en { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 7.5px; fill: #bbb; }
    .lg-text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 9px; fill: #666; }
    .lg-title { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 9px; font-weight: 600; fill: #888; }
    .note { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 8.5px; fill: #bbb; }

    .c-art { fill: #FDEDEC; stroke: #E8D0CF; }
    .c-film { fill: #F4ECF7; stroke: #DDD0E8; }
    .c-nature { fill: #E8F8E8; stroke: #C8E0C8; }
    .c-arch { fill: #FEF5E7; stroke: #F0E0C0; }
    .c-game { fill: #E8F4FD; stroke: #C8D8F0; }
    .c-org { fill: #F2F3F4; stroke: #DDDFE0; }
    .c-free { fill: #E8FCF8; stroke: #C8E8E0; }

    .t-art { fill: #E74C3C; }
    .t-film { fill: #8E44AD; }
    .t-nature { fill: #27AE60; }
    .t-arch { fill: #F39C12; }
    .t-game { fill: #2980B9; }
    .t-org { fill: #95A5A6; }
    .t-free { fill: #1ABC9C; }
