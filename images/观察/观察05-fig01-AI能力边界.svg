<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.0 0.0 800.0 515" width="800" height="515">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow-light" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="1" flood-opacity="0.06"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #FAFBFC; }
    .title { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 17px; font-weight: 700; fill: #333; }
    .subtitle { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 10px; fill: #999; }
    .can-title { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 14px; font-weight: 700; fill: #2980B9; }
    .cannot-title { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 14px; font-weight: 700; fill: #E74C3C; }
    .can-item { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 11.5px; fill: #333; }
    .can-desc { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 9px; fill: #888; }
    .cannot-item { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 11px; fill: #C0392B; }
    .cannot-desc { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 8.5px; fill: #B07070; }
    .warn-text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 12px; font-weight: 700; fill: #333; }
    .warn-sub { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 9.5px; fill: #888; }
    .note { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 8.5px; fill: #bbb; }
    .check { fill: #27AE60; font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 13px; font-weight: 700; }
    .cross { fill: #E74C3C; font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; font-size: 13px; font-weight: 700; }
  </style>

  <rect width="800" height="515" rx="6" class="bg"/>

  <text x="400" y="33" text-anchor="middle" class="title">AI 能力边界——它真正能帮你做什么</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">记住：AI 是参考，不是权威。它给的分数没有校准基准。</text>

  <!-- Large circle: AI Can Do -->
  <circle cx="330" cy="290" r="200" fill="#E8F4FD" stroke="#C8D8F0" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="330" y="135" text-anchor="middle" class="can-title">✓  AI 能做</text>

  <!-- Can-do item 1 -->
  <circle cx="185" cy="180" r="12" fill="#27AE60" opacity="0.15"/>
  <text x="185" y="184" text-anchor="middle" class="check">✓</text>
  <text x="210" y="176" class="can-item">即时反馈</text>
  <text x="210" y="193" class="can-desc">24 小时在线，不需要等人类有空</text>

  <!-- Can-do item 2 -->
  <circle cx="185" cy="248" r="12" fill="#27AE60" opacity="0.15"/>
  <text x="185" y="252" text-anchor="middle" class="check">✓</text>
  <text x="210" y="244" class="can-item">八维度分析</text>
  <text x="210" y="261" class="can-desc">完整覆盖形状、明度、色彩等全维度</text>

  <!-- Can-do item 3 -->
  <circle cx="185" cy="316" r="12" fill="#27AE60" opacity="0.15"/>
  <text x="185" y="320" text-anchor="middle" class="check">✓</text>
  <text x="210" y="312" class="can-item">提示词指导</text>
  <text x="210" y="329" class="can-desc">告诉你要搜什么术语、练什么技法</text>

  <!-- Can-do item 4 -->
  <circle cx="185" cy="384" r="12" fill="#27AE60" opacity="0.15"/>
  <text x="185" y="388" text-anchor="middle" class="check">✓</text>
  <text x="210" y="380" class="can-item">方案推演</text>
  <text x="210" y="397" class="can-desc">画之前把构思发给 AI，提前发现潜在问题</text>

  <!-- Crossing out area to the right of the circle -->

  <!-- Cannot-do title -->
  <text x="610" y="135" text-anchor="middle" class="cannot-title">✗  AI 不能做</text>

  <!-- Cannot-do item 1 -->
  <rect x="515" y="155" width="200" height="515" rx="6" fill="#FDEDEC" stroke="#E8D0CF" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="528" y="171" class="cross">✗</text>
  <text x="546" y="171" class="cannot-item">精确明度评估</text>
  <text x="546" y="185" class="cannot-desc">无法判断"暗部是否过暗"</text>

  <!-- Cannot-do item 2 -->
  <rect x="515" y="203" width="200" height="515" rx="6" fill="#FDEDEC" stroke="#E8D0CF" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="528" y="219" class="cross">✗</text>
  <text x="546" y="219" class="cannot-item">像素细节判断</text>
  <text x="546" y="233" class="cannot-desc">无法定位 jaggies 的具体位置</text>

  <!-- Cannot-do item 3 -->
  <rect x="515" y="251" width="200" height="515" rx="6" fill="#FDEDEC" stroke="#E8D0CF" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="528" y="267" class="cross">✗</text>
  <text x="546" y="267" class="cannot-item">构图焦点定位</text>
  <text x="546" y="281" class="cannot-desc">无法准确指出视觉重心的偏移量</text>

  <!-- Cannot-do item 4 -->
  <rect x="515" y="299" width="200" height="515" rx="6" fill="#FDEDEC" stroke="#E8D0CF" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="528" y="315" class="cross">✗</text>
  <text x="546" y="315" class="cannot-item">原创性评价</text>
  <text x="546" y="329" class="cannot-desc">会不加分辨地奉承你的作品</text>

  <!-- Danger zone callout -->
  <rect x="515" y="362" width="200" height="515" rx="6" fill="#FFF3CD" stroke="#E8D0A0" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="615" y="382" text-anchor="middle" class="warn-text">⚠ 危险用法</text>
  <text x="615" y="400" text-anchor="middle" class="warn-sub">不要让 AI 给你打分（1-5 分）</text>
  <text x="615" y="412" text-anchor="middle" class="warn-sub">作为自我评估的成绩</text>

  <!-- Center warning strip -->
  <rect x="155" y="448" width="490" height="515" rx="8" fill="#FFF3CD" stroke="#E8D0A0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="465" text-anchor="middle" class="warn-text">🧠  AI 是参考，不是权威——把它当成一个"无限耐心的助教"，不是"不会出错的评委"</text>

  <text x="400" y="495" text-anchor="middle" class="note">类比：AI 反馈就像 linter —— 帮你发现你没注意到的 bug，但不能替代你的架构判断</text>
</svg>
