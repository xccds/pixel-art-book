<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-size: 11px; fill: #666; }
    .res-title { font-size: 15px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .can-title { font-size: 11px; font-weight: bold; fill: #27AE60; }
    .cannot-title { font-size: 11px; font-weight: bold; fill: #E74C3C; }
    .can { font-size: 9.5px; fill: #333; }
    .cannot { font-size: 9.5px; fill: #999; }
    .work { font-size: 10px; fill: #E74C3C; font-weight: bold; }
    .game-type { font-size: 10px; fill: #333; font-weight: bold; }
    .example { font-size: 9px; fill: #666; font-style: italic; }
    .highlight { font-size: 11px; fill: #E74C3C; font-weight: bold; }
    .axis-label { font-size: 10px; fill: #666; }
  </style>

  <text x="400" y="28" class="title" text-anchor="middle">图 风格01.2  像素分辨率决策——16×16 / 32×32 / 64×64 的三种世界</text>
  <text x="400" y="46" class="subtitle" text-anchor="middle">你选的不只是一个数字——是画面能说什么、不能说说什么、以及你未来的工时</text>

  <!-- Three columns with gradient header bars -->

  <!-- Column 1: 16x16 -->
  <g transform="translate(20, 65)">
    <rect x="0" y="0" width="240" height="400" fill="#E8F4FD" stroke="#B0D4F1" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="240" height="38" fill="#E74C3C" rx="6"/>
    <rect x="0" y="20" width="240" height="18" fill="#E74C3C"/>
    <text x="120" y="26" class="res-title">16 × 16</text>

    <!-- Character demo - tiny -->
    <g transform="translate(80, 50)">
      <rect x="0" y="0" width="80" height="64" fill="#FDEBD0" rx="3"/>
      <!-- Very simple character -->
      <rect x="32" y="8" width="16" height="16" fill="#F0C8A0"/>
      <rect x="36" y="14" width="4" height="4" fill="#333"/>
      <rect x="44" y="14" width="4" height="4" fill="#333"/>
      <rect x="34" y="24" width="12" height="12" fill="#3498DB"/>
      <rect x="36" y="36" width="6" height="10" fill="#566573"/>
      <rect x="42" y="36" width="6" height="10" fill="#566573"/>
    </g>

    <text x="20" y="148" class="can-title">✓ 能做到：</text>
    <text x="20" y="166" class="can">· 清晰可辨识的角色剪影</text>
    <text x="20" y="182" class="can">· 基础动作可读（站/走/跳）</text>
    <text x="20" y="198" class="can">· 极快制作：角色 10-25 分钟</text>
    <text x="20" y="214" class="can">· 程序化换色极其简单</text>

    <line x1="15" y1="230" x2="225" y2="230" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="248" class="cannot-title">✗ 做不到：</text>
    <text x="20" y="266" class="cannot">· 无法表达面部表情</text>
    <text x="20" y="282" class="cannot">· 无法区分精细材质</text>
    <text x="20" y="298" class="cannot">· 武器/道具细节模糊</text>
    <text x="20" y="314" class="cannot">· 角色性别/年龄难辨识</text>

    <line x1="15" y1="330" x2="225" y2="330" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="348" class="work">⚒ 工作量：</text>
    <text x="20" y="363" class="can">角色静态帧：10-25 分钟</text>
    <text x="20" y="378" class="can">4向行走动画：1-3 小时</text>

    <line x1="15" y1="393" x2="225" y2="393" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="410" class="game-type">适合游戏类型：</text>
    <text x="20" y="427" class="example">平台跳跃 / 解谜 / 极简肉鸽</text>
    <text x="20" y="443" class="example">代表：Celeste, Minit</text>
  </g>

  <!-- Column 2: 32x32 - highlighted as "sweet spot" -->
  <g transform="translate(280, 65)">
    <rect x="0" y="0" width="240" height="400" fill="#FEF9E7" stroke="#F1C40F" stroke-width="2" rx="6"/>
    <rect x="0" y="0" width="240" height="38" fill="#F39C12" rx="6"/>
    <rect x="0" y="20" width="240" height="18" fill="#F39C12"/>
    <text x="120" y="26" class="res-title">32 × 32  ⭐ 推荐</text>

    <!-- Character demo - decent detail -->
    <g transform="translate(80, 50)">
      <rect x="0" y="0" width="80" height="64" fill="#FDEBD0" rx="3"/>
      <!-- Detailed character -->
      <rect x="28" y="4" width="20" height="18" rx="1" fill="#F5CBA7"/>
      <!-- Hair -->
      <rect x="26" y="0" width="24" height="10" fill="#6E2C00"/>
      <rect x="26" y="2" width="4" height="6" fill="#873600"/>
      <rect x="46" y="2" width="4" height="6" fill="#873600"/>
      <!-- Eyes -->
      <rect x="34" y="10" width="4" height="4" fill="#fff"/>
      <rect x="35" y="11" width="2" height="2" fill="#333"/>
      <rect x="42" y="10" width="4" height="4" fill="#fff"/>
      <rect x="43" y="11" width="2" height="2" fill="#333"/>
      <!-- Smile -->
      <line x1="36" y1="20" x2="44" y2="20" stroke="#333" stroke-width="1.5"/>
      <!-- Body with jacket -->
      <rect x="28" y="24" width="18" height="14" fill="#1ABC9C"/>
      <rect x="28" y="28" width="18" height="2" fill="#16A085"/>
      <!-- Belt -->
      <rect x="28" y="34" width="18" height="2" fill="#8B4513"/>
      <rect x="35" y="33" width="4" height="4" fill="#F39C12"/>
      <!-- Legs -->
      <rect x="30" y="38" width="6" height="10" fill="#2C3E50"/>
      <rect x="40" y="38" width="6" height="10" fill="#2C3E50"/>
      <!-- Shoes -->
      <rect x="28" y="48" width="8" height="4" fill="#873600"/>
      <rect x="40" y="48" width="8" height="4" fill="#873600"/>
    </g>

    <rect x="170" y="50" width="60" height="16" fill="#F39C12" rx="3"/>
    <text x="200" y="62" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">甜点区</text>

    <text x="20" y="148" class="can-title">✓ 能做到：</text>
    <text x="20" y="166" class="can">· 表情可读（喜怒哀惊）</text>
    <text x="20" y="182" class="can">· 服装/道具细节清晰</text>
    <text x="20" y="198" class="can">· 性别/年龄可辨识</text>
    <text x="20" y="214" class="can">· 可区分 3-5 种材质</text>
    <text x="20" y="230" class="can">· 大众化接受度最高</text>

    <line x1="15" y1="246" x2="225" y2="246" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="264" class="cannot-title">✗ 做不到：</text>
    <text x="20" y="282" class="cannot">· 微妙面部微表情</text>
    <text x="20" y="298" class="cannot">· 文字清晰度有限</text>
    <text x="20" y="314" class="cannot">· 精细纹理（木纹/布料）</text>

    <line x1="15" y1="330" x2="225" y2="330" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="348" class="work">⚒ 工作量：</text>
    <text x="20" y="363" class="can">角色静态帧：30-60 分钟</text>
    <text x="20" y="378" class="can">4向行走动画：3-8 小时</text>

    <line x1="15" y1="393" x2="225" y2="393" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="410" class="game-type">适合游戏类型：</text>
    <text x="20" y="427" class="example">动作冒险 / JRPG / 银河城 / 肉鸽</text>
    <text x="20" y="443" class="example">代表：Dead Cells(前期), SDV</text>
  </g>

  <!-- Column 3: 64x64 -->
  <g transform="translate(540, 65)">
    <rect x="0" y="0" width="240" height="400" fill="#E8F4FD" stroke="#B0D4F1" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="240" height="38" fill="#2980B9" rx="6"/>
    <rect x="0" y="20" width="240" height="18" fill="#2980B9"/>
    <text x="120" y="26" class="res-title">64 × 64</text>

    <!-- Character demo - highly detailed -->
    <g transform="translate(80, 50)">
      <rect x="0" y="0" width="80" height="64" fill="#FDEBD0" rx="3"/>
      <!-- High detail character -->
      <!-- Hair with strands -->
      <rect x="22" y="0" width="34" height="16" fill="#4A2C0A"/>
      <rect x="24" y="2" width="4" height="8" fill="#6B3E1A"/>
      <rect x="32" y="0" width="4" height="10" fill="#6B3E1A"/>
      <rect x="42" y="2" width="4" height="8" fill="#6B3E1A"/>
      <rect x="50" y="2" width="4" height="8" fill="#6B3E1A"/>
      <!-- Face -->
      <rect x="28" y="12" width="22" height="16" rx="2" fill="#FAD7A1"/>
      <!-- Eyes with detailed pupils and highlights -->
      <rect x="32" y="16" width="6" height="4" fill="#fff"/>
      <rect x="33" y="17" width="3" height="2" fill="#1B4F72"/>
      <rect x="34" y="16" width="1" height="1.5" fill="#fff"/>
      <rect x="42" y="16" width="6" height="4" fill="#fff"/>
      <rect x="43" y="17" width="3" height="2" fill="#1B4F72"/>
      <rect x="44" y="16" width="1" height="1.5" fill="#fff"/>
      <!-- Eyebrows -->
      <rect x="31" y="14" width="8" height="1.5" fill="#3D1A0A"/>
      <rect x="41" y="14" width="8" height="1.5" fill="#3D1A0A"/>
      <!-- Nose -->
      <rect x="38" y="20" width="2" height="2" fill="#E8B88A"/>
      <!-- Mouth -->
      <rect x="36" y="24" width="6" height="2" fill="#C0392B"/>
      <!-- Body armor with details -->
      <rect x="24" y="30" width="28" height="18" fill="#7FB3D8"/>
      <rect x="26" y="32" width="24" height="2" fill="#A9CCE3"/>
      <rect x="26" y="40" width="24" height="2" fill="#A9CCE3"/>
      <rect x="34" y="36" width="8" height="4" fill="#2C3E50"/>
      <!-- Arms -->
      <rect x="16" y="30" width="8" height="12" fill="#FAD7A1"/>
      <rect x="52" y="30" width="8" height="12" fill="#FAD7A1"/>
      <!-- Hands/gloves -->
      <rect x="16" y="38" width="8" height="4" fill="#5D4037"/>
      <rect x="52" y="38" width="8" height="4" fill="#5D4037"/>
      <!-- Legs -->
      <rect x="28" y="48" width="8" height="10" fill="#3D5A80"/>
      <rect x="42" y="48" width="8" height="10" fill="#3D5A80"/>
      <!-- Boots -->
      <rect x="26" y="56" width="10" height="4" fill="#5D4037"/>
      <rect x="42" y="56" width="10" height="4" fill="#5D4037"/>
      <!-- Cape -->
      <rect x="22" y="33" width="4" height="20" fill="#E74C3C" opacity="0.8"/>
      <rect x="52" y="33" width="4" height="20" fill="#E74C3C" opacity="0.8"/>
    </g>

    <text x="20" y="148" class="can-title">✓ 能做到：</text>
    <text x="20" y="166" class="can">· 丰富表情与微表情</text>
    <text x="20" y="182" class="can">· 精细装备与武器细节</text>
    <text x="20" y="198" class="can">· 布料褶皱/盔甲花纹</text>
    <text x="20" y="214" class="can">· 角色个性鲜明辨识</text>
    <text x="20" y="230" class="can">· 可表现材质（皮/金属/布）</text>

    <line x1="15" y1="246" x2="225" y2="246" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="264" class="cannot-title">✗ 做不到：</text>
    <text x="20" y="282" class="cannot">· 仍无法匹敌手绘细节</text>
    <text x="20" y="298" class="cannot">· 动画帧时间直线上升</text>

    <line x1="15" y1="330" x2="225" y2="330" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="348" class="work">⚒ 工作量：</text>
    <text x="20" y="363" class="can">角色静态帧：1-3 小时</text>
    <text x="20" y="378" class="can">4向行走动画：10-30 小时</text>

    <line x1="15" y1="393" x2="225" y2="393" stroke="#E0E0E0" stroke-width="0.8"/>

    <text x="20" y="410" class="game-type">适合游戏类型：</text>
    <text x="20" y="427" class="example">高品质动作 / 类银河城</text>
    <text x="20" y="443" class="example">代表：Blasphemous, Dead Cells</text>
  </g>
</svg>
